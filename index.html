<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>献立表OCR 発注書作成</title>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.xlsxLoadError = true"></script>
  <script>
    if (!window.XLSX) {
      document.write('<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: #fff7ed;
      color: #1f2937;
      line-height: 1.7;
    }

    header {
      padding: 20px 16px 10px;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: #fff;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.95;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    section {
      background: #fff;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(154, 52, 18, 0.08);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .note {
      margin: 0 0 12px;
      color: #667085;
      font-size: 14px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 12px 0;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .primary {
      background: #f97316;
    }

    .blue {
      background: #2563eb;
    }

    .green {
      background: #16a34a;
    }

    .gray {
      background: #64748b;
    }

    .red {
      background: #dc2626;
    }

    input[type="file"] {
      display: none;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      background: #fffdf8;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 700;
    }

    #preview {
      display: none;
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      margin-top: 12px;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      background: #fff;
    }

    .status {
      min-height: 1.8em;
      margin: 10px 0 0;
      color: #475569;
      font-weight: 700;
      font-size: 14px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .summary div {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      padding: 10px;
    }

    .summary span {
      display: block;
      color: #667085;
      font-size: 12px;
    }

    .summary b {
      font-size: 22px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 680px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid #ffedd5;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #ffedd5;
      color: #7c2d12;
      white-space: nowrap;
    }

    td input {
      min-width: 100px;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: #667085;
      border: 1px dashed #fdba74;
      border-radius: 12px;
      background: #fff7ed;
    }

    @media (max-width: 720px) {
      main {
        padding: 12px;
      }

      .buttons,
      .summary {
        grid-template-columns: 1fr;
      }

      table,
      thead,
      tbody,
      tr,
      td {
        display: block;
        width: 100%;
        min-width: 0;
      }

      thead {
        display: none;
      }

      tr {
        border: 1px solid #ffedd5;
        border-radius: 12px;
        margin-bottom: 10px;
        padding: 10px;
      }

      td {
        border: 0;
        padding: 6px 0;
      }

      td::before {
        content: attr(data-label);
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #667085;
        margin-bottom: 3px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>献立表OCR 発注書作成</h1>
    <p>スマホで撮影 → OCR → 食材抽出 → 合算 → Excel出力</p>
  </header>

  <main>
    <section>
      <h2>1. 献立表を撮影 / 画像選択</h2>
      <p class="note">画像と文字はブラウザ内で処理します。発注前に必ず確認してください。</p>

      <div class="buttons">
        <button class="blue" type="button" id="cameraBtn">📷 カメラで撮る</button>
        <button class="gray" type="button" id="imageBtn">🖼️ 画像を選ぶ</button>
      </div>

      <input id="cameraInput" type="file" accept="image/*" capture="environment">
      <input id="imageInput" type="file" accept="image/*">

      <img id="preview" alt="選択した画像">
      <p id="ocrStatus" class="status"></p>

      <label for="ocrText">OCR結果 / 手入力</label>
      <textarea id="ocrText" placeholder="OCR結果がここに入ります。手入力やコピー貼り付けでも使えます。"></textarea>

      <div class="buttons">
        <button class="primary" type="button" id="extractBtn">食材を抽出して合算</button>
        <button class="gray" type="button" id="sampleBtn">サンプルを入れる</button>
        <button class="red" type="button" id="clearBtn">消す</button>
        <button class="gray" type="button" id="retryBtn" disabled>もう一度OCR</button>
      </div>
    </section>

    <section>
      <h2>2. 確認画面</h2>

      <div class="summary">
        <div>
          <span>食材数</span>
          <b id="itemCount">0</b>
        </div>
        <div>
          <span>合算件数</span>
          <b id="mergedCount">0</b>
        </div>
        <div>
          <span>除外件数</span>
          <b id="excludedCount">0</b>
        </div>
      </div>

      <p id="notice" class="status"></p>

      <div id="tableArea" class="empty">
        まだ食材がありません。
      </div>

      <div class="buttons">
        <button class="gray" type="button" id="addBtn">＋ 食材を追加</button>
        <button class="green" type="button" id="excelBtn" disabled>Excel（.xlsx）をダウンロード</button>
      </div>
    </section>
  </main>

  <script>
    const aliases = {
      "人参": "にんじん",
      "ニンジン": "にんじん",
      "玉葱": "玉ねぎ",
      "たまねぎ": "玉ねぎ",
      "じゃが芋": "じゃがいも",
      "ジャガイモ": "じゃがいも",
      "馬鈴薯": "じゃがいも",
      "鶏肉": "鶏もも肉",
      "とり肉": "鶏もも肉",
      "豚肉": "豚こま肉",
      "ほうれんそう": "ほうれん草",
      "ホウレン草": "ほうれん草",
      "椎茸": "しいたけ",
      "リンゴ": "りんご",
      "林檎": "りんご",
      "たまご": "卵"
    };

    const ingredients = [
      "鶏もも肉", "鶏むね肉", "鶏ひき肉", "鶏肉", "豚こま肉", "豚ひき肉", "豚肉", "牛肉",
      "鮭", "さけ", "さば", "たら", "ツナ", "しらす", "ちくわ", "かまぼこ",
      "じゃがいも", "じゃが芋", "ジャガイモ", "馬鈴薯", "さつまいも", "里芋",
      "玉ねぎ", "たまねぎ", "玉葱", "にんじん", "人参", "ニンジン", "大根", "きゅうり",
      "トマト", "ミニトマト", "ほうれん草", "ほうれんそう", "小松菜", "ブロッコリー",
      "ピーマン", "かぼちゃ", "なす", "キャベツ", "白菜", "レタス", "もやし", "ねぎ", "長ねぎ",
      "コーン", "しめじ", "えのき", "しいたけ", "椎茸", "まいたけ", "エリンギ",
      "豆腐", "油揚げ", "厚揚げ", "納豆", "卵", "たまご", "牛乳", "ヨーグルト", "チーズ",
      "りんご", "リンゴ", "林檎", "オレンジ", "バナナ", "みかん", "いちご",
      "小麦粉", "片栗粉", "パン粉", "食パン", "ロールパン", "うどん", "スパゲティ", "マカロニ"
    ].sort((a, b) => b.length - a.length);

    const excludeWords = [
      "日付", "曜日", "献立", "献立名", "昼食", "おやつ", "午前", "午後", "材料", "食品名", "食材名", "数量", "分量", "単位", "備考",
      "米", "ごはん", "精白米", "だし汁", "だし", "水", "しょうゆ", "醤油", "塩", "砂糖", "酢", "みそ", "味噌",
      "油", "サラダ油", "ごま油", "酒", "みりん", "こしょう", "ソース", "ケチャップ", "マヨネーズ"
    ];

    const sampleText =
      "日付,献立名,食品名,数量,単位\n" +
      "5/1,昼食,鶏もも肉,40,g\n" +
      "5/1,昼食,にんじん,15,g\n" +
      "5/1,昼食,人参,10,g\n" +
      "5/1,昼食,玉ねぎ,30,g\n" +
      "5/1,昼食,たまねぎ,20,g\n" +
      "5/1,昼食,米,50,g\n" +
      "5/1,おやつ,牛乳,100,ml\n" +
      "5/1,おやつ,りんご,0.5,個";

    let lastImage = null;
    let rows = [];
    let stats = {
      merged: 0,
      excluded: 0
    };

    const cameraBtn = document.getElementById("cameraBtn");
    const imageBtn = document.getElementById("imageBtn");
    const retryBtn = document.getElementById("retryBtn");
    const extractBtn = document.getElementById("extractBtn");
    const sampleBtn = document.getElementById("sampleBtn");
    const clearBtn = document.getElementById("clearBtn");
    const addBtn = document.getElementById("addBtn");
    const excelBtn = document.getElementById("excelBtn");

    const cameraInput = document.getElementById("cameraInput");
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const ocrText = document.getElementById("ocrText");
    const ocrStatus = document.getElementById("ocrStatus");
    const notice = document.getElementById("notice");
    const tableArea = document.getElementById("tableArea");

    const itemCount = document.getElementById("itemCount");
    const mergedCount = document.getElementById("mergedCount");
    const excludedCount = document.getElementById("excludedCount");

    cameraBtn.addEventListener("click", () => cameraInput.click());
    imageBtn.addEventListener("click", () => imageInput.click());
    retryBtn.addEventListener("click", () => lastImage && runOcr(lastImage));
    extractBtn.addEventListener("click", extractAndRender);
    sampleBtn.addEventListener("click", () => {
      ocrText.value = sampleText;
      extractAndRender();
    });
    clearBtn.addEventListener("click", clearAll);
    addBtn.addEventListener("click", addRow);
    excelBtn.addEventListener("click", downloadExcel);

    cameraInput.addEventListener("change", e => handleImage(e.target.files[0]));
    imageInput.addEventListener("change", e => handleImage(e.target.files[0]));

    function handleImage(file) {
      if (!file) return;

      lastImage = file;
      retryBtn.disabled = false;

      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";

      runOcr(file);
    }

    async function runOcr(file) {
      if (!window.Tesseract) {
        ocrStatus.textContent = "OCRライブラリを読み込めませんでした。ネット接続を確認してください。";
        return;
      }

      setWorking(true);
      ocrStatus.textContent = "OCRを開始します。初回は時間がかかることがあります。";

      try {
        const result = await Tesseract.recognize(file, "jpn+eng", {
          logger: message => {
            if (message.status === "recognizing text") {
              ocrStatus.textContent = "OCR中です：" + Math.round(message.progress * 100) + "%";
            }
          }
        });

        ocrText.value = result.data.text.trim();
        ocrStatus.textContent = "OCRが終わりました。内容を確認してください。";
        extractAndRender();
      } catch (error) {
        ocrStatus.textContent = "OCRに失敗しました。画像を撮り直すか、文字を手入力してください。";
      } finally {
        setWorking(false);
      }
    }

    function setWorking(isWorking) {
      cameraBtn.disabled = isWorking;
      imageBtn.disabled = isWorking;
      retryBtn.disabled = isWorking || !lastImage;
      extractBtn.disabled = isWorking;
    }

    function extractAndRender() {
      const text = ocrText.value.trim();

      if (!text) {
        notice.textContent = "OCR結果または献立の文字を入力してください。";
        return;
      }

      const result = extractIngredients(text);
      rows = result.rows;
      stats = result.stats;

      console.log("抽出結果", {
        rows,
        stats,
        sourceText: text
      });

      renderTable();
      updateSummary();

      notice.textContent = rows.length
        ? "食材を抽出しました。内容を確認して、必要なら修正してください。"
        : "食材を見つけられませんでした。文字を直してから再実行してください。";
    }

    function extractIngredients(text) {
      const totals = new Map();
      let foundCount = 0;
      let excludedCount = 0;

      const lines = text
        .replace(/\r/g, "\n")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);

      for (const line of lines) {
        const compact = line.replace(/\s/g, "");

        if (!compact || excludeWords.slice(0, 15).includes(compact)) {
          excludedCount++;
          continue;
        }

        const foundNames = findNames(line);

        if (foundNames.length === 0) {
          continue;
        }

        const amount = findAmount(line);

        for (const rawName of foundNames) {
          const name = normalizeName(rawName);

          if (shouldExclude(name)) {
            excludedCount++;
            continue;
          }

          foundCount++;

          const key = name + "__" + amount.unit;
          const current = totals.get(key) || {
            name,
            quantity: 0,
            unit: amount.unit,
            count: 0
          };

          current.quantity += amount.quantity;
          current.count += 1;
          totals.set(key, current);
        }
      }

      const outputRows = Array.from(totals.values())
        .map(item => ({
          name: item.name,
          quantity: round(item.quantity),
          unit: item.unit,
          note: item.count > 1 ? item.count + "件を合算" : ""
        }))
        .sort((a, b) => a.name.localeCompare(b.name, "ja"));

      return {
        rows: outputRows,
        stats: {
          merged: Math.max(0, foundCount - outputRows.length),
          excluded: excludedCount
        }
      };
    }

    function findNames(line) {
      const compact = line.replace(/[\s,，、|｜\t]/g, "");
      const found = [];

      for (const word of ingredients) {
        if (compact.includes(word)) {
          const normalized = normalizeName(word);
          const exists = found.some(name => normalizeName(name) === normalized);

          if (!exists) {
            found.push(word);
          }
        }
      }

      return found.filter(name => {
        const normalized = normalizeName(name);

        return !found.some(other => {
          const otherNormalized = normalizeName(other);
          return otherNormalized !== normalized && otherNormalized.includes(normalized);
        });
      });
    }

    function findAmount(line) {
      const normalizedLine = normalizeAmountText(line);
      const numberPattern = "([0-9]+(?:\\.[0-9]+)?)";
      const unitPattern = "(kg|g|ml|l|個)";

      // 40g / 100ml / 0.5個 / 100,ml のように「数字＋単位」がある場合は最優先します。
      const numberWithUnit = new RegExp(numberPattern + "[\\s,，、|｜:：]*" + unitPattern, "i");
      const explicitMatch = normalizedLine.match(numberWithUnit);

      if (explicitMatch) {
        return {
          quantity: Number(explicitMatch[1]),
          unit: normalizeUnit(explicitMatch[2])
        };
      }

      // 単位が無い場合のみ「個」にします。日付の 5/1 などは除外し、食材名の後ろ側の数字を優先します。
      const namePositions = findNames(normalizedLine)
        .map(name => normalizedLine.indexOf(name))
        .filter(index => index >= 0);
      const searchStart = namePositions.length
        ? Math.min(...namePositions)
        : 0;
      const amountArea = normalizedLine.slice(searchStart);
      const numbers = amountArea.match(/(?<![0-9/])([0-9]+(?:\.[0-9]+)?)(?![0-9/])/g);
      const quantity = numbers && numbers.length ? Number(numbers[numbers.length - 1]) : 1;

      return {
        quantity: Number.isFinite(quantity) ? quantity : 1,
        unit: "個"
      };
    }

    function normalizeAmountText(text) {
      return String(text || "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/．/g, ".")
        .replace(/[Ｋｋ]/g, "k")
        .replace(/[Ｇｇ]/g, "g")
        .replace(/[Ｍｍ]/g, "m")
        .replace(/[Ｌｌ]/g, "l");
    }

    function normalizeUnit(unit) {
      const normalized = String(unit || "").toLowerCase();

      if (normalized === "l") return "L";
      if (normalized === "kg") return "kg";
      if (normalized === "g") return "g";
      if (normalized === "ml") return "ml";

      return "個";
    }

    function normalizeName(name) {
      const trimmed = String(name || "").trim();
      return aliases[trimmed] || trimmed;
    }

    function shouldExclude(name) {
      return excludeWords.slice(15).some(word => name === word || name.includes(word));
    }

    function round(value) {
      return Math.round(value * 100) / 100;
    }

    function renderTable() {
      if (rows.length === 0) {
        tableArea.className = "empty";
        tableArea.textContent = "まだ食材がありません。";
        excelBtn.disabled = true;
        return;
      }

      tableArea.className = "table-wrap";
      tableArea.innerHTML =
        "<table>" +
          "<thead>" +
            "<tr>" +
              "<th>食材名</th>" +
              "<th>数量</th>" +
              "<th>単位</th>" +
              "<th>備考</th>" +
              "<th>操作</th>" +
            "</tr>" +
          "</thead>" +
          "<tbody>" +
            rows.map((row, index) => rowHtml(row, index)).join("") +
          "</tbody>" +
        "</table>";

      tableArea.querySelectorAll("input").forEach(input => {
        input.addEventListener("input", syncRows);
      });

      tableArea.querySelectorAll("[data-delete]").forEach(button => {
        button.addEventListener("click", () => deleteRow(Number(button.dataset.delete)));
      });

      excelBtn.disabled = false;
    }

    function rowHtml(row, index) {
      return (
        "<tr>" +
          '<td data-label="食材名"><input data-index="' + index + '" data-field="name" value="' + escapeHtml(row.name) + '"></td>' +
          '<td data-label="数量"><input type="number" step="0.01" data-index="' + index + '" data-field="quantity" value="' + escapeHtml(row.quantity) + '"></td>' +
          '<td data-label="単位"><input data-index="' + index + '" data-field="unit" value="' + escapeHtml(row.unit) + '"></td>' +
          '<td data-label="備考"><input data-index="' + index + '" data-field="note" value="' + escapeHtml(row.note || "") + '"></td>' +
          '<td data-label="操作"><button class="red" type="button" data-delete="' + index + '">削除</button></td>' +
        "</tr>"
      );
    }

    function syncRows() {
      const next = rows.map(row => ({ ...row }));

      tableArea.querySelectorAll("input[data-index]").forEach(input => {
        const index = Number(input.dataset.index);
        const field = input.dataset.field;

        if (!next[index]) return;

        next[index][field] = field === "quantity"
          ? Number(input.value || 0)
          : input.value;
      });

      rows = next;
      updateSummary();
    }

    function addRow() {
      syncRowsIfNeeded();

      rows.push({
        name: "",
        quantity: 1,
        unit: "個",
        note: "手入力"
      });

      renderTable();
      updateSummary();
      notice.textContent = "食材行を追加しました。";
    }

    function deleteRow(index) {
      syncRowsIfNeeded();
      rows.splice(index, 1);

      renderTable();
      updateSummary();
      notice.textContent = "食材行を削除しました。";
    }

    function syncRowsIfNeeded() {
      if (tableArea.querySelector("table")) {
        syncRows();
      }
    }

    function updateSummary() {
      const validRows = rows.filter(row => String(row.name || "").trim());

      itemCount.textContent = validRows.length;
      mergedCount.textContent = stats.merged;
      excludedCount.textContent = stats.excluded;

      excelBtn.disabled = validRows.length === 0;
    }

    function downloadExcel() {
      syncRowsIfNeeded();

      const excelRows = rows
        .filter(row => String(row.name || "").trim())
        .map(row => ({
          食材名: String(row.name || "").trim(),
          数量: Number(row.quantity || 0),
          単位: row.unit || "",
          備考: row.note || ""
        }));

      if (excelRows.length === 0) {
        notice.textContent = "Excelにする食材がありません。";
        return;
      }

      if (!isXlsxReady()) {
        notice.textContent = "Excel作成ライブラリを読み込めませんでした。ネット接続を確認してから、ページを再読み込みしてください。";
        console.error("XLSXライブラリが利用できません", { xlsxLoadError: window.xlsxLoadError });
        return;
      }

      try {
        const worksheet = XLSX.utils.json_to_sheet(excelRows, {
          header: ["食材名", "数量", "単位", "備考"]
        });

        worksheet["!cols"] = [
          { wch: 24 },
          { wch: 10 },
          { wch: 10 },
          { wch: 24 }
        ];

        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "発注書");

        const fileName = "発注書_" + formatDate(new Date()) + ".xlsx";
        XLSX.writeFile(workbook, fileName, { bookType: "xlsx", type: "binary" });

        notice.textContent = "Excelをダウンロードしました。";
        console.log("Excelダウンロード", { fileName, rows: excelRows });
      } catch (error) {
        notice.textContent = "Excelの作成に失敗しました。もう一度お試しください。";
        console.error("Excel作成エラー", error);
      }
    }

    function isXlsxReady() {
      return Boolean(
        window.XLSX &&
        XLSX.utils &&
        typeof XLSX.utils.json_to_sheet === "function" &&
        typeof XLSX.utils.book_new === "function" &&
        typeof XLSX.utils.book_append_sheet === "function" &&
        typeof XLSX.writeFile === "function"
      );
    }

    function clearAll() {
      lastImage = null;
      rows = [];
      stats = {
        merged: 0,
        excluded: 0
      };

      ocrText.value = "";
      ocrStatus.textContent = "";
      notice.textContent = "入力を消しました。";
      preview.removeAttribute("src");
      preview.style.display = "none";
      cameraInput.value = "";
      imageInput.value = "";
      retryBtn.disabled = true;

      renderTable();
      updateSummary();
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");

      return year + month + day;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[char]));
    }
  </script>
</body>
</html>
