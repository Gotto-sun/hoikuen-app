<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>スクルド発注書 Excelテンプレート</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #e5e7eb; color: #111; }
    body { font-family: "Yu Gothic", "YuGothic", "Hiragino Sans", "Meiryo", sans-serif; }
    .app { width: min(1120px, 100%); margin: 0 auto; padding: 18px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      margin: 0 0 16px;
      padding: 12px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
    }
    button {
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      background: #2563eb;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #4b5563; }
    .sheet-wrap { overflow: auto; padding: 18px 0; }
    .sheet {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 18mm 16mm 18mm;
      background: #fff;
      box-shadow: 0 8px 28px rgba(0,0,0,.18);
    }
    .title {
      margin: 24mm 0 0;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .72em;
      text-indent: .72em;
    }
    .school { margin: 6px 0 0; text-align: center; font-size: 12px; font-weight: 700; letter-spacing: .16em; }
    .garden { margin: 4px 0 24px; text-align: center; font-size: 12px; font-weight: 700; letter-spacing: .22em; }
    .date-line {
      display: grid;
      grid-template-columns: 48px 160px 48px 42px 24px 42px 1fr;
      align-items: center;
      width: 100%;
      margin: 0 0 24px;
      font-size: 12px;
      font-weight: 700;
    }
    .date-label { color: #7a5b39; }
    .date-box { background: #ead7da; padding: 3px 8px; color: #7a5b39; }
    .use-label, .month, .day { text-align: center; font-size: 18px; color: #111; }
    table.order { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #111; }
    table.order col:nth-child(1) { width: 7.5%; }
    table.order col:nth-child(2) { width: 17.5%; }
    table.order col:nth-child(3) { width: 9%; }
    table.order col:nth-child(4) { width: 7.2%; }
    table.order col:nth-child(5) { width: 19%; }
    table.order col:nth-child(6) { width: 7.2%; }
    table.order col:nth-child(7) { width: 5.2%; }
    table.order col:nth-child(8) { width: 7.2%; }
    table.order col:nth-child(9) { width: 9.8%; }
    table.order col:nth-child(10) { width: 10.2%; }
    .order th, .order td {
      height: 7.55mm;
      border: 1px solid #111;
      padding: 2px 4px;
      font-size: 10px;
      line-height: 1.15;
      vertical-align: middle;
      background: #fff;
      overflow: hidden;
    }
    .order th { text-align: center; font-weight: 700; }
    .order td:nth-child(1), .order td:nth-child(3), .order td:nth-child(4), .order td:nth-child(6), .order td:nth-child(7), .order td:nth-child(8), .order td:nth-child(9) { text-align: center; }
    .bottom {
      display: grid;
      grid-template-columns: 1fr 32mm 1fr 48mm 10mm;
      gap: 14mm;
      align-items: start;
      margin-top: 15mm;
    }
    .checker, .totals { border-collapse: collapse; table-layout: fixed; }
    .checker { width: 32mm; }
    .checker td { width: 32mm; height: 7.8mm; border: 2px solid #111; text-align: center; font-size: 11px; font-weight: 700; }
    .checker .blank { height: 15.6mm; font-weight: 400; }
    .totals { width: 48mm; }
    .totals td { height: 7.8mm; border: 2px solid #111; padding: 2px 6px; font-size: 11px; font-weight: 700; }
    .totals td:first-child { width: 32mm; text-align: center; }
    .totals td:last-child { width: 16mm; }
    @page { size: A4 portrait; margin: 0; }
    @media print {
      html, body { width: 210mm; height: 297mm; background: #fff; }
      .app { width: 210mm; padding: 0; }
      .toolbar { display: none; }
      .sheet-wrap { padding: 0; overflow: visible; }
      .sheet { width: 210mm; min-height: 297mm; margin: 0; padding: 18mm 16mm 18mm; box-shadow: none; }
    }
    @media (max-width: 820px) {
      .app { padding: 10px; }
      .sheet-wrap { transform-origin: top left; }
      .sheet { transform-origin: top center; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="toolbar">
      <button type="button" onclick="downloadExcel()">Excel出力</button>
      <button class="secondary" type="button" onclick="window.print()">A4印刷</button>
    </div>

    <div class="sheet-wrap">
      <section class="sheet" aria-label="発注書 兼 納品書">
        <h1 class="title">発注書　兼　納品書</h1>
        <p class="school">スクルドエンジェル</p>
        <p class="garden">たかばり　園</p>

        <div class="date-line">
          <div class="date-label">納品日</div>
          <div class="date-box">令和　　年　　月　　日（　）</div>
          <div class="use-label">使用日</div>
          <div class="month">月</div>
          <div></div>
          <div class="day">日</div>
          <div></div>
        </div>

        <table class="order" aria-label="発注明細">
          <colgroup><col><col><col><col><col><col><col><col><col><col></colgroup>
          <thead>
            <tr>
              <th>チェック</th><th>材料名</th><th>総使用量</th><th>単位</th><th>摘要</th><th>納品数</th><th>単位</th><th>単価</th><th>金額</th><th>産地</th>
            </tr>
          </thead>
          <tbody id="previewRows"></tbody>
        </table>

        <div class="bottom">
          <div></div>
          <table class="checker" aria-label="検品者"><tr><td>検品者</td></tr><tr><td class="blank"></td></tr></table>
          <div></div>
          <table class="totals" aria-label="合計欄">
            <tr><td>合計金額</td><td></td></tr>
            <tr><td>消費税（軽減税率）</td><td></td></tr>
            <tr><td>請求金額</td><td></td></tr>
          </table>
          <div></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const headers = ["チェック", "材料名", "総使用量", "単位", "摘要", "納品数", "単位", "単価", "金額", "産地"];
    const sampleRows = [
      ["", "にんじん", 450, "g", "短冊切り", 1, "kg", 280, 280, "国産"],
      ["", "玉ねぎ", 600, "g", "皮むき", 1, "kg", 230, 230, "北海道"],
      ["", "牛乳", 3000, "ml", "調理用", 3, "本", 210, 630, "国産"]
    ];
    const blankLineCount = 27;

    function renderPreview() {
      const tbody = document.getElementById("previewRows");
      tbody.innerHTML = "";
      const rows = sampleRows.concat(Array.from({ length: blankLineCount }, () => Array(headers.length).fill("")));
      rows.forEach(row => {
        const tr = document.createElement("tr");
        headers.forEach((_, index) => {
          const td = document.createElement("td");
          td.textContent = row[index] ?? "";
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function downloadExcel() {
      if (!window.XLSX) {
        alert("Excel出力ライブラリを読み込めませんでした。インターネット接続を確認して、もう一度開いてください。");
        return;
      }

      const rowCount = 46;
      const aoa = Array.from({ length: rowCount }, () => Array(10).fill(""));
      aoa[1][0] = "発 注 書　兼　納 品 書";
      aoa[2][0] = "スクルドエンジェル";
      aoa[3][0] = "たかばり　園";
      aoa[5][0] = "納品日";
      aoa[5][1] = "令和　　年　　月　　日（　）";
      aoa[5][5] = "使用日";
      aoa[5][6] = "月";
      aoa[5][8] = "日";
      aoa[7] = headers.slice();

      const detailRows = sampleRows.concat(Array.from({ length: blankLineCount }, () => Array(headers.length).fill("")));
      detailRows.forEach((row, index) => {
        aoa[8 + index] = row.slice();
      });
      aoa[41][2] = "検品者";
      aoa[41][7] = "合計金額";
      aoa[42][7] = "消費税（軽減税率）";
      aoa[43][7] = "請求金額";

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!merges"] = [
        { s: { r: 1, c: 0 }, e: { r: 1, c: 9 } },
        { s: { r: 2, c: 0 }, e: { r: 2, c: 9 } },
        { s: { r: 3, c: 0 }, e: { r: 3, c: 9 } },
        { s: { r: 5, c: 1 }, e: { r: 5, c: 3 } },
        { s: { r: 41, c: 2 }, e: { r: 41, c: 3 } },
        { s: { r: 42, c: 2 }, e: { r: 44, c: 3 } },
        { s: { r: 41, c: 7 }, e: { r: 41, c: 8 } },
        { s: { r: 42, c: 7 }, e: { r: 42, c: 8 } },
        { s: { r: 43, c: 7 }, e: { r: 43, c: 8 } }
      ];
      ws["!cols"] = [
        { wch: 7.5 }, { wch: 16.5 }, { wch: 8.5 }, { wch: 6.5 }, { wch: 18.5 },
        { wch: 7 }, { wch: 5 }, { wch: 7 }, { wch: 9 }, { wch: 9.5 }
      ];
      ws["!rows"] = Array.from({ length: rowCount }, (_, index) => {
        if (index === 0) return { hpt: 42 };
        if (index === 1) return { hpt: 24 };
        if (index === 2 || index === 3) return { hpt: 18 };
        if (index === 6) return { hpt: 22 };
        if (index >= 7 && index <= 37) return { hpt: 21.4 };
        if (index >= 41 && index <= 44) return { hpt: 22 };
        return { hpt: 17 };
      });

      const thin = { style: "thin", color: { rgb: "000000" } };
      const medium = { style: "medium", color: { rgb: "000000" } };
      const noBorder = {};
      const baseFont = { name: "Yu Gothic", sz: 10 };

      for (let r = 0; r < rowCount; r += 1) {
        for (let c = 0; c < 10; c += 1) {
          const address = XLSX.utils.encode_cell({ r, c });
          if (!ws[address]) ws[address] = { t: "s", v: "" };
          ws[address].s = {
            font: baseFont,
            alignment: { vertical: "center", horizontal: "center", wrapText: true },
            border: noBorder
          };
        }
      }

      styleRange(ws, 7, 0, 37, 9, {
        font: { name: "Yu Gothic", sz: 10, bold: false },
        alignment: { vertical: "center", horizontal: "center", wrapText: true },
        border: { top: thin, bottom: thin, left: thin, right: thin }
      });
      styleOuterBorder(ws, 7, 0, 37, 9, medium);
      styleRange(ws, 41, 2, 44, 3, { border: { top: medium, bottom: medium, left: medium, right: medium }, alignment: { vertical: "center", horizontal: "center" } });
      styleRange(ws, 41, 7, 43, 9, { border: { top: medium, bottom: medium, left: medium, right: medium }, alignment: { vertical: "center", horizontal: "center", wrapText: true } });
      styleOuterBorder(ws, 41, 2, 44, 3, medium);
      styleOuterBorder(ws, 41, 7, 43, 9, medium);

      setStyle(ws, "A2", { font: { name: "Yu Gothic", sz: 16, bold: true }, alignment: { horizontal: "center", vertical: "center" } });
      setStyle(ws, "A3", { font: { name: "Yu Gothic", sz: 10, bold: true }, alignment: { horizontal: "center", vertical: "center" } });
      setStyle(ws, "A4", { font: { name: "Yu Gothic", sz: 10, bold: true }, alignment: { horizontal: "center", vertical: "center" } });
      setStyle(ws, "A6", { font: { name: "Yu Gothic", sz: 10, bold: true, color: { rgb: "7A5B39" } }, alignment: { horizontal: "center", vertical: "center" } });
      setStyle(ws, "B6", { font: { name: "Yu Gothic", sz: 10, bold: true, color: { rgb: "7A5B39" } }, fill: { fgColor: { rgb: "EAD7DA" } }, alignment: { horizontal: "center", vertical: "center" } });
      ["F6", "G6", "I6"].forEach(address => setStyle(ws, address, { font: { name: "Yu Gothic", sz: 16, bold: true }, alignment: { horizontal: "center", vertical: "center" } }));
      for (let c = 0; c < 10; c += 1) {
        setStyle(ws, XLSX.utils.encode_cell({ r: 7, c }), { font: { name: "Yu Gothic", sz: 10, bold: true }, alignment: { horizontal: "center", vertical: "center" } });
      }
      ["C42", "H42", "H43", "H44"].forEach(address => setStyle(ws, address, { font: { name: "Yu Gothic", sz: 10, bold: true }, alignment: { horizontal: "center", vertical: "center", wrapText: true } }));
      ["I42", "J42", "I43", "J43", "I44", "J44"].forEach(address => setStyle(ws, address, { alignment: { horizontal: "right", vertical: "center" } }));

      ws["J42"] = { t: "n", f: "SUM(I9:I38)", s: ws["J42"].s };
      ws["J43"] = { t: "n", f: "ROUNDDOWN(J42*0.08,0)", s: ws["J43"].s };
      ws["J44"] = { t: "n", f: "J42+J43", s: ws["J44"].s };

      ws["!ref"] = "A1:J46";
      ws["!margins"] = { left: 0.28, right: 0.28, top: 0.35, bottom: 0.35, header: 0.12, footer: 0.12 };
      ws["!pageSetup"] = { paperSize: 9, orientation: "portrait", fitToWidth: 1, fitToHeight: 1 };
      ws["!printOptions"] = { horizontalCentered: true, verticalCentered: false };
      ws["!printHeader"] = [];
      ws["!printFooter"] = [];

      XLSX.utils.book_append_sheet(wb, ws, "発注書");
      XLSX.writeFile(wb, "スクルド発注書_テンプレート.xlsx");
    }

    function styleRange(ws, r1, c1, r2, c2, style) {
      for (let r = r1; r <= r2; r += 1) {
        for (let c = c1; c <= c2; c += 1) {
          const address = XLSX.utils.encode_cell({ r, c });
          ws[address].s = mergeStyle(ws[address].s || {}, style);
        }
      }
    }

    function styleOuterBorder(ws, r1, c1, r2, c2, borderStyle) {
      for (let c = c1; c <= c2; c += 1) {
        patchBorder(ws, r1, c, "top", borderStyle);
        patchBorder(ws, r2, c, "bottom", borderStyle);
      }
      for (let r = r1; r <= r2; r += 1) {
        patchBorder(ws, r, c1, "left", borderStyle);
        patchBorder(ws, r, c2, "right", borderStyle);
      }
    }

    function patchBorder(ws, r, c, side, borderStyle) {
      const address = XLSX.utils.encode_cell({ r, c });
      ws[address].s = ws[address].s || {};
      ws[address].s.border = ws[address].s.border || {};
      ws[address].s.border[side] = borderStyle;
    }

    function setStyle(ws, address, style) {
      ws[address] = ws[address] || { t: "s", v: "" };
      ws[address].s = mergeStyle(ws[address].s || {}, style);
    }

    function mergeStyle(base, next) {
      const merged = { ...base };
      Object.keys(next).forEach(key => {
        merged[key] = typeof next[key] === "object" && !Array.isArray(next[key])
          ? { ...(merged[key] || {}), ...next[key] }
          : next[key];
      });
      return merged;
    }

    renderPreview();
  </script>
</body>
</html>
