<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>献立表OCR 発注書作成</title>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.xlsxLoadError = true"></script>
  <script>
    if (!window.XLSX) {
      document.write('<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: #fff7ed;
      color: #1f2937;
      line-height: 1.7;
    }

    header {
      padding: 20px 16px 10px;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: #fff;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.95;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    section {
      background: #fff;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(154, 52, 18, 0.08);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .note {
      margin: 0 0 12px;
      color: #667085;
      font-size: 14px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 12px 0;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .primary {
      background: #f97316;
    }

    .blue {
      background: #2563eb;
    }

    .green {
      background: #16a34a;
    }

    .gray {
      background: #64748b;
    }

    .red {
      background: #dc2626;
    }

    input[type="file"] {
      display: none;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      background: #fffdf8;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 700;
    }

    #preview {
      display: none;
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      margin-top: 12px;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      background: #fff;
    }

    .file-status {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 10px 0;
      font-size: 13px;
    }

    .file-status div {
      border: 1px solid #fed7aa;
      border-radius: 12px;
      background: #fffdf8;
      padding: 8px;
    }

    .status {
      min-height: 1.8em;
      margin: 10px 0 0;
      color: #475569;
      font-weight: 700;
      font-size: 14px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .summary div {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      padding: 10px;
    }

    .summary span {
      display: block;
      color: #667085;
      font-size: 12px;
    }

    .summary b {
      font-size: 22px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 680px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid #ffedd5;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #ffedd5;
      color: #7c2d12;
      white-space: nowrap;
    }

    td input {
      min-width: 100px;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: #667085;
      border: 1px dashed #fdba74;
      border-radius: 12px;
      background: #fff7ed;
    }

    @media (max-width: 720px) {
      main {
        padding: 12px;
      }

      .buttons,
      .summary,
      .file-status {
        grid-template-columns: 1fr;
      }

      table,
      thead,
      tbody,
      tr,
      td {
        display: block;
        width: 100%;
        min-width: 0;
      }

      thead {
        display: none;
      }

      tr {
        border: 1px solid #ffedd5;
        border-radius: 12px;
        margin-bottom: 10px;
        padding: 10px;
      }

      td {
        border: 0;
        padding: 6px 0;
      }

      td::before {
        content: attr(data-label);
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #667085;
        margin-bottom: 3px;
      }
    }


    @media print {
      body {
        background: #fff;
        color: #000;
      }

      header,
      main section:first-child,
      .buttons,
      .summary,
      .status {
        display: none !important;
      }

      main,
      section {
        max-width: none;
        margin: 0;
        padding: 0;
        border: 0;
        box-shadow: none;
      }

      table {
        min-width: 0;
        font-size: 11px;
      }

      th,
      td {
        border: 1px solid #333;
        padding: 4px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>献立表OCR 発注書作成</h1>
    <p>献立CSV/OCR・園児数CSV・発注ルールCSV → 発注単位に変換 → Excel出力</p>
  </header>

  <main>
    <section>
      <h2>1. 入力データ</h2>
      <p class="note">献立CSVまたはOCR結果、園児数CSV、発注ルールCSVを使います。画像・CSV・Excel作成はブラウザ内で処理します。</p>

      <div class="buttons">
        <button class="blue" type="button" id="menuCsvBtn">📄 献立CSVを選ぶ</button>
        <button class="green" type="button" id="childrenCsvBtn">👶 園児数CSVを選ぶ</button>
        <button class="gray" type="button" id="ruleCsvBtn">⚙️ 発注ルールCSVを選ぶ</button>
        <button class="blue" type="button" id="cameraBtn">📷 献立写真を撮る</button>
        <button class="gray" type="button" id="imageBtn">🖼️ 画像を選ぶ</button>
      </div>

      <input id="menuCsvInput" type="file" accept=".csv,text/csv">
      <input id="childrenCsvInput" type="file" accept=".csv,text/csv">
      <input id="ruleCsvInput" type="file" accept=".csv,text/csv">
      <input id="cameraInput" type="file" accept="image/*" capture="environment">
      <input id="imageInput" type="file" accept="image/*">

      <div class="file-status">
        <div><b>献立</b><br><span id="menuCsvStatus">未選択（OCR/手入力でも可）</span></div>
        <div><b>園児数</b><br><span id="childrenCsvStatus">未選択（1人分として計算）</span></div>
        <div><b>発注ルール</b><br><span id="ruleCsvStatus">コード内の標準ルールを使用</span></div>
      </div>

      <img id="preview" alt="選択した画像">
      <p id="ocrStatus" class="status"></p>

      <label for="ocrText">献立CSV / OCR結果 / 手入力</label>
      <textarea id="ocrText" placeholder="献立CSVまたはOCR結果がここに入ります。食品名・3歳未満児量・単位が分かる形にしてください。"></textarea>

      <div class="buttons">
        <button class="primary" type="button" id="extractBtn">発注数を計算する</button>
        <button class="gray" type="button" id="sampleBtn">サンプルを入れる</button>
        <button class="red" type="button" id="clearBtn">消す</button>
        <button class="gray" type="button" id="retryBtn" disabled>もう一度OCR</button>
      </div>
    </section>

    <section>
      <h2>2. 発注書の確認</h2>

      <div class="summary">
        <div>
          <span>発注食材数</span>
          <b id="itemCount">0</b>
        </div>
        <div>
          <span>合算件数</span>
          <b id="mergedCount">0</b>
        </div>
        <div>
          <span>除外件数</span>
          <b id="excludedCount">0</b>
        </div>
      </div>

      <p id="notice" class="status"></p>

      <div id="tableArea" class="empty">
        まだ食材がありません。
      </div>

      <div class="buttons">
        <button class="gray" type="button" id="addBtn">＋ 発注行を追加</button>
        <button class="green" type="button" id="excelBtn" disabled>発注書Excel（.xlsx）をダウンロード</button>
      </div>
    </section>
  </main>

  <script>
    const aliases = {
      "人参": "にんじん",
      "ニンジン": "にんじん",
      "玉葱": "玉ねぎ",
      "たまねぎ": "玉ねぎ",
      "じゃが芋": "じゃがいも",
      "ジャガイモ": "じゃがいも",
      "馬鈴薯": "じゃがいも",
      "鶏肉": "鶏もも肉",
      "とり肉": "鶏もも肉",
      "豚肉": "豚こま肉",
      "ほうれんそう": "ほうれん草",
      "ホウレン草": "ほうれん草",
      "椎茸": "しいたけ",
      "リンゴ": "りんご",
      "林檎": "りんご",
      "たまご": "卵"
    };

    const standardOrderRules = [
      { names: ["米", "ごはん", "精白米", "白米"], exclude: true, reason: "米は発注対象外" },
      { names: ["だし汁", "だし", "出汁", "かつおだし", "昆布だし"], exclude: true, reason: "だし汁は発注対象外" },
      { names: ["しょうゆ", "醤油", "塩", "砂糖", "酢", "みそ", "味噌", "油", "サラダ油", "ごま油", "酒", "みりん", "こしょう", "ソース", "ケチャップ", "マヨネーズ"], exclude: true, reason: "調味料は発注対象外" },
      { names: ["牛乳"], orderUnit: "本", packageQuantity: 450, packageUnit: "ml", fixedOrderQuantity: 2, note: "450ml×2本" },
      { names: ["キャベツ"], orderUnit: "個", packageQuantity: 1200, packageUnit: "g", roundStep: 0.25, note: "1/4個単位" },
      { names: ["白菜"], orderUnit: "個", packageQuantity: 2000, packageUnit: "g", roundStep: 0.125, note: "1/8個単位" },
      { names: ["ツナ", "コーン缶", "トマト缶", "みかん缶", "缶詰"], orderUnit: "缶", packageQuantity: 1, packageUnit: "缶", roundStep: 1, note: "缶単位" },
      { names: ["しめじ", "えのき", "しいたけ", "まいたけ", "エリンギ", "なめこ"], orderUnit: "袋", packageQuantity: 100, packageUnit: "g", roundStep: 1, note: "きのこ類は1袋単位" },
      { names: ["豆腐"], orderUnit: "丁", packageQuantity: 300, packageUnit: "g", roundStep: 1, note: "300g=1丁で換算" },
      { names: ["卵"], orderUnit: "個", packageQuantity: 1, packageUnit: "個", roundStep: 1, note: "個単位" },
      { names: ["食パン", "ロールパン"], orderUnit: "袋", packageQuantity: 1, packageUnit: "袋", roundStep: 1, note: "袋単位" },
      { names: ["にんじん", "玉ねぎ", "じゃがいも", "大根", "きゅうり", "トマト", "ミニトマト", "ほうれん草", "小松菜", "ブロッコリー", "ピーマン", "かぼちゃ", "なす", "レタス", "もやし", "ねぎ", "長ねぎ"], orderUnit: "kg", packageQuantity: 1000, packageUnit: "g", roundStep: 0.1, note: "野菜はkg換算" },
      { names: ["鶏もも肉", "鶏むね肉", "鶏ひき肉", "豚こま肉", "豚ひき肉", "牛肉", "鮭", "さけ", "さば", "たら", "しらす", "ちくわ", "かまぼこ"], orderUnit: "kg", packageQuantity: 1000, packageUnit: "g", roundStep: 0.1, note: "肉・魚はkg換算" },
      { names: ["ヨーグルト", "チーズ"], orderUnit: "個", packageQuantity: 1, packageUnit: "個", roundStep: 1, note: "商品単位を確認" },
      { names: ["りんご", "オレンジ", "バナナ", "みかん", "いちご"], orderUnit: "個", packageQuantity: 1, packageUnit: "個", roundStep: 1, note: "果物は個単位" },
      { names: ["小麦粉", "片栗粉", "パン粉", "うどん", "スパゲティ", "マカロニ"], orderUnit: "kg", packageQuantity: 1000, packageUnit: "g", roundStep: 0.1, note: "乾物はkg換算" }
    ];

    const ingredients = Array.from(new Set(standardOrderRules.flatMap(rule => rule.names).concat(Object.keys(aliases)))).sort((a, b) => b.length - a.length);

    const headerWords = ["日付", "曜日", "献立", "献立名", "昼食", "おやつ", "午前", "午後", "材料", "食品名", "食材名", "数量", "分量", "単位", "備考"];

    const sampleText =
      "日付,献立名,食品名,3歳未満児量,単位\n" +
      "5/1,昼食,鶏もも肉,40,g\n" +
      "5/1,昼食,にんじん,15,g\n" +
      "5/1,昼食,キャベツ,80,g\n" +
      "5/1,昼食,白菜,60,g\n" +
      "5/1,昼食,しめじ,25,g\n" +
      "5/1,昼食,米,50,g\n" +
      "5/1,おやつ,牛乳,100,ml\n" +
      "5/1,おやつ,りんご,0.5,個";

    let lastImage = null;
    let rows = [];
    let childrenCount = 1;
    let customOrderRules = [];
    let stats = { merged: 0, excluded: 0 };

    const cameraBtn = document.getElementById("cameraBtn");
    const imageBtn = document.getElementById("imageBtn");
    const menuCsvBtn = document.getElementById("menuCsvBtn");
    const childrenCsvBtn = document.getElementById("childrenCsvBtn");
    const ruleCsvBtn = document.getElementById("ruleCsvBtn");
    const retryBtn = document.getElementById("retryBtn");
    const extractBtn = document.getElementById("extractBtn");
    const sampleBtn = document.getElementById("sampleBtn");
    const clearBtn = document.getElementById("clearBtn");
    const addBtn = document.getElementById("addBtn");
    const excelBtn = document.getElementById("excelBtn");

    const cameraInput = document.getElementById("cameraInput");
    const imageInput = document.getElementById("imageInput");
    const menuCsvInput = document.getElementById("menuCsvInput");
    const childrenCsvInput = document.getElementById("childrenCsvInput");
    const ruleCsvInput = document.getElementById("ruleCsvInput");
    const menuCsvStatus = document.getElementById("menuCsvStatus");
    const childrenCsvStatus = document.getElementById("childrenCsvStatus");
    const ruleCsvStatus = document.getElementById("ruleCsvStatus");
    const preview = document.getElementById("preview");
    const ocrText = document.getElementById("ocrText");
    const ocrStatus = document.getElementById("ocrStatus");
    const notice = document.getElementById("notice");
    const tableArea = document.getElementById("tableArea");

    const itemCount = document.getElementById("itemCount");
    const mergedCount = document.getElementById("mergedCount");
    const excludedCount = document.getElementById("excludedCount");

    menuCsvBtn.addEventListener("click", () => menuCsvInput.click());
    childrenCsvBtn.addEventListener("click", () => childrenCsvInput.click());
    ruleCsvBtn.addEventListener("click", () => ruleCsvInput.click());
    cameraBtn.addEventListener("click", () => cameraInput.click());
    imageBtn.addEventListener("click", () => imageInput.click());
    retryBtn.addEventListener("click", () => lastImage && runOcr(lastImage));
    extractBtn.addEventListener("click", extractAndRender);
    sampleBtn.addEventListener("click", () => {
      ocrText.value = sampleText;
      menuCsvStatus.textContent = "サンプルを使用中";
      extractAndRender();
    });
    clearBtn.addEventListener("click", clearAll);
    addBtn.addEventListener("click", addRow);
    excelBtn.addEventListener("click", downloadExcel);

    menuCsvInput.addEventListener("change", e => loadMenuCsv(e.target.files[0]));
    childrenCsvInput.addEventListener("change", e => loadChildrenCsv(e.target.files[0]));
    ruleCsvInput.addEventListener("change", e => loadRuleCsv(e.target.files[0]));
    cameraInput.addEventListener("change", e => handleImage(e.target.files[0]));
    imageInput.addEventListener("change", e => handleImage(e.target.files[0]));

    async function readTextFile(file) {
      if (!file) return "";
      const buffer = await file.arrayBuffer();
      const utf8 = new TextDecoder("utf-8", { fatal: false }).decode(buffer);
      if (utf8.includes("�")) {
        try {
          return new TextDecoder("shift_jis").decode(buffer);
        } catch (error) {
          return utf8;
        }
      }
      return utf8;
    }

    async function loadMenuCsv(file) {
      if (!file) return;
      ocrText.value = await readTextFile(file);
      menuCsvStatus.textContent = file.name;
      notice.textContent = "献立CSVを読み込みました。必要なら内容を確認してから計算してください。";
      extractAndRender();
    }

    async function loadChildrenCsv(file) {
      if (!file) return;
      const text = await readTextFile(file);
      childrenCount = parseChildrenCount(text);
      childrenCsvStatus.textContent = file.name + "（3歳未満児 " + childrenCount + "人）";
      notice.textContent = "園児数CSVを読み込みました。3歳未満児 " + childrenCount + "人で計算します。";
      if (ocrText.value.trim()) extractAndRender();
    }

    async function loadRuleCsv(file) {
      if (!file) return;
      const text = await readTextFile(file);
      customOrderRules = parseRuleCsv(text);
      ruleCsvStatus.textContent = file.name + "（" + customOrderRules.length + "件）";
      notice.textContent = "発注ルールCSVを読み込みました。標準ルールより優先します。";
      if (ocrText.value.trim()) extractAndRender();
    }

    function parseChildrenCount(text) {
      const csvRows = parseCsv(text);
      if (csvRows.length === 0) return 1;
      const header = csvRows[0].map(value => value.trim());
      const dataRows = csvRows.slice(1).filter(row => row.some(Boolean));
      const targetIndex = header.findIndex(name => /3歳未満|３歳未満|未満児|0歳|１歳|1歳|２歳|2歳/.test(name));

      if (targetIndex >= 0) {
        const total = dataRows.reduce((sum, row) => sum + numberValue(row[targetIndex]), 0);
        return total > 0 ? total : 1;
      }

      const total = csvRows.flat().reduce((sum, value) => sum + numberValue(value), 0);
      return total > 0 ? total : 1;
    }

    function parseRuleCsv(text) {
      const csvRows = parseCsv(text);
      if (csvRows.length < 2) return [];
      const header = csvRows[0].map(normalizeHeader);
      const find = names => header.findIndex(value => names.includes(value));
      const nameIndex = find(["材料名", "食材名", "食品名", "name"]);
      const orderUnitIndex = find(["発注単位", "納品単位", "単位", "orderunit"]);
      const packageQuantityIndex = find(["入数", "換算量", "基準量", "packagequantity"]);
      const packageUnitIndex = find(["基準単位", "換算単位", "packageunit"]);
      const roundStepIndex = find(["丸め単位", "発注刻み", "roundstep"]);
      const excludeIndex = find(["除外", "対象外", "exclude"]);
      const noteIndex = find(["摘要", "備考", "note"]);

      return csvRows.slice(1).map(row => {
        const name = row[nameIndex] || "";
        return {
          names: name.split(/[、|｜/]/).map(value => normalizeName(value)).filter(Boolean),
          orderUnit: row[orderUnitIndex] || "",
          packageQuantity: numberValue(row[packageQuantityIndex]) || 1,
          packageUnit: row[packageUnitIndex] || row[orderUnitIndex] || "個",
          roundStep: numberValue(row[roundStepIndex]) || 1,
          exclude: /^(1|true|yes|除外|対象外)$/i.test(String(row[excludeIndex] || "").trim()),
          reason: row[noteIndex] || "発注ルールCSVで除外",
          note: row[noteIndex] || "発注ルールCSV"
        };
      }).filter(rule => rule.names.length > 0);
    }

    function handleImage(file) {
      if (!file) return;
      lastImage = file;
      retryBtn.disabled = false;
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      runOcr(file);
    }

    async function runOcr(file) {
      if (!window.Tesseract) {
        ocrStatus.textContent = "OCRライブラリを読み込めませんでした。ネット接続を確認してください。";
        return;
      }

      setWorking(true);
      ocrStatus.textContent = "OCRを開始します。初回は時間がかかることがあります。";

      try {
        const result = await Tesseract.recognize(file, "jpn+eng", {
          logger: message => {
            if (message.status === "recognizing text") {
              ocrStatus.textContent = "OCR中です：" + Math.round(message.progress * 100) + "%";
            }
          }
        });

        ocrText.value = result.data.text.trim();
        menuCsvStatus.textContent = "OCR結果を使用中";
        ocrStatus.textContent = "OCRが終わりました。内容を確認してください。";
        extractAndRender();
      } catch (error) {
        ocrStatus.textContent = "OCRに失敗しました。画像を撮り直すか、文字を手入力してください。";
      } finally {
        setWorking(false);
      }
    }

    function setWorking(isWorking) {
      cameraBtn.disabled = isWorking;
      imageBtn.disabled = isWorking;
      menuCsvBtn.disabled = isWorking;
      childrenCsvBtn.disabled = isWorking;
      ruleCsvBtn.disabled = isWorking;
      retryBtn.disabled = isWorking || !lastImage;
      extractBtn.disabled = isWorking;
    }

    function extractAndRender() {
      const text = ocrText.value.trim();
      if (!text) {
        notice.textContent = "献立CSV、OCR結果、または献立の文字を入力してください。";
        return;
      }

      const result = extractIngredients(text);
      rows = result.rows;
      stats = result.stats;
      renderTable();
      updateSummary();

      notice.textContent = rows.length
        ? "3歳未満児 " + childrenCount + "人分で発注数を計算しました。内容を確認して、必要なら修正してください。"
        : "発注対象の食材を見つけられませんでした。米・調味料・だし汁だけの場合は除外されます。";
    }

    function extractIngredients(text) {
      const totals = new Map();
      let foundCount = 0;
      let excludedCount = 0;
      const parsedRows = parseCsv(text);
      const hasCsvHeader = parsedRows.length > 1 && parsedRows[0].some(cell => /食品名|食材名|材料名/.test(cell));
      const sourceRows = hasCsvHeader ? rowsFromCsv(parsedRows) : rowsFromText(text);

      for (const source of sourceRows) {
        const name = normalizeName(source.name);
        if (!name || headerWords.includes(name)) continue;
        const rule = findOrderRule(name);
        if (rule && rule.exclude) {
          excludedCount++;
          continue;
        }

        foundCount++;
        const key = name + "__" + source.unit;
        const current = totals.get(key) || { name, quantity: 0, unit: source.unit, count: 0 };
        current.quantity += source.quantity * childrenCount;
        current.count += 1;
        totals.set(key, current);
      }

      const outputRows = Array.from(totals.values()).map(item => toOrderRow(item)).sort((a, b) => a.name.localeCompare(b.name, "ja"));
      return {
        rows: outputRows,
        stats: {
          merged: Math.max(0, foundCount - outputRows.length),
          excluded: excludedCount
        }
      };
    }

    function rowsFromCsv(csvRows) {
      const header = csvRows[0].map(normalizeHeader);
      const nameIndex = findHeaderIndex(header, ["食品名", "食材名", "材料名", "name"]);
      const under3Index = findHeaderIndex(header, ["3歳未満児量", "３歳未満児量", "3歳未満", "３歳未満", "未満児量", "未満児", "under3"]);
      const quantityIndex = under3Index >= 0 ? under3Index : findHeaderIndex(header, ["数量", "分量", "使用量", "量", "quantity"]);
      const unitIndex = findHeaderIndex(header, ["単位", "unit"]);

      return csvRows.slice(1).flatMap(row => {
        const rawName = row[nameIndex] || "";
        const names = findNames(rawName).length ? findNames(rawName) : [rawName];
        return names.map(name => ({
          name: normalizeName(name),
          quantity: numberValue(row[quantityIndex]) || 1,
          unit: normalizeUnit(row[unitIndex] || findAmount(row.join(",")).unit)
        }));
      }).filter(row => row.name);
    }

    function rowsFromText(text) {
      const output = [];
      const lines = text.replace(/\r/g, "\n").split("\n").map(line => line.trim()).filter(Boolean);
      for (const line of lines) {
        const compact = line.replace(/\s/g, "");
        if (!compact || headerWords.includes(compact)) continue;
        const foundNames = findNames(line);
        if (foundNames.length === 0) continue;
        const amount = findAmount(line);
        for (const rawName of foundNames) {
          output.push({ name: normalizeName(rawName), quantity: amount.quantity, unit: amount.unit });
        }
      }
      return output;
    }

    function toOrderRow(item) {
      const rule = findOrderRule(item.name) || defaultRule(item.unit);
      const converted = convertToOrderQuantity(item.quantity, item.unit, rule);
      const noteParts = [];
      if (item.count > 1) noteParts.push(item.count + "件を合算");
      if (rule.note) noteParts.push(rule.note);
      if (converted.warning) noteParts.push(converted.warning);

      return {
        checked: "□",
        name: item.name,
        totalQuantity: round(item.quantity),
        totalUnit: item.unit,
        note: noteParts.join(" / "),
        orderQuantity: converted.quantity,
        orderUnit: converted.unit,
        unitPrice: "",
        amount: "",
        origin: ""
      };
    }

    function convertToOrderQuantity(quantity, unit, rule) {
      if (rule.fixedOrderQuantity) {
        return { quantity: rule.fixedOrderQuantity, unit: rule.orderUnit || "本" };
      }

      const normalizedUnit = normalizeUnit(unit);
      let baseQuantity = quantity;
      let warning = "";
      if (normalizedUnit !== rule.packageUnit) {
        baseQuantity = convertUnit(quantity, normalizedUnit, rule.packageUnit);
      }
      if (baseQuantity === null) {
        baseQuantity = quantity;
        warning = "単位換算は要確認";
      }

      const rawOrderQuantity = baseQuantity / (rule.packageQuantity || 1);
      return {
        quantity: roundUp(rawOrderQuantity, rule.roundStep || 1),
        unit: rule.orderUnit || normalizedUnit,
        warning
      };
    }

    function convertUnit(quantity, fromUnit, toUnit) {
      if (fromUnit === toUnit) return quantity;
      if (fromUnit === "kg" && toUnit === "g") return quantity * 1000;
      if (fromUnit === "g" && toUnit === "kg") return quantity / 1000;
      if (fromUnit === "L" && toUnit === "ml") return quantity * 1000;
      if (fromUnit === "ml" && toUnit === "L") return quantity / 1000;
      return null;
    }

    function defaultRule(unit) {
      const normalizedUnit = normalizeUnit(unit);
      return {
        orderUnit: normalizedUnit,
        packageQuantity: 1,
        packageUnit: normalizedUnit,
        roundStep: normalizedUnit === "g" || normalizedUnit === "ml" ? 100 : 1,
        note: "標準ルール（要確認）"
      };
    }

    function findOrderRule(name) {
      const normalizedName = normalizeName(name);
      const rules = customOrderRules.concat(standardOrderRules);
      return rules.find(rule => rule.names.some(ruleName => normalizedName === normalizeName(ruleName) || normalizedName.includes(normalizeName(ruleName))));
    }

    function findNames(line) {
      const compact = line.replace(/[\s,，、|｜\t]/g, "");
      const found = [];
      for (const word of ingredients) {
        if (compact.includes(word)) {
          const normalized = normalizeName(word);
          if (!found.some(name => normalizeName(name) === normalized)) found.push(word);
        }
      }
      return found.filter(name => {
        const normalized = normalizeName(name);
        return !found.some(other => {
          const otherNormalized = normalizeName(other);
          return otherNormalized !== normalized && otherNormalized.includes(normalized);
        });
      });
    }

    function findAmount(line) {
      const normalizedLine = normalizeAmountText(line);
      const numberPattern = "([0-9]+(?:\\.[0-9]+)?)";
      const unitPattern = "(kg|g|ml|l|L|個|本|袋|缶|丁)";
      const explicitMatch = normalizedLine.match(new RegExp(numberPattern + "[\\s,，、|｜:：]*" + unitPattern, "i"));
      if (explicitMatch) {
        return { quantity: Number(explicitMatch[1]), unit: normalizeUnit(explicitMatch[2]) };
      }

      const numbers = normalizedLine.match(/(?<![0-9/])([0-9]+(?:\.[0-9]+)?)(?![0-9/])/g);
      const quantity = numbers && numbers.length ? Number(numbers[numbers.length - 1]) : 1;
      return { quantity: Number.isFinite(quantity) ? quantity : 1, unit: "個" };
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      const normalized = String(text || "").replace(/^\uFEFF/, "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      for (let i = 0; i < normalized.length; i++) {
        const char = normalized[i];
        const next = normalized[i + 1];
        if (char === '"') {
          if (quoted && next === '"') {
            cell += '"';
            i++;
          } else {
            quoted = !quoted;
          }
        } else if (char === "," && !quoted) {
          row.push(cell.trim());
          cell = "";
        } else if (char === "\n" && !quoted) {
          row.push(cell.trim());
          if (row.some(Boolean)) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }
      row.push(cell.trim());
      if (row.some(Boolean)) rows.push(row);
      return rows;
    }

    function findHeaderIndex(header, candidates) {
      return header.findIndex(value => candidates.includes(value) || candidates.some(candidate => value.includes(candidate)));
    }

    function normalizeHeader(value) {
      return String(value || "").trim().replace(/\s/g, "").toLowerCase();
    }

    function normalizeAmountText(text) {
      return String(text || "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/．/g, ".")
        .replace(/[Ｋｋ]/g, "k")
        .replace(/[Ｇｇ]/g, "g")
        .replace(/[Ｍｍ]/g, "m")
        .replace(/[Ｌｌ]/g, "l");
    }

    function normalizeUnit(unit) {
      const normalized = String(unit || "").trim().toLowerCase();
      if (normalized === "l") return "L";
      if (["kg", "g", "ml", "個", "本", "袋", "缶", "丁"].includes(normalized)) return normalized;
      return normalized || "個";
    }

    function normalizeName(name) {
      const trimmed = String(name || "").trim();
      return aliases[trimmed] || trimmed;
    }

    function numberValue(value) {
      const normalized = normalizeAmountText(value).replace(/,/g, "");
      const match = normalized.match(/-?[0-9]+(?:\.[0-9]+)?/);
      return match ? Number(match[0]) : 0;
    }

    function round(value) {
      return Math.round(value * 1000) / 1000;
    }

    function roundUp(value, step) {
      const safeStep = step || 1;
      return round(Math.ceil((value - 0.0000001) / safeStep) * safeStep);
    }

    function renderTable() {
      if (rows.length === 0) {
        tableArea.className = "empty";
        tableArea.textContent = "まだ食材がありません。";
        excelBtn.disabled = true;
        return;
      }

      tableArea.className = "table-wrap";
      tableArea.innerHTML =
        "<table>" +
          "<thead><tr>" +
            "<th>チェック</th><th>材料名</th><th>総使用量</th><th>単位</th><th>摘要</th><th>納品数</th><th>単位</th><th>単価</th><th>金額</th><th>産地</th><th>操作</th>" +
          "</tr></thead>" +
          "<tbody>" + rows.map((row, index) => rowHtml(row, index)).join("") + "</tbody>" +
        "</table>";

      tableArea.querySelectorAll("input").forEach(input => input.addEventListener("input", syncRows));
      tableArea.querySelectorAll("[data-delete]").forEach(button => button.addEventListener("click", () => deleteRow(Number(button.dataset.delete))));
      excelBtn.disabled = false;
    }

    function rowHtml(row, index) {
      const cells = [
        ["チェック", "checked"], ["材料名", "name"], ["総使用量", "totalQuantity", "number"], ["単位", "totalUnit"], ["摘要", "note"],
        ["納品数", "orderQuantity", "number"], ["単位", "orderUnit"], ["単価", "unitPrice", "number"], ["金額", "amount", "number"], ["産地", "origin"]
      ];
      return "<tr>" + cells.map(([label, field, type]) => {
        const step = field === "totalQuantity" || field === "orderQuantity" ? "0.001" : "1";
        return '<td data-label="' + label + '"><input ' + (type === "number" ? 'type="number" step="' + step + '" ' : "") + 'data-index="' + index + '" data-field="' + field + '" value="' + escapeHtml(row[field] ?? "") + '"></td>';
      }).join("") + '<td data-label="操作"><button class="red" type="button" data-delete="' + index + '">削除</button></td></tr>';
    }

    function syncRows() {
      const next = rows.map(row => ({ ...row }));
      tableArea.querySelectorAll("input[data-index]").forEach(input => {
        const index = Number(input.dataset.index);
        const field = input.dataset.field;
        if (!next[index]) return;
        next[index][field] = ["totalQuantity", "orderQuantity", "unitPrice", "amount"].includes(field) ? (input.value === "" ? "" : Number(input.value)) : input.value;
      });
      rows = next;
      updateSummary();
    }

    function addRow() {
      syncRowsIfNeeded();
      rows.push({ checked: "□", name: "", totalQuantity: 1, totalUnit: "個", note: "手入力", orderQuantity: 1, orderUnit: "個", unitPrice: "", amount: "", origin: "" });
      renderTable();
      updateSummary();
      notice.textContent = "発注行を追加しました。";
    }

    function deleteRow(index) {
      syncRowsIfNeeded();
      rows.splice(index, 1);
      renderTable();
      updateSummary();
      notice.textContent = "発注行を削除しました。";
    }

    function syncRowsIfNeeded() {
      if (tableArea.querySelector("table")) syncRows();
    }

    function updateSummary() {
      const validRows = rows.filter(row => String(row.name || "").trim());
      itemCount.textContent = validRows.length;
      mergedCount.textContent = stats.merged;
      excludedCount.textContent = stats.excluded;
      excelBtn.disabled = validRows.length === 0;
    }

    function downloadExcel() {
      syncRowsIfNeeded();
      const headers = ["チェック", "材料名", "総使用量", "単位", "摘要", "納品数", "単位", "単価", "金額", "産地"];
      const excelRows = rows.filter(row => String(row.name || "").trim()).map(row => [
        row.checked || "□", String(row.name || "").trim(), Number(row.totalQuantity || 0), row.totalUnit || "", row.note || "",
        Number(row.orderQuantity || 0), row.orderUnit || "", row.unitPrice || "", row.amount || "", row.origin || ""
      ]);

      if (excelRows.length === 0) {
        notice.textContent = "Excelにする食材がありません。";
        return;
      }
      if (!isXlsxReady()) {
        notice.textContent = "Excel作成ライブラリを読み込めませんでした。ネット接続を確認してから、ページを再読み込みしてください。";
        return;
      }

      try {
        const worksheet = XLSX.utils.aoa_to_sheet([headers].concat(excelRows));
        worksheet["!cols"] = [{ wch: 8 }, { wch: 22 }, { wch: 10 }, { wch: 8 }, { wch: 30 }, { wch: 10 }, { wch: 8 }, { wch: 10 }, { wch: 10 }, { wch: 14 }];
        worksheet["!rows"] = [{ hpt: 24 }];
        worksheet["!autofilter"] = { ref: "A1:J" + (excelRows.length + 1) };
        worksheet["!margins"] = { left: 0.3, right: 0.3, top: 0.5, bottom: 0.5, header: 0.2, footer: 0.2 };
        worksheet["!pageSetup"] = { orientation: "landscape", fitToWidth: 1, fitToHeight: 0 };

        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "発注書");
        const fileName = "発注書_" + formatDate(new Date()) + ".xlsx";
        XLSX.writeFile(workbook, fileName, { bookType: "xlsx", type: "binary" });
        notice.textContent = "発注書Excelをダウンロードしました。印刷は横向き・1ページ幅に設定しています。";
      } catch (error) {
        notice.textContent = "Excelの作成に失敗しました。もう一度お試しください。";
        console.error("Excel作成エラー", error);
      }
    }

    function isXlsxReady() {
      return Boolean(window.XLSX && XLSX.utils && typeof XLSX.utils.aoa_to_sheet === "function" && typeof XLSX.utils.book_new === "function" && typeof XLSX.utils.book_append_sheet === "function" && typeof XLSX.writeFile === "function");
    }

    function clearAll() {
      lastImage = null;
      rows = [];
      childrenCount = 1;
      customOrderRules = [];
      stats = { merged: 0, excluded: 0 };
      ocrText.value = "";
      ocrStatus.textContent = "";
      notice.textContent = "入力を消しました。";
      menuCsvStatus.textContent = "未選択（OCR/手入力でも可）";
      childrenCsvStatus.textContent = "未選択（1人分として計算）";
      ruleCsvStatus.textContent = "コード内の標準ルールを使用";
      preview.removeAttribute("src");
      preview.style.display = "none";
      cameraInput.value = "";
      imageInput.value = "";
      menuCsvInput.value = "";
      childrenCsvInput.value = "";
      ruleCsvInput.value = "";
      retryBtn.disabled = true;
      renderTable();
      updateSummary();
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return year + month + day;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[char]));
    }
  </script>
</body>
