      return /^[0-9]+(?:\.[0-9]+)?$/.test(quantity) && numberValue(quantity) >= 0;
    }

    function isNumericCell(value) {
      const quantity = normalizeQuantity(value).replace(/,/g, "");
      return /^[0-9]+(?:\.[0-9]+)?$/.test(quantity) && numberValue(quantity) > 0;
    }

    function ingredientNameLeftOfColumn(cells, quantityIndex) {
      const nameParts = [];
      for (let index = quantityIndex - 1; index >= 0; index--) {
        const cell = normalizeOcrLine(cells[index]);
        const text = cell.replace(/\s/g, "");
        if (!text) continue;
        if (detectWeekday(cell) || isKnownUnit(text)) continue;
        if (/日付|曜日|献立日|使用日|単位|3歳未満|３歳未満|未満児|乳児|食材|食品|材料|品名|食料|料理名/.test(text)) break;
        nameParts.unshift(cell);
      }
      return nameParts.join(" ").trim();
    }

    function ingredientNameBeforeQuantity(rowText, quantity) {
      const normalized = normalizeOcrLine(rowText);
      const quantityText = escapeRegExp(normalizeOcrLine(quantity));
      const match = normalized.match(new RegExp(quantityText));
      if (!match || match.index === undefined) return "";
      return normalized.slice(0, match.index)
        .replace(new RegExp("(?:" + unitNames().map(escapeRegExp).join("|") + ")\\s*$", "i"), " ")
        .trim();
    }

    function unitNames() {
      return ["kg", "ｋｇ", "KG", "㎏", "キロ", "g", "ｇ", "G", "グラム", "ｍｌ", "ml", "ML", "cc", "L", "l", "リットル", "個", "本", "袋", "パック", "玉", "束", "枚", "缶", "箱", "尾", "切", "片", "丁", "株", "房", "杯", "膳", "食", "人前"];
    }

    function isQuantity(value) {
      return /^[0-9０-９]+(?:[.,．][0-9０-９]+)?$/.test(String(value || "").trim());
    }

    function isKnownUnit(value) {
      const normalized = normalizeUnit(value).toLowerCase();
      return unitNames().map(unit => normalizeUnit(unit).toLowerCase()).includes(normalized);
    }

    function isIgnoredPdfLine(line) {
      return /OCR全文|発注書|納品書|納品日|使用日|検品者|合計|金額|単価|摘要|チェック|ページ|スクルドエンジェル|たかばり|請求|消費税|小計|担当|取引先|電話|FAX|〒|住所/.test(line);
    }

    function isSentenceNoise(line) {
      return recipeInstructionPattern.test(String(line || "")) || /を塗って|してください|しましょう|します|しました|です|ます|もう|食べる|食べます/.test(String(line || ""));
    }

    function scoreOcrText(result) {
      const text = String(result.text || "").trim();
      const japaneseCount = countJapaneseCharacters(text);
      const digitCount = countMatches(text, /[0-9０-９]/g);
      const unitCount = countUnitMentions(text);
      const garbled = isGarbledText(text);
      const confidence = Number(result.confidence) || 0;
      const score = text ? (japaneseCount * 3) + (digitCount * 2) + (unitCount * 8) + confidence - (garbled ? 500 : 0) : -100000;
      return { ...result, text, japaneseCount, digitCount, unitCount, garbled, score };
    }

    function countUnitMentions(value) {
      const escapedUnits = unitNames().map(unit => unit.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|");
      return countMatches(value, new RegExp("(" + escapedUnits + ")", "gi"));
    }

    function isGarbledText(value) {
      const text = String(value || "");
      const compact = text.replace(/\s/g, "");
      const length = compact.length;
      if (!length) return true;
      const replacementCount = countMatches(compact, /�/g);
      const boxCount = countMatches(compact, /□/g);
      const japaneseCount = countMatches(compact, /[ぁ-んァ-ヶ一-龠々]/g);
      const symbolCount = countMatches(compact, /[^ぁ-んァ-ヶ一-龠々a-zA-Z0-9０-９ーｰ－.,，.．・/／()（）\[\]【】%％kgＫＧｋｇmlＭＬｍｌccＣＣ]/g);
      const japaneseRatio = japaneseCount / length;
      const boxRatio = boxCount / length;
      const symbolRatio = symbolCount / length;

      const mojibakeCount = countMatches(compact, /[�□■◇◆○●◎�]/g);
      const latinCount = countMatches(compact, /[a-zA-Z]/g);
      const digitCount = countMatches(compact, /[0-9０-９]/g);
      const readableCount = japaneseCount + latinCount + digitCount;
      const readableRatio = readableCount / length;

      return replacementCount > 0 || mojibakeCount >= 8 || boxCount >= 15 || (boxCount >= 5 && boxRatio > 0.08) ||
        (length >= 12 && readableRatio < 0.45) || (length >= 20 && japaneseRatio < 0.03) || (length >= 20 && symbolRatio > 0.22);
    }

    function isSuspiciousIngredientName(value) {
      const name = String(value || "").trim();
      const compact = name.replace(/\s/g, "");
      if (!compact) return true;
      const length = compact.length;
      const japaneseCount = countMatches(compact, /[ぁ-んァ-ヶ一-龠々]/g);
      const symbolCount = countMatches(compact, /[^ぁ-んァ-ヶ一-龠々a-zA-Z0-9０-９ーｰ－・/／()（）]/g);
      const digitCount = countMatches(compact, /[0-9０-９]/g);
      return /�/.test(compact) || countMatches(compact, /[□■◇◆]/g) >= 2 ||
        (length >= 4 && japaneseCount === 0) || (length >= 3 && symbolCount / length > 0.28) ||
        (length >= 3 && digitCount > japaneseCount);
    }

    function escapeRegExp(value) {
      return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function countMatches(value, pattern) {
      const matches = String(value || "").match(pattern);
      return matches ? matches.length : 0;
    }

    function countJapaneseCharacters(value) {
      return countMatches(value, /[ぁ-んァ-ヶ一-龠々]/g);
    }

    function cleanIngredientName(value) {
      const cleaned = stripNonIngredientPrefix(value)
        .replace(/OCR全文/g, " ")
        .replace(/月曜日|火曜日|水曜日|木曜日|金曜日|[月火水木金]曜/g, " ")
        .replace(/^[月火水木金]\s+/, "")
        .replace(/^[0-9０-９]+[.)）．、\s]+/, "")
        .replace(/^[□■◇◆☑✓・*\-－—\s]+/, "")
        .replace(/[：:].*$/, "")
        .replace(/\s+/g, " ")
        .trim();
      return correctIngredientName(cleaned);
    }

    function correctIngredientName(name) {
      return correctedIngredientFromText(name) || String(name || "").trim();
    }

    function correctedIngredientFromText(value) {
      const compact = normalizeOcrLine(value).replace(/\s/g, "");
      if (!compact || isSentenceNoise(compact)) return "";
      const matched = canonicalIngredientPatterns.find(rule => rule.tests.some(pattern => pattern.test(compact)));
      if (matched) return matched.label;
      const partial = canonicalIngredientPatterns.find(rule => (rule.aliases || []).some(alias => {
        const aliasKey = ingredientSimilarityKey(alias);
        const compactKey = ingredientSimilarityKey(compact);
        return aliasKey.length >= 2 && compactKey.length >= 2 && (compactKey.includes(aliasKey) || aliasKey.includes(compactKey));
      }));
      if (partial) return partial.label;
      const similar = mostSimilarCanonicalIngredient(compact);
      return similar ? similar.label : "";
    }

    function ingredientSimilarityKey(value) {
      return normalizeOcrLine(value)
        .replace(/[ァ-ヶ]/g, char => String.fromCharCode(char.charCodeAt(0) - 0x60))
        .replace(/[^ぁ-ん一-龠々]/g, "");
    }

    function mostSimilarCanonicalIngredient(value) {
      const compactKey = ingredientSimilarityKey(value);
      if (compactKey.length < 2 || compactKey.length > 10) return null;
      let best = null;
      canonicalIngredientPatterns.forEach(rule => {
        (rule.aliases || [rule.label]).forEach(alias => {
          const aliasKey = ingredientSimilarityKey(alias);
          if (aliasKey.length < 2) return;
          const distance = levenshteinDistance(compactKey, aliasKey);
          const maxAllowed = Math.min(2, Math.max(1, Math.floor(aliasKey.length / 3)));
          if (distance <= maxAllowed && (!best || distance < best.distance)) best = { label: rule.label, distance };
        });
      });
      return best;
    }

    function levenshteinDistance(left, right) {
      if (left === right) return 0;
      if (!left) return right.length;
      if (!right) return left.length;
      let previous = Array.from({ length: right.length + 1 }, (_, index) => index);
      for (let leftIndex = 0; leftIndex < left.length; leftIndex++) {
        const current = [leftIndex + 1];
        for (let rightIndex = 0; rightIndex < right.length; rightIndex++) {
          current.push(Math.min(
            current[rightIndex] + 1,
            previous[rightIndex + 1] + 1,
            previous[rightIndex] + (left[leftIndex] === right[rightIndex] ? 0 : 1)
          ));
        }
        previous = current;
      }
      return previous[previous.length - 1];
    }

    function stripNonIngredientPrefix(value) {
      return normalizeOcrLine(value)
        .replace(/OCR全文/g, " ")
        .replace(/月曜日|火曜日|水曜日|木曜日|金曜日|[月火水木金]曜/g, " ")
        .replace(/(?:3歳以上児?|３歳以上児?|以上児|幼児|職員|合計|総量|使用量|数量|分量)\s*[0-9０-９]+(?:[.,．][0-9０-９]+)?\s*(?:kg|㎏|キロ|g|グラム|ml|cc|L|リットル|個|本|袋|パック|玉|束|枚|缶|箱|尾|切|片|丁|株|房|杯|膳|食|人前)?/gi, " ")
        .replace(/[0-9０-９]+(?:[.,．][0-9０-９]+)?\s*(?:kg|㎏|キロ|g|グラム|ml|cc|L|リットル|個|本|袋|パック|玉|束|枚|缶|箱|尾|切|片|丁|株|房|杯|膳|食|人前)(?=.*(?:3歳未満児?|３歳未満児?|未満児|乳児))/gi, " ")
        .replace(/(?:3歳未満児?|３歳未満児?|未満児|乳児).*$/gi, " ")
        .replace(/^[月火水木金]\s+/, "")
        .replace(/^[0-9０-９]+[.)）．、\s]+/, "")
        .replace(/^[□■◇◆☑✓・*\-－—\s]+/, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeOcrLine(value) {
      return String(value || "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/[，、]/g, ",")
        .replace(/[．。]/g, ".")
        .replace(/[㎏]/g, "kg")
        .replace(/[ｋＫ]/g, "k")
        .replace(/[ｇＧ]/g, "g")
        .replace(/[ｍＭ]/g, "m")
        .replace(/[ｌＬ]/g, "l")
        .replace(/([0-9])[ \f\v]*(キロ|ＫＧ|KG)/gi, "$1kg")
        .replace(/([0-9])[ \f\v]*(グラム|Ｇ|G)(?=\s|$)/gi, "$1g")
        .replace(/([0-9])[ \f\v]*(ＭＬ|ML)(?=\s|$)/gi, "$1ml")
        .replace(/[|＿_~〜=]+/g, " ")
        .replace(/[<>《》]+/g, " ")
        .replace(/[ \f\v\r\n]+/g, " ")
        .trim();
    }

    function normalizeQuantity(value) {
      return String(value || "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/．/g, ".")
        .replace(/,/g, "")
        .trim();
    }

    function normalizeUnit(value) {
      const unit = normalizeOcrLine(value);
      const lowerUnit = unit.toLowerCase();
      if (["ｋｇ", "kg", "㎏", "キロ"].includes(lowerUnit)) return "kg";
      if (["ｇ", "g", "グラム"].includes(lowerUnit)) return "g";
      if (["ｍｌ", "ml"].includes(lowerUnit)) return "ml";
      return unit;
    }

    function renderManualTable() {
      if (rows.length === 0) {
        manualRows.innerHTML = '<tr><td colspan="4">読み取り失敗：抽出結果がありません</td></tr>';
      } else {
        manualRows.innerHTML = rows.map(row => {
          return "<tr>" +
            '<td data-label="材料名">' + escapeHtml(row.name) + '</td>' +
            '<td data-label="数量">' + escapeHtml(row.quantity) + '</td>' +
            '<td data-label="単位">' + escapeHtml(row.unit) + '</td>' +
            '<td data-label="抽出元">' + escapeHtml(row.source || "OCR") + '</td>' +
          "</tr>";
        }).join("");
      }
      updateExcelButtonState();
    }

    function updateExcelButtonState() {
      if (excelBtn) excelBtn.disabled = getFilledRows().length === 0;
    }

    function getFilledRows() {
      return rows.filter(row => {
        const quantity = String(row.quantity || "").trim();
        if (!String(row.name || "").trim() || !quantity) return false;
        return quantity === "数量要確認" || String(row.unit || "").trim();
      });
    }

    function focusLastNameInput() {
      const inputs = manualRows.querySelectorAll('input[data-field="name"]');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }

    function deleteRow(index) {
      syncRows();
      rows.splice(index, 1);
      
      renderManualTable();
      renderOrderPreview();
    }

    function syncRows() {
      const nextRows = rows.map(row => ({ ...row }));
      manualRows.querySelectorAll("input[data-index]").forEach(input => {
        const index = Number(input.dataset.index);
        const field = input.dataset.field;
        if (nextRows[index]) nextRows[index][field] = input.value;
      });
      rows = nextRows;
    }

    function getExportRows() {
      return getFilledRows()
        .map(row => buildOrderExportRow(row));
    }

    function buildOrderExportRow(row) {
      const exportRow = Array(orderSheetHeaders.length).fill("");
      exportRow[orderSheetColumns.check] = "□";
      exportRow[orderSheetColumns.ingredientName] = String(row.name || "").trim();
      exportRow[orderSheetColumns.orderQuantity] = exportQuantityValue(row.quantity);
      exportRow[orderSheetColumns.orderUnit] = String(row.unit || "").trim();
      return keepProtectedOrderColumnsBlank(exportRow);
    }

    function keepProtectedOrderColumnsBlank(row) {
      protectedBlankOrderColumns.forEach(columnIndex => {
        row[columnIndex] = "";
      });
      return row;
    }

    function exportQuantityValue(value) {
      const text = String(value ?? "").trim();
      if (!text) return "";
      return /^-?[0-9０-９]+(?:[.,．][0-9０-９]+)?$/.test(text) ? numberValue(text) : text;
    }

    function renderOrderPreview() {
      const exportRows = getExportRows();
      const detailRows = paddedOrderRows(exportRows, 10);
      const dateLine = formatOrderDateLine(deliveryDate.value, useDate.value);
      const totals = calculateExportTotals(exportRows);

      if (orderTsv) orderTsv.value = buildTsv(buildExportDocument(exportRows));

      orderPreview.innerHTML = '<table class="preview-sheet">' +
        '<tbody>' +
          '<tr class="title-row"><td colspan="10">発　注　書　兼　納　品　書</td></tr>' +
          '<tr class="sub-title-row"><td colspan="10">スクルドエンジェル</td></tr>' +
          '<tr class="sub-title-row"><td colspan="10">たかばり　園</td></tr>' +
          '<tr class="blank"><td colspan="10"></td></tr>' +
          '<tr class="date-row"><td class="date-line" colspan="10">' + escapeHtml(dateLine) + '</td></tr>' +
          '<tr class="blank"><td colspan="10"></td></tr>' +
          '<tr class="ingredient-row">' + orderSheetHeaders.map(header => '<th>' + escapeHtml(header) + '</th>').join("") + '</tr>' +
          detailRows.map(row => '<tr class="ingredient-row">' + row.map((cell, index) => '<td class="' + (index === 1 || index === 4 ? 'left' : '') + '">' + escapeHtml(cell) + '</td>').join("") + '</tr>').join("") +
          '<tr class="summary-row checker-label-row total-row"><td colspan="2"></td><td class="total-label" colspan="2">検品者</td><td></td><td class="total-label" colspan="2">合計金額</td><td class="total-amount" colspan="2">' + escapeHtml(totals.total || "") + '</td><td class="no-border"></td></tr>' +
          '<tr class="summary-row total-row"><td colspan="2"></td><td colspan="2" rowspan="3">' + escapeHtml(checkerName.value || "") + '</td><td></td><td class="total-label" colspan="2">消費税</td><td class="total-amount" colspan="2">' + escapeHtml(totals.tax || "") + '</td><td class="no-border"></td></tr>' +
          '<tr class="summary-row total-row"><td colspan="2"></td><td></td><td class="total-label" colspan="2">課税合計</td><td class="total-amount" colspan="2">' + escapeHtml(totals.taxable || "") + '</td><td class="no-border"></td></tr>' +
          '<tr class="summary-row total-row"><td colspan="2"></td><td></td><td class="total-label" colspan="2">請求金額</td><td class="total-amount" colspan="2">' + escapeHtml(totals.billed || "") + '</td><td class="no-border"></td></tr>' +
          '<tr class="blank"><td colspan="10"></td></tr>' +
        '</tbody>' +
      '</table>';
    }

    function downloadExcel() {
      const exportRows = getExportRows();
      if (!exportRows.length) {
        notice.textContent = "読み取り失敗：抽出結果が空のため、Excelは作成しません。";
        logOcrStep("失敗理由", "空欄Excel防止：抽出結果が0件のためExcel作成を中止しました。");
        return;
      }
      if (!isXlsxReady()) {
        notice.textContent = "Excel作成ライブラリを読み込めませんでした。ネット接続を確認してから、もう一度押してください。";
        return;
      }

      try {
        const worksheet = XLSX.utils.aoa_to_sheet(buildExportDocument(exportRows));
        setupExcelWorksheet(worksheet, exportRows.length);

        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "発注書");
        XLSX.writeFile(workbook, makeExportFileName("xlsx"), { bookType: "xlsx", type: "binary" });
        notice.textContent = "Excelを出力しました。";
        logOcrStep("Excel出力", exportRows.length + "件をExcelへ反映しました。");
      } catch (error) {
        notice.textContent = "Excelの作成に失敗しました。もう一度押してください。";
        console.error("Excel作成エラー", error);
      }
    }

    function buildExportDocument(exportRows) {
      const totals = calculateExportTotals(exportRows);
      const detailRows = paddedOrderRows(exportRows, getOrderSheetDetailRowCount(exportRows.length));
      const blank = Array(orderSheetHeaders.length).fill("");
      const dateLine = formatOrderDateLine(deliveryDate.value, useDate.value);

      return [
        ["", "", "発　注　書　兼　納　品　書", "", "", "", "", "", "", ""],
        ["", "", "スクルドエンジェル", "", "", "", "", "", "", ""],
        ["", "", "たかばり　園", "", "", "", "", "", "", ""],
        blank,
        [dateLine, "", "", "", "", "", "", "", "", ""],
        blank,
        orderSheetHeaders,
        ...detailRows,
        blank,
        blank,
        ["", "", "検品者", "", "", "合計金額", "", totals.total || "", "", ""],
        ["", "", checkerName.value || "", "", "", "消費税", "", totals.tax || "", "", ""],
        ["", "", "", "", "", "課税合計", "", totals.taxable || "", "", ""],
        ["", "", "", "", "", "請求金額", "", totals.billed || "", "", ""],
        blank
      ];
    }

    function paddedOrderRows(exportRows, detailRowCount) {
      const padded = exportRows.map(row => keepProtectedOrderColumnsBlank(row.slice()));
      while (padded.length < detailRowCount) padded.push(Array(orderSheetHeaders.length).fill(""));
      return padded;
    }

    function calculateExportTotals(exportRows) {
      const total = exportRows.reduce((sum, row) => sum + numberValue(row[8]), 0);
      const tax = Math.floor(total * 0.1);
      return { total: round(total), tax, taxable: round(total), billed: round(total + tax) };
    }

    function getOrderSheetDetailRowCount(dataLength) {
      return Math.max(orderSheetDetailRows, dataLength);
    }

    function getOrderSheetLayout(dataLength) {
      const detailRowCount = getOrderSheetDetailRowCount(dataLength);
      return {
        detailRowCount,
        totalRows: detailRowCount + 14,
        detailStart: 7,
        detailEnd: detailRowCount + 6,
        totalStart: detailRowCount + 9,
        totalEnd: detailRowCount + 12,
        checkerStart: detailRowCount + 9,
        checkerEnd: detailRowCount + 12
      };
    }

    function setupExcelWorksheet(worksheet, dataLength) {
      const layout = getOrderSheetLayout(dataLength);
      worksheet["!cols"] = [
        { wch: 5.8 }, { wch: 17.5 }, { wch: 8 }, { wch: 5.5 }, { wch: 12 },
        { wch: 7 }, { wch: 5 }, { wch: 7 }, { wch: 8.5 }, { wch: 8.5 }
      ];
      worksheet["!rows"] = Array.from({ length: layout.totalRows }, (_, row) => ({ hpt: orderSheetRowHeight(row, layout) }));
      worksheet["!merges"] = [
        { s: { r: 0, c: 2 }, e: { r: 0, c: 7 } },
        { s: { r: 1, c: 2 }, e: { r: 1, c: 7 } },
        { s: { r: 2, c: 2 }, e: { r: 2, c: 7 } },
        { s: { r: 4, c: 0 }, e: { r: 4, c: 9 } },
        { s: { r: layout.totalStart, c: 5 }, e: { r: layout.totalStart, c: 6 } },
        { s: { r: layout.totalStart + 1, c: 5 }, e: { r: layout.totalStart + 1, c: 6 } },
        { s: { r: layout.totalStart + 2, c: 5 }, e: { r: layout.totalStart + 2, c: 6 } },
        { s: { r: layout.totalStart + 3, c: 5 }, e: { r: layout.totalStart + 3, c: 6 } },
        { s: { r: layout.totalStart, c: 7 }, e: { r: layout.totalStart, c: 8 } },
        { s: { r: layout.totalStart + 1, c: 7 }, e: { r: layout.totalStart + 1, c: 8 } },
        { s: { r: layout.totalStart + 2, c: 7 }, e: { r: layout.totalStart + 2, c: 8 } },
        { s: { r: layout.totalStart + 3, c: 7 }, e: { r: layout.totalStart + 3, c: 8 } },
        { s: { r: layout.checkerStart, c: 2 }, e: { r: layout.checkerStart, c: 3 } },
        { s: { r: layout.checkerStart + 1, c: 2 }, e: { r: layout.checkerEnd, c: 3 } }
      ];
      worksheet["!margins"] = {
        left: cmToInch(1.5),
        right: cmToInch(1),
        top: cmToInch(0.8),
        bottom: cmToInch(0.8),
        header: 0,
        footer: 0
      };
      worksheet["!pageSetup"] = {
        paperSize: 9,
        orientation: "portrait",
        fitToPage: true,
        fitToWidth: 1,
        fitToHeight: 1
      };
      worksheet["!printOptions"] = { gridLines: false, horizontalCentered: false, verticalCentered: true };
      worksheet["!ref"] = "A1:J" + layout.totalRows;

      clearProtectedOrderColumns(worksheet, layout);

      const range = XLSX.utils.decode_range(worksheet["!ref"]);
      for (let row = range.s.r; row <= range.e.r; row++) {
        for (let col = range.s.c; col <= range.e.c; col++) {
          const address = XLSX.utils.encode_cell({ r: row, c: col });
          if (!worksheet[address]) worksheet[address] = { t: "s", v: "" };
          worksheet[address].s = excelCellStyle(row, col, layout);
        }
      }
    }


    function clearProtectedOrderColumns(worksheet, layout) {
      for (let row = layout.detailStart; row <= layout.detailEnd; row++) {
        protectedBlankOrderColumns.forEach(col => {
          const address = XLSX.utils.encode_cell({ r: row, c: col });
          worksheet[address] = { t: "s", v: "" };
        });
      }
    }

    function orderSheetRowHeight(row, layout) {
      if (row === 0) return 22;
      if (row === 1 || row === 2) return 15;
      if (row === 4) return 18;
      if (row === 6) return 20;
      if (row >= layout.detailStart && row <= layout.detailEnd) return 20;
      if (row === layout.checkerStart) return 18;
      if (row >= layout.totalStart && row <= layout.totalEnd) return 18;
      if (row > layout.totalEnd) return 7;
      return 7;
    }

    function excelCellStyle(row, col, layout) {
      const thinBorder = { style: "thin", color: { rgb: "000000" } };
      const mediumBorder = { style: "medium", color: { rgb: "000000" } };
      const isTitle = row === 0;
      const isSubTitle = row === 1 || row === 2;
      const isDateLine = row === 4;
      const isHeader = row === 6;
      const isCheckerBox = row >= layout.checkerStart && row <= layout.checkerEnd && col >= 2 && col <= 3;
      const isTotalBox = row >= layout.totalStart && row <= layout.totalEnd && col >= 5 && col <= 8;
      const isTotalAmountCell = row >= layout.totalStart && row <= layout.totalEnd && (col === 7 || col === 8);
      const isCheckerLabelCell = row === layout.checkerStart && col >= 2 && col <= 3;
      const isTotalLabelCell = isTotalBox && col <= 6;
      const bodyFontSize = 8;
      const summaryLabelFontSize = bodyFontSize;
      const fontSize = isTitle ? 15 : (isSubTitle ? 9 : bodyFontSize);

      return {
        font: {
          name: "Yu Gothic",
          sz: (isCheckerLabelCell || isTotalLabelCell) ? summaryLabelFontSize : fontSize,
          bold: isTitle || isSubTitle || isHeader || isCheckerBox || isTotalLabelCell
        },
        alignment: {
          horizontal: isTotalAmountCell ? "right" : (isDateLine ? "left" : (isTitle || isSubTitle || isHeader || isCheckerBox || isTotalBox ? "center" : (col === 1 || col === 4 ? "left" : "center"))),
          vertical: "center",
          wrapText: !isDateLine
        },
        numFmt: isTotalAmountCell ? "#,##0.###" : undefined,
        border: borderForOrderSheetCell(row, col, layout, thinBorder, mediumBorder),
        fill: isDateLine ? { patternType: "solid", fgColor: { rgb: "FDE2E8" } } : undefined
      };
    }

    function borderForOrderSheetCell(row, col, layout, thinBorder, mediumBorder) {
      const isTable = row >= 6 && row <= layout.detailEnd;
      const isCheckerBox = row >= layout.checkerStart && row <= layout.checkerEnd && col >= 2 && col <= 3;
      const isTotalBox = row >= layout.totalStart && row <= layout.totalEnd && col >= 5 && col <= 8;
      const hasBorder = isTable || isCheckerBox || isTotalBox;
      if (!hasBorder) return undefined;

      const border = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
      if (isTable) {
        if (row === 6) border.top = mediumBorder;
        if (row === layout.detailEnd) border.bottom = mediumBorder;
        if (col === 0) border.left = mediumBorder;
        if (col === 9) border.right = mediumBorder;
      }
      if (isCheckerBox || isTotalBox) {
        const firstRow = isCheckerBox ? layout.checkerStart : layout.totalStart;
        const lastRow = isCheckerBox ? layout.checkerEnd : layout.totalEnd;
        const firstCol = isCheckerBox ? 2 : 5;
        const lastCol = isCheckerBox ? 3 : 8;
        if (row === firstRow) border.top = mediumBorder;
        if (row === lastRow) border.bottom = mediumBorder;
        if (col === firstCol) border.left = mediumBorder;
        if (col === lastCol) border.right = mediumBorder;
      }
      return border;
    }

    function cmToInch(cm) {
      return cm / 2.54;
    }

    function isXlsxReady() {
      return Boolean(window.XLSX && XLSX.utils && typeof XLSX.utils.aoa_to_sheet === "function" && typeof XLSX.utils.book_new === "function" && typeof XLSX.utils.book_append_sheet === "function" && typeof XLSX.writeFile === "function");
    }

    function isSheetJsReady() {
      return Boolean(window.XLSX && typeof XLSX.read === "function" && XLSX.utils && typeof XLSX.utils.sheet_to_json === "function");
    }

    function isTesseractReady() {
      return Boolean(window.Tesseract && typeof Tesseract.recognize === "function");
    }

    function isMammothReady() {
      return Boolean(window.mammoth && typeof mammoth.extractRawText === "function");
    }

    function getFileKind(file) {
      const fileName = String(file && file.name ? file.name : "").toLowerCase();
      const fileType = String(file && file.type ? file.type : "").toLowerCase();
      const extension = fileName.includes(".") ? fileName.split(".").pop() : "";

      if (extension === "pdf" || fileType === "application/pdf") return "pdf";
      if (["png", "jpg", "jpeg", "webp", "bmp", "gif", "tif", "tiff"].includes(extension) || fileType.startsWith("image/")) return "image";
      if (["xlsx", "xls", "xlsm", "csv"].includes(extension) || /spreadsheet|excel|csv/.test(fileType)) return "spreadsheet";
      if (["docx", "doc"].includes(extension) || /word|officedocument\.wordprocessingml/.test(fileType)) return "word";
      return "text";
    }

    function isPdfReady() {
      if (!window.pdfjsLib || typeof pdfjsLib.getDocument !== "function") return false;
      if (pdfjsLib.GlobalWorkerOptions && !pdfjsLib.GlobalWorkerOptions.workerSrc) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
      }
      return true;
    }

    function isPdfFile(file) {
      const fileName = String(file && file.name ? file.name : "").toLowerCase();
      return file.type === "application/pdf" || fileName.endsWith(".pdf");
    }

    function isExcelFile(file) {
      const fileName = String(file && file.name ? file.name : "").toLowerCase();
      return fileName.endsWith(".xlsx") || fileName.endsWith(".xls") || /spreadsheet|excel/.test(String(file.type || ""));
    }

    function makeExportFileName(extension) {
      return "発注書兼納品書_" + formatDate(new Date()) + "." + extension;
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return year + month + day;
    }

    function formatOrderDateLine(deliveryValue, useValue) {
      const delivery = parseDateParts(deliveryValue);
      const use = parseDateParts(useValue);
      return "【納品日】令和" + dateField(delivery.reiwaYear, 2) + "年" + dateField(delivery.month, 2) + "月" + dateField(delivery.day, 2) + "日(" + dateField(delivery.weekday, 2) + ")　使用日" + dateField(use.month, 2) + "月" + dateField(use.day, 2) + "日";
    }

    function dateField(value, width) {
      return value ? String(value).padStart(width, "　") : "　".repeat(width);
    }

    function parseDateParts(value) {
      if (!value) return { reiwaYear: "", month: "", day: "", weekday: "" };
      const date = new Date(value + "T00:00:00");
      if (Number.isNaN(date.getTime())) return { reiwaYear: "", month: "", day: "", weekday: "" };
      return {
        reiwaYear: date.getFullYear() - 2018,
        month: date.getMonth() + 1,
        day: date.getDate(),
        weekday: ["日", "月", "火", "水", "木", "金", "土"][date.getDay()]
      };
    }

    function numberValue(value) {
      const normalized = String(value ?? "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/．/g, ".")
        .replace(/,/g, "");
      const match = normalized.match(/-?[0-9]+(?:\.[0-9]+)?/);
      return match ? Number(match[0]) : 0;
    }

    function round(value) {
      return Math.round(value * 1000) / 1000;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
    }
  </script>
</body>
