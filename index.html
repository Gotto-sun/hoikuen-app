<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>献立表OCR 発注書作成</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: #fff7ed;
      color: #1f2937;
      line-height: 1.6;
    }
    header {
      background: linear-gradient(135deg, #fb923c, #ea580c);
      color: #fff;
      padding: 20px 16px 14px;
    }
    header h1 { margin: 0 0 4px; font-size: 24px; }
    header p { margin: 0; font-size: 14px; opacity: .95; }
    main { width: min(1080px, 100%); margin: 0 auto; padding: 16px; }
    section {
      background: #fff;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(154, 52, 18, .08);
    }
    h2 { margin: 0 0 12px; font-size: 18px; }
    label { display: block; margin: 12px 0 6px; font-weight: 700; }
    .note { margin: 0 0 12px; color: #64748b; font-size: 14px; }
    .camera-note { margin-top: 8px; color: #7c2d12; font-weight: 700; }
    .buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
    button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }
    button:disabled { opacity: 1; cursor: pointer; }
    .primary { background: #f97316; }
    .blue { background: #2563eb; }
    .green { background: #16a34a; }
    .gray { background: #64748b; }
    .red { background: #dc2626; }
    .orange { background: #ea580c; }
    input[type="file"] { display: none; }
    textarea, input {
      width: 100%;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      background: #fffdf8;
    }
    textarea {
      min-height: 180px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      white-space: pre;
    }
    .status { min-height: 1.6em; margin: 10px 0 0; color: #475569; font-weight: 700; font-size: 14px; }
    .file-status, .summary, .document-fields { display: grid; gap: 10px; margin: 12px 0; }
    .file-status { grid-template-columns: repeat(3, 1fr); font-size: 13px; }
    .summary { grid-template-columns: repeat(3, 1fr); }
    .document-fields { grid-template-columns: 90px 1fr 90px 1fr 90px 1fr; align-items: center; }
    .file-status div, .summary div, .document-fields {
      border: 1px solid #fed7aa;
      border-radius: 12px;
      background: #fffdf8;
      padding: 10px;
    }
    .document-fields label { margin: 0; white-space: nowrap; }
    .summary span { display: block; color: #64748b; font-size: 12px; }
    .summary b { font-size: 22px; }
    #preview {
      display: none;
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      margin-top: 12px;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      background: #fff;
    }
    .empty {
      padding: 20px;
      text-align: center;
      color: #64748b;
      border: 1px dashed #fdba74;
      border-radius: 12px;
      background: #fff7ed;
    }
    .print-title { display: none; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; min-width: 980px; border-collapse: collapse; background: #fff; }
    th, td { border: 1px solid #fed7aa; padding: 6px; text-align: left; vertical-align: top; }
    th { background: #ffedd5; color: #7c2d12; white-space: nowrap; }
    td input { min-width: 80px; padding: 8px; }
    td .delete-row { min-height: 36px; border-radius: 10px; padding: 6px 10px; }
    .csv-panel { display: none; margin-top: 12px; padding: 12px; border: 1px solid #fdba74; border-radius: 12px; background: #fffdf8; }
    .csv-panel.is-open { display: block; }
    #csvOutput { min-height: 260px; }
    .debug-panel { margin: 12px 0; }
    .debug-panel pre {
      min-height: 120px;
      max-height: 260px;
      overflow: auto;
      margin: 0;
      padding: 12px;
      border: 1px solid #fdba74;
      border-radius: 12px;
      background: #111827;
      color: #e5e7eb;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }

    @media (max-width: 760px) {
      main { padding: 12px; }
      .buttons, .file-status, .summary, .document-fields { grid-template-columns: 1fr; }
      table, thead, tbody, tr, td { display: block; width: 100%; min-width: 0; }
      thead { display: none; }
      tr { border: 1px solid #ffedd5; border-radius: 12px; margin-bottom: 10px; padding: 10px; }
      td { border: 0; padding: 6px 0; }
      td::before { content: attr(data-label); display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 3px; }
    }

    @page { size: A4 portrait; margin: 10mm; }
    @media print {
      html, body { width: 210mm; height: 297mm; margin: 0; padding: 0; background: #fff; color: #000; }
      body { font-size: 10.5pt; line-height: 1.2; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      header, main section:first-child, .buttons, .summary, .status, .note, .camera-note, .csv-panel, .debug-panel, .empty { display: none !important; }
      main { width: 190mm; max-width: 190mm; margin: 0 auto; padding: 0; }
      section { width: 100%; margin: 0; padding: 0; border: 0; border-radius: 0; box-shadow: none; break-inside: avoid; }
      h2 { display: none; }
      .print-title { display: block; margin: 0 0 4mm; text-align: center; font-size: 16pt; font-weight: 700; letter-spacing: .2em; }
      .document-fields { display: grid !important; grid-template-columns: 17mm 45mm 17mm 45mm 17mm 45mm; gap: 0; margin: 0 0 4mm; border: 1.2pt solid #000; border-right: 0; border-bottom: 0; padding: 0; background: #fff; }
      .document-fields label, .document-fields input { border: 0; border-right: 1.2pt solid #000; border-bottom: 1.2pt solid #000; border-radius: 0; padding: 1.5mm; height: 8mm; color: #000; background: #fff; font-size: 10pt; }
      .document-fields label { text-align: center; font-weight: 700; }
      .table-wrap { overflow: visible !important; }
      table { width: 100%; min-width: 0; table-layout: fixed; border-collapse: collapse; font-size: 10pt; page-break-inside: avoid; }
      th, td { border: 1.2pt solid #000; padding: 1.4mm 1mm; color: #000; background: #fff; vertical-align: middle; }
      th { font-size: 10pt; font-weight: 700; text-align: center; }
      td input { width: 100%; min-width: 0; border: 0; padding: 0; background: transparent; color: #000; font-size: 10pt; }
      th:nth-child(1), td:nth-child(1) { width: 7mm; text-align: center; }
      th:nth-child(2), td:nth-child(2) { width: 30mm; }
      th:nth-child(3), td:nth-child(3), th:nth-child(6), td:nth-child(6) { width: 17mm; }
      th:nth-child(4), td:nth-child(4), th:nth-child(7), td:nth-child(7) { width: 10mm; }
      th:nth-child(5), td:nth-child(5) { width: 36mm; }
      th:nth-child(8), td:nth-child(8), th:nth-child(9), td:nth-child(9) { width: 15mm; }
      th:nth-child(10), td:nth-child(10) { width: 16mm; }
      th:nth-child(11), td:nth-child(11) { display: none; }
      tr { page-break-inside: avoid; height: 7.2mm; }
    }
  </style>
</head>
<body>
  <header>
    <h1>献立表OCR 発注書作成</h1>
    <p>CSV・スキャナー画像・スマホカメラ・手入力から、Excel発注書とCSVを作成します。</p>
  </header>

  <main>
    <section>
      <h2>1. 入力</h2>
      <p class="note">CSVは「食品名,数量,単位」を最優先で読み取ります。OCRできなくても手入力で出力できます。</p>
      <p class="camera-note">カメラボタンはAndroidで背面カメラ起動を優先します。ブラウザ仕様によりアルバム選択になる場合があります。</p>
      <div class="buttons">
        <button class="blue" type="button" onclick="menuCsvInput.value=''; menuCsvInput.click();">📄 CSVを選ぶ</button>
        <button class="green" type="button" onclick="childrenCsvInput.value=''; childrenCsvInput.click();">👶 園児数CSV</button>
        <button class="gray" type="button" onclick="ruleCsvInput.value=''; ruleCsvInput.click();">⚙️ ルールCSV</button>
        <button class="blue" type="button" onclick="cameraInput.click();">📷 カメラで撮る</button>
        <button class="gray" type="button" onclick="imageInput.value=''; imageInput.click();">🖼️ 画像を選ぶ</button>
        <button class="gray" type="button" onclick="if(lastImage){ runOcr(lastImage); } else { notice.textContent='先に画像を選んでください。手入力でも出力できます。'; }">🔁 もう一度OCR</button>
      </div>

      <input id="menuCsvInput" type="file" accept=".csv,text/csv">
      <input id="childrenCsvInput" type="file" accept=".csv,text/csv">
      <input id="ruleCsvInput" type="file" accept=".csv,text/csv">
      <input id="cameraInput" type="file" accept="image/*" capture="environment">
      <input id="imageInput" type="file" accept="image/*">

      <div class="file-status">
        <div><b>献立</b><br><span id="menuCsvStatus">未選択（手入力可）</span></div>
        <div><b>園児数</b><br><span id="childrenCsvStatus">未選択（1人分）</span></div>
        <div><b>発注ルール</b><br><span id="ruleCsvStatus">標準ルール</span></div>
      </div>

      <img id="preview" alt="選択画像">
      <p id="ocrStatus" class="status"></p>

      <label for="ocrText">CSV / OCR結果 / 手入力</label>
      <textarea id="ocrText" placeholder="食品名,数量,単位&#10;にんじん,15,g&#10;牛乳,100,ml"></textarea>

      <div class="buttons">
        <button class="primary" type="button" onclick="extractAndRender();">発注数を計算する</button>
        <button class="gray" type="button" onclick="insertSample();">サンプルを入れる</button>
        <button class="red" type="button" onclick="clearAll();">消す</button>
      </div>
    </section>

    <section>
      <h2>2. 発注書</h2>
      <div class="print-title">発注書</div>
      <div class="summary">
        <div><span>発注食材数</span><b id="itemCount">0</b></div>
        <div><span>合算件数</span><b id="mergedCount">0</b></div>
        <div><span>除外件数</span><b id="excludedCount">0</b></div>
      </div>
      <p id="notice" class="status"></p>

      <div class="debug-panel">
        <h2>抽出結果（JSON）</h2>
        <pre id="debugJson">[]</pre>
      </div>

      <div class="document-fields">
        <label for="deliveryDate">納品日</label><input id="deliveryDate" type="date">
        <label for="useDate">使用日</label><input id="useDate" type="date">
        <label for="checkerName">検品者</label><input id="checkerName" type="text" placeholder="検品者名">
      </div>

      <div id="tableArea" class="empty">まだ食材がありません。すべての出力ボタンは使えます。</div>

      <div class="buttons">
        <button class="gray" type="button" onclick="addRow();">＋ 発注行を追加</button>
        <button class="green" type="button" onclick="downloadExcel();">Excel出力</button>
        <button class="blue" type="button" onclick="downloadCsv();">CSVダウンロード</button>
        <button class="orange" type="button" onclick="showCsv();">CSV表示</button>
        <button class="blue" type="button" onclick="copyCsv();">CSVコピー</button>
      </div>

      <div id="csvPanel" class="csv-panel">
        <label for="csvOutput">CSV全文（コピー可能）</label>
        <textarea id="csvOutput" readonly></textarea>
      </div>
    </section>
  </main>

  <script>
    const sampleText = "食品名,数量,単位\nにんじん,15,g\n玉ねぎ,20,g\n鶏もも肉,40,g\n牛乳,100,ml\nりんご,0.5,個";
    const headers = ["チェック", "材料名", "総使用量", "単位", "摘要", "納品数", "単位", "単価", "金額", "産地"];
    const units = ["kg", "g", "ml", "l", "L", "個", "本", "袋", "缶", "丁", "枚", "束", "箱", "パック", "尾", "切", "粒", "玉", "房"];
    const aliases = { "人参": "にんじん", "ニンジン": "にんじん", "玉葱": "玉ねぎ", "たまねぎ": "玉ねぎ", "ジャガイモ": "じゃがいも", "じゃが芋": "じゃがいも", "鶏肉": "鶏もも肉", "豚肉": "豚こま肉", "リンゴ": "りんご", "たまご": "卵" };
    const standardRules = [
      { names: ["米", "ごはん", "だし", "だし汁", "しょうゆ", "醤油", "塩", "砂糖", "酢", "みそ", "味噌", "油", "酒", "みりん"], exclude: true, reason: "標準ルールで除外" },
      { names: ["牛乳"], orderUnit: "本", packageQuantity: 450, packageUnit: "ml", roundStep: 1, note: "450ml換算" },
      { names: ["キャベツ"], orderUnit: "個", packageQuantity: 1200, packageUnit: "g", roundStep: 0.25, note: "1/4個単位" },
      { names: ["白菜"], orderUnit: "個", packageQuantity: 2000, packageUnit: "g", roundStep: 0.125, note: "1/8個単位" },
      { names: ["しめじ", "えのき", "しいたけ", "まいたけ"], orderUnit: "袋", packageQuantity: 100, packageUnit: "g", roundStep: 1, note: "100g袋換算" },
      { names: ["豆腐"], orderUnit: "丁", packageQuantity: 300, packageUnit: "g", roundStep: 1, note: "300g換算" },
      { names: ["にんじん", "玉ねぎ", "じゃがいも", "大根", "きゅうり", "トマト", "ほうれん草", "小松菜", "ブロッコリー", "ピーマン", "かぼちゃ", "なす", "もやし", "ねぎ", "鶏もも肉", "鶏むね肉", "鶏ひき肉", "豚こま肉", "豚ひき肉", "牛肉", "鮭", "さば", "たら"], orderUnit: "kg", packageQuantity: 1000, packageUnit: "g", roundStep: 0.1, note: "kg換算" },
      { names: ["卵", "りんご", "バナナ", "みかん", "オレンジ", "いちご"], orderUnit: "個", packageQuantity: 1, packageUnit: "個", roundStep: 1, note: "個数換算" }
    ];

    let rows = [];
    let lastImage = null;
    let childrenCount = 1;
    let customRules = [];
    let stats = { merged: 0, excluded: 0 };

    menuCsvInput.addEventListener("change", event => loadMenuCsv(event.target.files[0]));
    childrenCsvInput.addEventListener("change", event => loadChildrenCsv(event.target.files[0]));
    ruleCsvInput.addEventListener("change", event => loadRuleCsv(event.target.files[0]));
    cameraInput.addEventListener("change", event => handleImage(event.target.files[0]));
    imageInput.addEventListener("change", event => handleImage(event.target.files[0]));

    async function readTextFile(file) {
      if (!file) return "";
      const buffer = await file.arrayBuffer();
      const utf8 = new TextDecoder("utf-8", { fatal: false }).decode(buffer);
      if (!utf8.includes("�")) return utf8;
      try { return new TextDecoder("shift_jis").decode(buffer); } catch (error) { return utf8; }
    }

    async function loadMenuCsv(file) {
      if (!file) return;
      ocrText.value = await readTextFile(file);
      menuCsvStatus.textContent = file.name;
      notice.textContent = "CSVを読み込みました。";
      extractAndRender();
    }

    async function loadChildrenCsv(file) {
      if (!file) return;
      const text = await readTextFile(file);
      childrenCount = Math.max(1, parseChildrenCount(text));
      childrenCsvStatus.textContent = file.name + "（" + childrenCount + "人）";
      notice.textContent = childrenCount + "人分で計算します。";
      if (ocrText.value.trim()) extractAndRender();
    }

    async function loadRuleCsv(file) {
      if (!file) return;
      customRules = parseRuleCsv(await readTextFile(file));
      ruleCsvStatus.textContent = file.name + "（" + customRules.length + "件）";
      notice.textContent = "発注ルールを読み込みました。";
      if (ocrText.value.trim()) extractAndRender();
    }

    function handleImage(file) {
      if (!file) return;
      lastImage = file;
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      ocrStatus.textContent = "画像を受け取りました。カメラではなくアルバムが開く場合はブラウザ仕様です。";
      runOcr(file);
    }

    async function runOcr(file) {
      if (!file) return;
      if (!window.Tesseract) {
        ocrStatus.textContent = "OCRを読み込めませんでした。手入力で出力できます。";
        return;
      }
      ocrStatus.textContent = "OCR中です。";
      try {
        const result = await Tesseract.recognize(file, "jpn+eng", {
          logger: message => {
            if (message.status === "recognizing text") ocrStatus.textContent = "OCR中です：" + Math.round(message.progress * 100) + "%";
          }
        });
        ocrText.value = cleanupOcrText(result.data.text || "");
        menuCsvStatus.textContent = "OCR結果";
        ocrStatus.textContent = "OCRが終わりました。文字が違う場合は食品名,数量,単位の形で手直しできます。";
        extractAndRender(true);
      } catch (error) {
        console.error(error);
        ocrStatus.textContent = "OCRに失敗しました。手入力で必ず出力できます。";
      }
    }

    function insertSample() {
      ocrText.value = sampleText;
      menuCsvStatus.textContent = "サンプル";
      extractAndRender();
    }

    function clearAll() {
      ocrText.value = "";
      rows = [];
      stats = { merged: 0, excluded: 0 };
      renderTable();
      updateSummary();
      csvOutput.value = "";
      csvPanel.classList.remove("is-open");
      updateDebugJson({ items: [], rows: [], stats, mode: "empty" });
      notice.textContent = "消しました。データ0件でも出力できます。";
    }

    function extractAndRender(fromOcr) {
      const text = ocrText.value.trim();
      if (!text) {
        rows = [];
        stats = { merged: 0, excluded: 0 };
        renderTable();
        updateSummary();
        updateDebugJson({ items: [], rows: [], stats, mode: "empty" });
        notice.textContent = "未入力でもExcel/CSV出力できます。必要なら発注行を追加してください。";
        return;
      }
      const result = extractIngredients(text);
      rows = result.rows;
      stats = result.stats;
      updateDebugJson(result.debug);
      renderTable();
      updateSummary();
      notice.textContent = rows.length ? "発注数を計算しました。" : (fromOcr ? "OCR結果から抽出できませんでした。手入力行を追加するか、空の様式を出力できます。" : "抽出できませんでした。手入力行を追加するか、空の様式を出力できます。");
    }

    function extractIngredients(text) {
      const lines = splitOcrLines(text);
      const csvRows = parseCsvLines(lines);
      const csvItems = rowsFromCsv(csvRows);
      const fallbackItems = csvItems.length ? [] : rowsFromLines(lines);
      const sourceRows = csvItems.length ? csvItems : fallbackItems;
      const mode = csvItems.length ? "csv" : "fallback";
      const totals = new Map();
      const acceptedItems = [];
      let found = 0;
      let excluded = 0;

      sourceRows.forEach(item => {
        const name = normalizeName(item.name);
        const quantity = numberValue(item.quantity);
        const unit = normalizeUnit(item.unit || "個");
        if (!isValidFoodName(name) || quantity <= 0 || !unit) return;
        const rule = findRule(name);
        if (rule && rule.exclude) { excluded += 1; return; }
        found += 1;
        acceptedItems.push({ name, quantity, unit, source: mode });
        const key = name + "__" + unit;
        const current = totals.get(key) || { name, quantity: 0, unit, count: 0 };
        current.quantity += quantity * childrenCount;
        current.count += 1;
        totals.set(key, current);
      });

      const output = Array.from(totals.values()).map(toOrderRow).sort((a, b) => a.name.localeCompare(b.name, "ja"));
      const debug = { mode, items: acceptedItems, rows: output, stats: { merged: Math.max(0, found - output.length), excluded } };
      return { rows: output, stats: debug.stats, debug };
    }

    function rowsFromCsv(csvRows) {
      if (!csvRows.length) return [];
      const first = csvRows[0].cells.map(normalizeHeader);
      const hasHeader = first.length === 3 && first[0] === "食品名" && first[1] === "数量" && first[2] === "単位";
      const data = hasHeader ? csvRows.slice(1) : csvRows;
      return data
        .filter(row => row.readable && row.cells.length === 3)
        .map(row => ({
          name: row.cells[0] || "",
          quantity: row.cells[1] || "",
          unit: row.cells[2] || ""
        }))
        .filter(item => {
          const name = normalizeName(item.name);
          return isValidFoodName(name) && numberValue(item.quantity) > 0 && normalizeUnit(item.unit);
        });
    }

    function rowsFromLines(lines) {
      return lines.map(line => parseIngredientLine(line)).filter(Boolean);
    }

    function parseIngredientLine(line) {
      const normalized = String(line || "").normalize("NFKC").trim();
      if (!normalized || isHeaderWord(normalized)) return null;
      const japaneseRuns = normalized.match(/[ぁ-んァ-ヶー一-龠々〆ヵヶ]+/g) || [];
      const candidates = japaneseRuns
        .map(part => normalizeName(part))
        .filter(name => isValidFoodName(name));
      if (!candidates.length) return null;
      const name = candidates.sort((a, b) => b.length - a.length)[0];
      const amount = findAmount(normalized);
      return { name, quantity: amount.quantity, unit: amount.unit };
    }

    function splitOcrLines(text) {
      return String(text || "")
        .replace(/^\uFEFF/, "")
        .replace(/\r\n?/g, "\n")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);
    }

    function cleanupOcrText(text) {
      return splitOcrLines(text)
        .map(line => line.replace(/[，、]/g, ",").replace(/[|｜]/g, ",").replace(/\s*,\s*/g, ",").replace(/[ \t]+/g, " ").trim())
        .filter(Boolean)
        .join("\n")
        .trim();
    }

    function parseCsvLines(lines) {
      return lines.map(line => {
        const parsed = parseCsvLine(line.replace(/[，、]/g, ",").replace(/[|｜]/g, ","));
        return { cells: parsed.cells.map(cell => cell.trim()), readable: parsed.readable };
      }).filter(row => row.cells.some(Boolean));
    }

    function parseLooseCsv(text) {
      return parseCsvLines(splitOcrLines(text)).map(row => row.cells);
    }

    function parseCsvLine(line) {
      const cells = [];
      let cell = "";
      let inQuotes = false;
      for (let index = 0; index < line.length; index += 1) {
        const char = line[index];
        if (char === '"') {
          if (inQuotes && line[index + 1] === '"') {
            cell += '"';
            index += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          cells.push(cell);
          cell = "";
        } else {
          cell += char;
        }
      }
      cells.push(cell);
      return { cells, readable: !inQuotes };
    }

    function findAmount(line) {
      const pattern = new RegExp("([0-9０-９]+(?:[.．][0-9０-９]+)?)\\s*(" + units.map(escapeRegExp).join("|") + ")?", "i");
      const match = String(line || "").match(pattern);
      return { quantity: match ? numberValue(match[1]) || 1 : 1, unit: match && match[2] ? normalizeUnit(match[2]) : "個" };
    }

    function toOrderRow(item) {
      const rule = findRule(item.name) || defaultRule(item.unit);
      const converted = convertQuantity(item.quantity, item.unit, rule);
      const notes = [];
      if (item.count > 1) notes.push(item.count + "件を合算");
      if (rule.note) notes.push(rule.note);
      if (converted.warning) notes.push(converted.warning);
      return { checked: "□", name: item.name, totalQuantity: round(item.quantity), totalUnit: item.unit, note: notes.join(" / "), orderQuantity: converted.quantity, orderUnit: converted.unit, unitPrice: "", amount: "", origin: "" };
    }

    function convertQuantity(quantity, unit, rule) {
      let base = quantity;
      let warning = "";
      const from = normalizeUnit(unit);
      const to = normalizeUnit(rule.packageUnit || from);
      if (from !== to) base = convertUnit(quantity, from, to);
      if (base === null) { base = quantity; warning = "単位要確認"; }
      return { quantity: roundUp(base / (numberValue(rule.packageQuantity) || 1), numberValue(rule.roundStep) || 1), unit: rule.orderUnit || from, warning };
    }

    function convertUnit(value, from, to) {
      if (from === to) return value;
      if (from === "kg" && to === "g") return value * 1000;
      if (from === "g" && to === "kg") return value / 1000;
      if (from === "L" && to === "ml") return value * 1000;
      if (from === "ml" && to === "L") return value / 1000;
      return null;
    }

    function defaultRule(unit) {
      const normalized = normalizeUnit(unit);
      return { orderUnit: normalized, packageQuantity: 1, packageUnit: normalized, roundStep: normalized === "g" || normalized === "ml" ? 100 : 1, note: "要確認" };
    }

    function findRule(name) {
      const normalized = normalizeName(name);
      return customRules.concat(standardRules).find(rule => rule.names.some(ruleName => normalized === normalizeName(ruleName) || normalized.includes(normalizeName(ruleName))));
    }

    function parseChildrenCount(text) {
      const csv = parseLooseCsv(text);
      if (!csv.length) return 1;
      const header = csv[0].map(normalizeHeader);
      const index = header.findIndex(value => /3歳未満|３歳未満|未満児|0歳|０歳|1歳|１歳|2歳|２歳/.test(value));
      if (index >= 0) return csv.slice(1).reduce((sum, row) => sum + numberValue(row[index]), 0) || 1;
      return csv.flat().reduce((sum, value) => sum + numberValue(value), 0) || 1;
    }

    function parseRuleCsv(text) {
      const csv = parseLooseCsv(text);
      if (csv.length < 2) return [];
      const header = csv[0].map(normalizeHeader);
      const ni = findIndex(header, ["食品名", "食材名", "材料名", "品名", "name"]);
      const oui = findIndex(header, ["発注単位", "納品単位", "orderunit", "単位"]);
      const pqi = findIndex(header, ["入数", "換算量", "基準量", "packagequantity"]);
      const pui = findIndex(header, ["基準単位", "換算単位", "packageunit"]);
      const rsi = findIndex(header, ["丸め単位", "発注刻み", "roundstep"]);
      const exi = findIndex(header, ["除外", "対象外", "exclude"]);
      const noi = findIndex(header, ["摘要", "備考", "note"]);
      return csv.slice(1).map(row => ({
        names: String(row[ni] || "").split(/[、/|｜]/).map(normalizeName).filter(Boolean),
        orderUnit: row[oui] || "",
        packageQuantity: numberValue(row[pqi]) || 1,
        packageUnit: row[pui] || row[oui] || "個",
        roundStep: numberValue(row[rsi]) || 1,
        exclude: /^(1|true|yes|除外|対象外)$/i.test(String(row[exi] || "").trim()),
        reason: row[noi] || "ルールCSVで除外",
        note: row[noi] || "ルールCSV"
      })).filter(rule => rule.names.length);
    }

    function addRow() {
      syncRows();
      rows.push({ checked: "□", name: "", totalQuantity: 1, totalUnit: "個", note: "手入力", orderQuantity: 1, orderUnit: "個", unitPrice: "", amount: "", origin: "" });
      renderTable();
      updateSummary();
      updateDebugJson({ mode: "manual", items: rows.map(row => ({ name: row.name, quantity: row.totalQuantity, unit: row.totalUnit })), rows, stats });
    }

    function deleteRow(index) {
      syncRows();
      rows.splice(index, 1);
      renderTable();
      updateSummary();
      updateDebugJson({ mode: "manual", items: rows.map(row => ({ name: row.name, quantity: row.totalQuantity, unit: row.totalUnit })), rows, stats });
      notice.textContent = "行を削除しました。データ0件でも出力できます。";
    }

    function renderTable() {
      if (!rows.length) {
        tableArea.className = "empty";
        tableArea.textContent = "まだ食材がありません。すべての出力ボタンは使えます。";
        return;
      }
      tableArea.className = "table-wrap";
      tableArea.innerHTML = "<table><thead><tr>" + headers.concat(["操作"]).map(header => "<th>" + escapeHtml(header) + "</th>").join("") + "</tr></thead><tbody>" + rows.map((row, index) => rowHtml(row, index)).join("") + "</tbody></table>";
    }

    function rowHtml(row, index) {
      const cells = [
        inputCell(index, "checked", row.checked, "チェック"),
        inputCell(index, "name", row.name, "材料名"),
        inputCell(index, "totalQuantity", row.totalQuantity, "総使用量", "number", "0.01"),
        inputCell(index, "totalUnit", row.totalUnit, "単位"),
        inputCell(index, "note", row.note, "摘要"),
        inputCell(index, "orderQuantity", row.orderQuantity, "納品数", "number", "0.01"),
        inputCell(index, "orderUnit", row.orderUnit, "単位"),
        inputCell(index, "unitPrice", row.unitPrice, "単価", "number", "0.01"),
        inputCell(index, "amount", row.amount, "金額", "number", "0.01"),
        inputCell(index, "origin", row.origin, "産地"),
        "<td data-label=\"操作\"><button class=\"red delete-row\" type=\"button\" onclick=\"deleteRow(" + index + ");\">削除</button></td>"
      ];
      return "<tr>" + cells.join("") + "</tr>";
    }

    function inputCell(index, key, value, label, type = "text", step = "") {
      return "<td data-label=\"" + escapeHtml(label) + "\"><input data-index=\"" + index + "\" data-key=\"" + key + "\" type=\"" + type + "\" " + (step ? "step=\"" + step + "\"" : "") + " value=\"" + escapeHtml(value) + "\" oninput=\"syncRows(); updateSummary();\"></td>";
    }

    function syncRows() {
      const nextRows = rows.map(row => ({ ...row }));
      document.querySelectorAll("#tableArea input[data-index]").forEach(input => {
        const index = Number(input.dataset.index);
        const key = input.dataset.key;
        if (nextRows[index]) nextRows[index][key] = input.value;
      });
      rows = nextRows;
    }

    function updateSummary() {
      itemCount.textContent = rows.length;
      mergedCount.textContent = stats.merged;
      excludedCount.textContent = stats.excluded;
    }

    function buildOutputRows() {
      syncRows();
      return rows.map(row => {
        const price = numberValue(row.unitPrice);
        const orderQty = numberValue(row.orderQuantity);
        const amount = row.amount !== "" ? row.amount : (price && orderQty ? round(price * orderQty) : "");
        return [row.checked || "□", row.name || "", row.totalQuantity || "", row.totalUnit || "", row.note || "", row.orderQuantity || "", row.orderUnit || "", row.unitPrice || "", amount, row.origin || ""];
      });
    }

    function buildCsvText() {
      const docRows = [
        ["納品日", deliveryDate.value || "", "使用日", useDate.value || "", "検品者", checkerName.value || ""],
        [],
        headers
      ];
      return docRows.concat(buildOutputRows()).map(row => row.map(csvEscape).join(",")).join("\n");
    }

    function downloadCsv() {
      const blob = new Blob(["\uFEFF" + buildCsvText()], { type: "text/csv;charset=utf-8" });
      downloadBlob(blob, "発注書.csv");
      notice.textContent = "CSVをダウンロードしました。";
    }

    function showCsv() {
      csvOutput.value = buildCsvText();
      csvPanel.classList.add("is-open");
      notice.textContent = "CSVを表示しました。コピーできます。";
    }

    async function copyCsv() {
      const text = buildCsvText();
      csvOutput.value = text;
      csvPanel.classList.add("is-open");
      try {
        await navigator.clipboard.writeText(text);
        notice.textContent = "CSVをコピーしました。";
      } catch (error) {
        csvOutput.focus();
        csvOutput.select();
        notice.textContent = "自動コピーできないため、表示されたCSVを選択してコピーしてください。";
      }
    }

    function downloadExcel() {
      const aoa = [
        ["発注書"],
        ["納品日", deliveryDate.value || "", "使用日", useDate.value || "", "検品者", checkerName.value || ""],
        [],
        headers,
        ...buildOutputRows()
      ];
      if (!window.XLSX) {
        const html = "<table>" + aoa.map(row => "<tr>" + row.map(cell => "<td>" + escapeHtml(cell) + "</td>").join("") + "</tr>").join("") + "</table>";
        downloadBlob(new Blob([html], { type: "application/vnd.ms-excel;charset=utf-8" }), "発注書.xls");
        notice.textContent = "Excelライブラリ未読込のため.xlsで出力しました。";
        return;
      }
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"] = [{ wch: 8 }, { wch: 18 }, { wch: 10 }, { wch: 8 }, { wch: 28 }, { wch: 10 }, { wch: 8 }, { wch: 10 }, { wch: 10 }, { wch: 12 }];
      ws["!merges"] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 9 } }];
      Object.keys(ws).filter(address => !address.startsWith("!")).forEach(address => {
        const cell = ws[address];
        cell.s = {
          font: { name: "Yu Gothic", sz: address === "A1" ? 18 : 11, bold: address === "A1" || /^[A-J]4$/.test(address) },
          alignment: { vertical: "center", horizontal: address === "A1" ? "center" : "left", wrapText: true },
          border: { top: { style: "thin", color: { rgb: "000000" } }, bottom: { style: "thin", color: { rgb: "000000" } }, left: { style: "thin", color: { rgb: "000000" } }, right: { style: "thin", color: { rgb: "000000" } } }
        };
      });
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "発注書");
      XLSX.writeFile(wb, "発注書.xlsx");
      notice.textContent = "Excelをダウンロードしました。";
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function normalizeName(value) {
      const normalized = String(value || "")
        .replace(/^\uFEFF/, "")
        .replace(/[\u200B-\u200D\uFEFF]/g, "")
        .replace(/[①-⑳]/g, "")
        .replace(/[0-9０-９]+(?:[.．][0-9０-９]+)?/g, "")
        .replace(new RegExp("\\b(?:" + units.map(escapeRegExp).join("|") + ")\\b", "gi"), "")
        .replace(/["'`~^*_=+;<>?？!！\\\\]/g, "")
        .replace(/\s+/g, "")
        .trim();
      return aliases[normalized] || normalized;
    }

    function normalizeUnit(value) {
      const unit = String(value || "個").trim().replace("リットル", "L").replace("ｇ", "g").replace("ｍｌ", "ml").replace("㎏", "kg");
      if (/^l$/i.test(unit)) return "L";
      return unit || "個";
    }

    function normalizeHeader(value) {
      return String(value || "").replace(/^\uFEFF/, "").replace(/\s+/g, "").toLowerCase();
    }

    function isValidFoodName(name) {
      const value = String(name || "").trim();
      if (value.length < 2) return false;
      if (!/^[ぁ-んァ-ヶー一-龠々〆ヵヶ]+$/.test(value)) return false;
      if (/^(食品名|食材名|材料名|品名|数量|単位|合計|小計|献立|日付|月|火|水|木|金|土|日)$/.test(value)) return false;
      if (/^[ー々〆ヵヶ]+$/.test(value)) return false;
      return true;
    }

    function isHeaderWord(value) {
      return /食品名|食材名|材料名|品名|数量|単位|献立名|日付|使用量|総使用量/.test(String(value || ""));
    }

    function allKnownNames() {
      const fromRules = customRules.concat(standardRules).flatMap(rule => rule.names || []);
      return fromRules.concat(Object.keys(aliases)).sort((a, b) => b.length - a.length);
    }

    function numberValue(value) {
      const normalized = String(value ?? "").normalize("NFKC").replace(/[^0-9.\-]/g, "");
      const number = Number(normalized);
      return Number.isFinite(number) ? number : 0;
    }

    function round(value) {
      const number = Number(value);
      return Number.isFinite(number) ? Math.round(number * 100) / 100 : value;
    }

    function roundUp(value, step) {
      const base = Number(value);
      const unit = Number(step) || 1;
      if (!Number.isFinite(base)) return "";
      return round(Math.ceil(base / unit) * unit);
    }

    function findIndex(header, names) {
      const index = header.findIndex(value => names.map(normalizeHeader).includes(value));
      return index >= 0 ? index : 0;
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"]/g, match => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[match]));
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function updateDebugJson(data) {
      const safeData = data || { items: [], rows: [], stats, mode: "empty" };
      const json = JSON.stringify(safeData, null, 2);
      debugJson.textContent = json;
      console.log("抽出結果（JSON）", safeData);
    }

    updateDebugJson({ items: [], rows: [], stats, mode: "empty" });
    renderTable();
    updateSummary();
  </script>
</body>
