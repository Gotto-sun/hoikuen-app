<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>発注書Excel作成</title>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js" onerror="window.pdfLoadError = true"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js" onerror="window.xlsxLoadError = true"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js" onerror="window.tesseractLoadError = true"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js" onerror="window.mammothLoadError = true"></script>
  <script>
    if (!window.pdfjsLib) {
      document.write('<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js" onerror="window.pdfLoadError = true"><\/script>');
    }
    if (!window.XLSX) {
      document.write('<script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
    if (!window.XLSX) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
    if (!window.XLSX) {
      document.write('<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
    if (!window.Tesseract) {
      document.write('<script src="https://unpkg.com/tesseract.js@5.1.1/dist/tesseract.min.js" onerror="window.tesseractLoadError = true"><\/script>');
    }
    if (!window.mammoth) {
      document.write('<script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js" onerror="window.mammothLoadError = true"><\/script>');
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: #fff7ed;
      color: #1f2937;
      line-height: 1.7;
    }

    header {
      padding: 20px 16px 12px;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: #fff;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.95;
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px;
    }

    section {
      background: #fff;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(154, 52, 18, 0.08);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .note {
      margin: 0 0 12px;
      color: #667085;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }

    .green {
      background: #16a34a;
    }

    .gray {
      background: #64748b;
    }

    .red {
      background: #dc2626;
    }

    .status {
      min-height: 1.8em;
      margin: 10px 0 0;
      color: #475569;
      font-weight: 700;
      font-size: 14px;
    }

    .import-progress {
      display: none;
      gap: 8px;
      align-items: center;
      margin: 10px 0 0;
    }

    .import-progress.is-active {
      display: flex;
    }

    .progress-track {
      flex: 1;
      height: 14px;
      overflow: hidden;
      border: 1px solid #fdba74;
      border-radius: 999px;
      background: #ffedd5;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #fb923c, #16a34a);
      transition: width 0.2s ease;
    }

    .progress-percent {
      min-width: 48px;
      color: #7c2d12;
      font-weight: 700;
      text-align: right;
    }

    .document-fields {
      display: grid;
      grid-template-columns: 90px 1fr 90px 1fr 90px 1fr;
      gap: 8px;
      align-items: center;
      margin: 12px 0;
      padding: 12px;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      background: #fffdf8;
    }

    label {
      display: block;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      background: #fffdf8;
    }

    .pdf-box {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #ffedd5;
    }

    .pdf-textarea {
      min-height: 220px;
      resize: vertical;
      white-space: pre-wrap;
    }

    .csv-textarea {
      min-height: 180px;
      resize: vertical;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .copy-textarea {
      min-height: 180px;
      resize: vertical;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #f8fafc;
    }

    .table-wrap {
      overflow-x: auto;
      text-align: center;
    }

    table {
      width: 100%;
      min-width: 680px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid #ffedd5;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #ffedd5;
      color: #7c2d12;
      white-space: nowrap;
    }

    .manual-table input {
      min-width: 110px;
    }

    .preview-sheet {
      width: 794px;
      min-width: 794px;
      margin: 0 auto 0 18px;
      table-layout: fixed;
      border: 2px solid #111827;
      font-size: 12px;
      line-height: 1.25;
    }

    .preview-sheet th,
    .preview-sheet td {
      border: 1px solid #111827;
      padding: 2px 3px;
      text-align: center;
      height: 24px;
      overflow-wrap: anywhere;
    }

    .preview-sheet .ingredient-row th,
    .preview-sheet .ingredient-row td {
      height: 20px;
    }

    .preview-sheet th:nth-child(1),
    .preview-sheet td:nth-child(1) {
      width: 56px;
    }

    .preview-sheet th:nth-child(2),
    .preview-sheet td:nth-child(2) {
      width: 150px;
    }

    .preview-sheet th:nth-child(3),
    .preview-sheet td:nth-child(3) {
      width: 70px;
    }

    .preview-sheet th:nth-child(4),
    .preview-sheet td:nth-child(4) {
      width: 52px;
    }

    .preview-sheet th:nth-child(5),
    .preview-sheet td:nth-child(5) {
      width: 102px;
    }

    .preview-sheet th:nth-child(6),
    .preview-sheet td:nth-child(6) {
      width: 64px;
    }

    .preview-sheet th:nth-child(7),
    .preview-sheet td:nth-child(7) {
      width: 48px;
    }

    .preview-sheet th:nth-child(8),
    .preview-sheet td:nth-child(8),
    .preview-sheet th:nth-child(9),
    .preview-sheet td:nth-child(9),
    .preview-sheet th:nth-child(10),
    .preview-sheet td:nth-child(10) {
      width: 74px;
    }

    .preview-sheet .title-row td,
    .preview-sheet .sub-title-row td {
      border: 0;
      font-weight: 700;
      text-align: center;
    }

    .preview-sheet .title-row td {
      font-size: 18px;
      height: 30px;
    }

    .preview-sheet .left {
      text-align: left;
    }

    .preview-sheet .date-row td {
      background: #fde2e8;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .preview-sheet .date-line {
      text-align: left;
      white-space: nowrap;
      overflow-wrap: normal;
      word-break: keep-all;
    }

    .preview-sheet .blank td {
      border: 0;
      height: 8px;
      padding: 0;
    }

    .preview-sheet .total-label {
      font-weight: 700;
    }

    .preview-sheet .total-amount {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      padding-right: 6px;
    }

    .preview-sheet .summary-row td {
      vertical-align: middle;
    }

    .preview-sheet .checker-label-row td {
      height: 7.714px;
      padding-top: 0;
      padding-bottom: 0;
      line-height: 1;
    }

    .preview-sheet .total-row td {
      height: 18px;
      padding-top: 0;
      padding-bottom: 0;
    }

    .preview-sheet .no-border {
      border: 0;
    }

    @media (max-width: 760px) {
      main {
        padding: 12px;
      }

      .document-fields {
        grid-template-columns: 1fr;
      }

      .manual-table,
      .manual-table thead,
      .manual-table tbody,
      .manual-table tr,
      .manual-table td {
        display: block;
        width: 100%;
        min-width: 0;
      }

      .manual-table thead {
        display: none;
      }

      .manual-table tr {
        border: 1px solid #ffedd5;
        border-radius: 12px;
        margin-bottom: 10px;
        padding: 10px;
      }

      .manual-table td {
        border: 0;
        padding: 6px 0;
      }

      .manual-table td::before {
        content: attr(data-label);
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #667085;
        margin-bottom: 3px;
      }
    }

    @media print {
      body {
        background: #fff;
        color: #000;
      }

      header,
      section:first-child,
      .buttons,
      .status,
      .note {
        display: none !important;
      }

      @page {
        size: A4 portrait;
        margin: 0.8cm 1cm 0.8cm 1.5cm;
      }

      main,
      section {
        max-width: none;
        margin: 0;
        padding: 0;
        border: 0;
        box-shadow: none;
      }

      .table-wrap {
        overflow: visible;
      }

      .preview-sheet {
        width: 100%;
        min-width: 0;
        margin-left: 0;
        margin-right: 0;
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>発注書Excel作成</h1>
    <p>ファイルを読み取り、抽出した材料名・数量・単位だけを発注書Excelに反映します。</p>
  </header>

  <main>
    <section>

      <h2>1. ファイル読み込み（OCR確認）</h2>
      <div class="pdf-box">
        <p class="note">ファイルを選ぶと、読み取った全文を必ず下に表示します。材料名・数量・単位を抽出できた時だけExcel出力できます。</p>
        <input id="pdfFile" type="file" accept=".pdf,application/pdf,.png,.jpg,.jpeg,.webp,.bmp,.gif,image/*,.xlsx,.xls,.csv,text/csv,.docx,.doc,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,.txt,text/plain" aria-label="読み込みファイル">
        <div id="importProgress" class="import-progress" aria-label="読み込み率" aria-live="polite">
          <div class="progress-track"><div id="importProgressBar" class="progress-bar"></div></div>
          <span id="importProgressPercent" class="progress-percent">0%</span>
        </div>
        <textarea id="pdfText" class="pdf-textarea" readonly placeholder="抽出テキスト欄：ファイルから読み込んだ文字を必ずここに表示します。"></textarea>
        <p id="pdfStatus" class="status"></p>
        <label for="ocrLog">ログ</label>
        <textarea id="ocrLog" class="copy-textarea" readonly placeholder="OCR結果・抽出結果・失敗理由をここに表示します。"></textarea>
      </div>

      <div hidden aria-hidden="true">
        <textarea id="menuCsvText" class="csv-textarea" disabled></textarea>
        <button class="green" type="button" id="menuCsvBtn" disabled>発注書を作る</button>
        <button class="gray" type="button" id="copyTsvBtn" disabled>Excel貼り付け用をコピー</button>
        <p id="csvStatus" class="status"></p>
        <textarea id="orderTsv" class="copy-textarea" readonly disabled></textarea>
      </div>

      <h2>2. 自動抽出結果</h2>
      <p class="note">OCR全文から抽出できた材料名・数量・単位だけを表示します。抽出できない場合、Excelは作成しません。</p>

      <div class="document-fields" aria-label="発注書情報">
        <label for="deliveryDate">納品日</label>
        <input id="deliveryDate" type="date">
        <label for="useDate">使用日</label>
        <input id="useDate" type="date">
        <label for="checkerName">検品者</label>
        <input id="checkerName" type="text" placeholder="検品者名">
      </div>

      <div class="table-wrap">
        <table class="manual-table" aria-label="自動抽出結果テーブル">
          <thead>
            <tr>
              <th>材料名</th>
              <th>数量</th>
              <th>単位</th>
              <th>抽出元</th>
            </tr>
          </thead>
          <tbody id="manualRows"></tbody>
        </table>
      </div>

      <div class="buttons">
        <button class="gray" type="button" id="addBtn" hidden>＋ 行を追加</button>
        <button class="green" type="button" id="excelBtn" disabled>Excel出力</button>
        <button class="red" type="button" id="clearBtn">入力を消す</button>
      </div>
      <p id="notice" class="status"></p>
    </section>

    <section>
      <h2>3. 発注書レイアウト</h2>
      <p class="note">抽出できた内容だけを下の発注書レイアウトに自動反映します。</p>
      <div class="table-wrap" id="orderPreview"></div>
    </section>
  </main>

  <script>
    const manualRows = document.getElementById("manualRows");
    const orderPreview = document.getElementById("orderPreview");
    const addBtn = document.getElementById("addBtn");
    const excelBtn = document.getElementById("excelBtn");
    const clearBtn = document.getElementById("clearBtn");
    const pdfFile = document.getElementById("pdfFile");
    const pdfText = document.getElementById("pdfText");
    const pdfStatus = document.getElementById("pdfStatus");
    const importProgress = document.getElementById("importProgress");
    const importProgressBar = document.getElementById("importProgressBar");
    const importProgressPercent = document.getElementById("importProgressPercent");
    const deliveryDate = document.getElementById("deliveryDate");
    const useDate = document.getElementById("useDate");
    const checkerName = document.getElementById("checkerName");
    const notice = document.getElementById("notice");
    const menuCsvText = document.getElementById("menuCsvText");
    const menuCsvBtn = document.getElementById("menuCsvBtn");
    const copyTsvBtn = document.getElementById("copyTsvBtn");
    const orderTsv = document.getElementById("orderTsv");
    const csvStatus = document.getElementById("csvStatus");
    const ocrLog = document.getElementById("ocrLog");

    const orderSheetHeaders = ["チェック", "材料名", "総使用量", "単位", "摘要", "納品数", "単位", "単価", "金額", "産地"];
    const orderSheetDetailRows = 30;
    const weekdayPeople = { 月: 5, 火: 7, 水: 7, 木: 7, 金: 7 };
    const fixedOrderRules = [
      { key: "milk", label: "牛乳", quantity: 2, unit: "本", note: "450ml × 2本", tests: [/牛乳/, /ミルク/] },
      { key: "yogurt", label: "ヨーグルト", quantity: 2, unit: "パック", note: "3個パック × 2", tests: [/ヨーグルト|牧場の朝/] }
    ];
    const roundingOrderRules = [
      { label: "キャベツ", unit: "個", step: 0.25, base: { g: 1200 }, tests: [/キャベツ/] },
      { label: "白菜", unit: "個", step: 0.125, base: { g: 2000 }, tests: [/白菜/] },
      { label: "にんじん", unit: "本", step: 0.5, base: { g: 150 }, tests: [/にんじん|人参/] },
      { label: "きのこ類", unit: "袋", step: 1, base: { g: 100 }, tests: [/きのこ|しめじ|えのき|しいたけ|椎茸|まいたけ|舞茸|エリンギ|マッシュルーム/] }
    ];
    const excludedIngredientPattern = /(米$|^米$|精白米|白米|ごはん|御飯|だし|出汁|だし汁|煮干しだし|かつおだし|昆布だし|水$|食塩|塩$|砂糖|しょうゆ|醤油|みそ|味噌|酢$|油$|サラダ油|ごま油|酒$|みりん|こしょう|胡椒|ソース|ケチャップ|マヨネーズ|コンソメ|中華だし|カレー粉)/;
    const recipeInstructionPattern = /(作り方|つくり方|手順|調理方法|下処理|切る|切って|切り|ゆでる|茹でる|煮る|煮込む|焼く|炒める|蒸す|揚げる|混ぜる|和える|加える|入れる|のせる|盛る|塗る|洗う|さらす|水気|一口大|短冊|千切り|みじん切り|いちょう切り|薄切り|乱切り|小房|皮をむく|火を通す)/;
    const maxImageOcrSizeBytes = 60 * 1024 * 1024;
    const maxImageOcrDimension = 1000;
    const imageLoadTimeoutMs = 6000;
    const ocrTargetTimeoutMs = 10000;
    const ocrTimeoutMs = 30000;
    const maxOcrCandidatePatterns = 2;
    const lightImageJpegQuality = 0.55;
    const ocrTimeoutMessage = "タイムアウト：画像が重すぎるため処理を中断しました";
    let rows = [];

    menuCsvBtn.addEventListener("click", event => {
      event.preventDefault();
      csvStatus.textContent = "献立CSVからの発注書作成は現在停止中です。";
    });
    copyTsvBtn.addEventListener("click", event => {
      event.preventDefault();
      csvStatus.textContent = "献立CSVからの発注書作成は現在停止中です。";
    });

    addBtn.addEventListener("click", event => {
      event.preventDefault();
      notice.textContent = "手入力機能は停止中です。ファイル読み取りを使ってください。";
    });

    excelBtn.addEventListener("click", downloadExcel);
    pdfFile.addEventListener("change", async event => {
      const file = event.target.files && event.target.files[0];
      await handleFileSelect(file);
    });

    pdfText.addEventListener("input", () => {
      notice.textContent = "手入力機能は停止中です。ファイル読み取りを使ってください。";
    });

    clearBtn.addEventListener("click", () => {
      rows = [];
      deliveryDate.value = "";
      useDate.value = "";
      checkerName.value = "";
      orderTsv.value = "";
      csvStatus.textContent = "";
      notice.textContent = "入力を消しました。";
      renderManualTable();
      renderOrderPreview();
    });

    [deliveryDate, useDate, checkerName].forEach(input => {
      input.addEventListener("input", renderOrderPreview);
    });

    renderManualTable();
    renderOrderPreview();


    async function handleFileSelect(file) {
      pdfText.value = "";
      notice.textContent = "";
      if (!file) {
        pdfStatus.textContent = "ファイルが選ばれていません。";
        return;
      }

      updateImportProgress(0, "処理を開始しました。");
      pdfFile.disabled = true;

      try {
        updateImportProgress(10, "ファイルを読み込み中です。");
        const text = await readFileText(file);
        const extractedText = String(text || "").trim();
        pdfText.value = extractedText || "【読み取り失敗】OCR結果が空です。Excelは作成しません。";
        logOcrStep("OCR結果", extractedText ? extractedText : "空");
        if (!extractedText) {
          markFileImportFailed("読み取り失敗：OCR結果が空です。Excelは作成しません。", { keepText: true });
          return;
        }
        updateImportProgress(75, "材料を抽出中です。");
        const parsedRows = parseIngredients(extractedText);
        logOcrStep("抽出結果", parsedRows.length ? parsedRows.map(row => row.name + " " + row.quantity + row.unit).join(" / ") : "0件");
        updateImportProgress(100, "読み込み完了");
        applyParsedRows(parsedRows, { append: false, statusPrefix: file.name + " の読み込み完了" });
      } catch (error) {
        const reason = error && error.message ? error.message : String(error || "不明なエラー");
        console.error("file import error", { fileName: file.name, reason });
        pdfText.value = "【読み取り失敗】" + reason;
        logOcrStep("失敗理由", reason);
        markFileImportFailed("読み取り失敗：" + reason + "。Excelは作成しません。", { keepText: true });
      } finally {
        pdfFile.disabled = false;
        pdfFile.value = "";
      }
    }

    async function readFileText(file) {
      const fileKind = getFileKind(file);
      pdfStatus.textContent = "ファイルを読み込み中です。";

      if (fileKind === "pdf") return extractTextFromPdf(await file.arrayBuffer());
      if (fileKind === "image") return extractTextFromImage(file);
      if (fileKind === "spreadsheet") return extractTextFromWorkbook(await file.arrayBuffer(), file.name);
      if (fileKind === "word") return extractTextFromWord(await file.arrayBuffer());
      return readPlainText(file);
    }

    async function extractTextFromPdf(content) {
      if (!isPdfReady()) {
        throw new Error("PDF読み込みライブラリを読み込めませんでした。");
      }

      pdfStatus.textContent = "PDFからテキストを抽出中です。しばらくお待ちください。";
      const pdf = await pdfjsLib.getDocument({ data: content }).promise;
      const pages = [];
      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
        updateImportProgress(Math.min(70, 10 + Math.round((pageNumber / pdf.numPages) * 55)), "PDF " + pageNumber + "/" + pdf.numPages + "ページを読み込み中です。");
        const page = await pdf.getPage(pageNumber);
        const pageContent = await page.getTextContent();
        let pageText = getPageTextLines(pageContent.items);
        if (!pageText && isTesseractReady()) {
          pageText = await extractTextFromPdfPageImage(page, pageNumber, pdf.numPages);
        }
        pages.push("【" + pageNumber + "ページ】\n" + (pageText || ""));
      }
      return pages.join("\n\n").trim();
    }

    async function extractTextFromPdfPageImage(page, pageNumber, pageCount) {
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d", { willReadFrequently: true });
      canvas.width = Math.ceil(viewport.width);
      canvas.height = Math.ceil(viewport.height);
      await page.render({ canvasContext: context, viewport }).promise;
      updateImportProgress(Math.min(72, 20 + Math.round((pageNumber / pageCount) * 50)), "PDF画像をOCR中です（" + pageNumber + "/" + pageCount + "ページ）。");
      const lightCanvas = await createLightweightOcrCanvas(canvas);
      const ocrResult = await withTimeout(recognizeBestJapaneseOcr(lightCanvas, {
        baseProgress: 20,
        progressRange: 52,
        label: "PDF画像OCR",
        detail: "軽量モード " + pageNumber + "/" + pageCount + "ページ"
      }), ocrTimeoutMs, ocrTimeoutMessage);
      return ocrResult.text;
    }

    async function extractTextFromImage(file) {
      if (!isTesseractReady()) {
        throw new Error("画像OCRライブラリを読み込めませんでした。");
      }
      validateImageFileSize(file);

      pdfStatus.textContent = "画像から文字をOCR中です。しばらくお待ちください。";
      updateImportProgress(20, "画像OCRを開始しました。");
      try {
        const sourceCanvas = await fileToCanvas(file);
        const lightCanvas = await createLightweightOcrCanvas(sourceCanvas);
        const ocrResult = await withTimeout(recognizeBestJapaneseOcr(lightCanvas, {
          baseProgress: 20,
          progressRange: 75,
          label: "画像OCR",
          detail: "軽量モード"
        }), ocrTimeoutMs, ocrTimeoutMessage);
        updateImportProgress(100, "画像OCR完了");
        return ocrResult.text;
      } catch (error) {
        const reason = error && error.message ? error.message : "画像OCRに失敗しました。";
        console.error("image ocr failed", { fileName: file.name, reason });
        updateImportProgress(100, reason === ocrTimeoutMessage ? ocrTimeoutMessage : "画像OCRに失敗しました。");
        throw new Error(reason === ocrTimeoutMessage ? ocrTimeoutMessage : "読み込み失敗: " + reason);
      }
    }

    function validateImageFileSize(file) {
      if (file.size > maxImageOcrSizeBytes) {
        throw new Error("画像ファイルが大きすぎます。60MB以下の画像を選んでください。");
      }
      console.info("image file check", { fileName: file.name, sizeBytes: file.size, type: file.type });
    }


    async function createLightweightOcrCanvas(sourceCanvas) {
      const resizedCanvas = resizeCanvasToMaxWidth(sourceCanvas, maxImageOcrDimension);
      const blob = await new Promise((resolve, reject) => {
        resizedCanvas.toBlob(result => result ? resolve(result) : reject(new Error("画像の軽量化に失敗しました。")), "image/jpeg", lightImageJpegQuality);
      });
      const objectUrl = URL.createObjectURL(blob);
      try {
        const image = await new Promise((resolve, reject) => {
          const element = new Image();
          element.onload = () => resolve(element);
          element.onerror = () => reject(new Error("軽量化した画像を読み込めませんでした。"));
          element.src = objectUrl;
        });
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, image.naturalWidth || image.width);
        canvas.height = Math.max(1, image.naturalHeight || image.height);
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        console.info("ocr jpeg lightweight image", { width: canvas.width, height: canvas.height, bytes: blob.size, quality: lightImageJpegQuality });
        return canvas;
      } finally {
        URL.revokeObjectURL(objectUrl);
      }
    }

    async function recognizeBestJapaneseOcr(sourceCanvas, options = {}) {
      const rotations = [0];
      const baseProgress = Number(options.baseProgress) || 0;
      const progressRange = Number(options.progressRange) || 60;
      const label = options.label || "画像OCR";
      const detail = options.detail ? "（" + options.detail + "）" : "";
      const ocrTargets = rotations.flatMap(angle => {
        const rotatedCanvas = angle === 0 ? sourceCanvas : rotateCanvas(sourceCanvas, angle);
        return createOcrPreprocessCanvases(rotatedCanvas).map(variant => ({ angle, ...variant }));
      }).slice(0, maxOcrCandidatePatterns);
      console.info("ocr lightweight mode", { maxSeconds: ocrTimeoutMs / 1000, maxWidth: maxImageOcrDimension, jpegQuality: lightImageJpegQuality, candidatePatterns: ocrTargets.length });
      const results = [];

      for (let index = 0; index < ocrTargets.length; index++) {
        const target = ocrTargets[index];
        const targetStart = baseProgress + Math.round((index / ocrTargets.length) * progressRange);
        updateImportProgress(targetStart, label + detail + "中です（" + target.angle + "度・" + target.label + "）。");
        try {
          const result = await recognizeWithManagedTesseract(target.canvas, data => {
            if (data && data.status === "recognizing text") {
              const progress = Number(data.progress) || 0;
              const totalProgress = baseProgress + Math.round(((index + progress) / ocrTargets.length) * progressRange);
              updateImportProgress(totalProgress, label + detail + "中です（" + target.angle + "度・" + target.label + " " + Math.round(progress * 100) + "%）。");
            }
          }, ocrTargetTimeoutMs, ocrTimeoutMessage);
          const text = result && result.data ? String(result.data.text || "").trim() : "";
          const confidence = result && result.data && Number.isFinite(Number(result.data.confidence)) ? Number(result.data.confidence) : 0;
          results.push(scoreOcrText({ angle: target.angle, variant: target.label, text, confidence }));
        } catch (error) {
          console.error("ocr target failed", { angle: target.angle, variant: target.label, reason: error && error.message ? error.message : error });
          if (error && error.message === ocrTimeoutMessage) throw error;
          results.push(scoreOcrText({ angle: target.angle, variant: target.label, text: "" }));
        }
      }

      const readableResults = results.filter(result => result.text && !result.garbled && result.materialRowCount > 0);
      const best = readableResults.sort((a, b) => b.score - a.score || b.materialRowCount - a.materialRowCount || b.japaneseCount - a.japaneseCount || a.angle - b.angle)[0] || { angle: 0, variant: "", text: "", score: 0, japaneseCount: 0, materialRowCount: 0, garbled: true };
      updateImportProgress(100, best.garbled
        ? label + "完了。文字化けの可能性が高いため、発注書には反映しません。"
        : label + "完了。日本語・数字・単位が一番多い" + best.angle + "度（" + best.variant + "）の結果を採用しました。");
      return best;
    }


    async function recognizeWithManagedTesseract(canvas, logger, timeoutMs, timeoutMessage) {
      let worker = null;
      let timedOut = false;
      let timerId = null;

      const terminateWorker = async () => {
        if (worker && typeof worker.terminate === "function") {
          try {
            await worker.terminate();
          } catch (error) {
            console.warn("ocr worker terminate failed", error);
          }
        }
      };

      const timeoutPromise = new Promise((_, reject) => {
        timerId = setTimeout(async () => {
          timedOut = true;
          console.error("operation timeout", { timeoutMs, reason: timeoutMessage });
          await terminateWorker();
          reject(new Error(timeoutMessage));
        }, timeoutMs);
      });

      const ocrPromise = (async () => {
        try {
          if (typeof Tesseract.createWorker === "function") {
            worker = await Tesseract.createWorker("jpn+eng", 1, {
              langPath: "https://tessdata.projectnaptha.com/4.0.0",
              logger
            });
            if (timedOut) {
              await terminateWorker();
              throw new Error(timeoutMessage);
            }
            await worker.setParameters({
              tessedit_pageseg_mode: "6",
              preserve_interword_spaces: "1",
              user_defined_dpi: "300",
              textord_heavy_nr: "1"
            });
            return await worker.recognize(canvas);
          }
          return await Tesseract.recognize(canvas, "jpn+eng", {
            langPath: "https://tessdata.projectnaptha.com/4.0.0",
            logger,
            tessedit_pageseg_mode: "6",
            preserve_interword_spaces: "1",
            user_defined_dpi: "300",
            textord_heavy_nr: "1"
          });
        } finally {
          if (timerId) clearTimeout(timerId);
          await terminateWorker();
        }
      })();

      return Promise.race([ocrPromise, timeoutPromise]);
    }

    function fileToCanvas(file) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        const objectUrl = URL.createObjectURL(file);
        const timeoutId = setTimeout(() => {
          URL.revokeObjectURL(objectUrl);
          reject(new Error("画像読み込みがタイムアウトしました。"));
        }, imageLoadTimeoutMs);
        image.onload = () => {
          clearTimeout(timeoutId);
          URL.revokeObjectURL(objectUrl);
          try {
            const originalWidth = image.naturalWidth || image.width;
            const originalHeight = image.naturalHeight || image.height;
            if (!originalWidth || !originalHeight) {
              throw new Error("画像の解像度を確認できませんでした。");
            }
            const scale = Math.min(1, maxImageOcrDimension / originalWidth);
            const width = Math.max(1, Math.round(originalWidth * scale));
            const height = Math.max(1, Math.round(originalHeight * scale));
            console.info("image resolution check", { fileName: file.name, originalWidth, originalHeight, width, height });
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext("2d", { willReadFrequently: true });
            context.drawImage(image, 0, 0, width, height);
            resolve(canvas);
          } catch (error) {
            reject(error);
          }
        };
        image.onerror = () => {
          clearTimeout(timeoutId);
          URL.revokeObjectURL(objectUrl);
          reject(new Error("画像を読み込めませんでした。"));
        };
        image.src = objectUrl;
      });
    }

    function withTimeout(promise, timeoutMs, message) {
      return new Promise((resolve, reject) => {
        const timeoutId = setTimeout(() => {
          console.error("operation timeout", { timeoutMs, reason: message });
          reject(new Error(message));
        }, timeoutMs);
        promise.then(
          value => {
            clearTimeout(timeoutId);
            resolve(value);
          },
          error => {
            clearTimeout(timeoutId);
            reject(error);
          }
        );
      });
    }

    function rotateCanvas(sourceCanvas, angle) {
      const normalizedAngle = ((angle % 360) + 360) % 360;
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d", { willReadFrequently: true });
      const swapSize = normalizedAngle === 90 || normalizedAngle === 270;
      canvas.width = swapSize ? sourceCanvas.height : sourceCanvas.width;
      canvas.height = swapSize ? sourceCanvas.width : sourceCanvas.height;
      context.translate(canvas.width / 2, canvas.height / 2);
      context.rotate(normalizedAngle * Math.PI / 180);
      context.drawImage(sourceCanvas, -sourceCanvas.width / 2, -sourceCanvas.height / 2);
      return canvas;
    }

    function createOcrPreprocessCanvases(sourceCanvas) {
      const resizedCanvas = resizeCanvasToMaxWidth(sourceCanvas, maxImageOcrDimension);
      const baseCanvas = trimCanvasMargins(resizedCanvas);
      const normalizedCanvas = normalizeCanvasForOcr(baseCanvas);
      const variants = [
        { label: "軽量JPEG", canvas: baseCanvas },
        { label: "軽量JPEG+濃淡補正", canvas: normalizedCanvas }
      ];
      return variants.filter(variant => variant.canvas.width > 0 && variant.canvas.height > 0).slice(0, maxOcrCandidatePatterns);
    }

    function normalizeCanvasForOcr(sourceCanvas) {
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, sourceCanvas.width);
      canvas.height = Math.max(1, sourceCanvas.height);
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(sourceCanvas, 0, 0);
      const image = context.getImageData(0, 0, canvas.width, canvas.height);
      let minimum = 255;
      let maximum = 0;

      for (let index = 0; index < image.data.length; index += 4) {
        const gray = Math.round(image.data[index] * 0.299 + image.data[index + 1] * 0.587 + image.data[index + 2] * 0.114);
        minimum = Math.min(minimum, gray);
        maximum = Math.max(maximum, gray);
      }

      const range = Math.max(1, maximum - minimum);
      const shouldInvert = estimateDarkPixelRatio(image.data) > 0.62;
      for (let index = 0; index < image.data.length; index += 4) {
        const gray = Math.round(image.data[index] * 0.299 + image.data[index + 1] * 0.587 + image.data[index + 2] * 0.114);
        let normalized = Math.max(0, Math.min(255, ((gray - minimum) / range) * 255));
        normalized = Math.max(0, Math.min(255, (normalized - 128) * 1.25 + 128));
        if (normalized > 238) normalized = 255;
        if (normalized < 18) normalized = 0;
        if (shouldInvert) normalized = 255 - normalized;
        image.data[index] = normalized;
        image.data[index + 1] = normalized;
        image.data[index + 2] = normalized;
        image.data[index + 3] = 255;
      }

      context.putImageData(image, 0, 0);
      return canvas;
    }

    function estimateDarkPixelRatio(data) {
      let dark = 0;
      const total = Math.max(1, data.length / 4);
      for (let index = 0; index < data.length; index += 4) {
        const gray = Math.round(data[index] * 0.299 + data[index + 1] * 0.587 + data[index + 2] * 0.114);
        if (gray < 128) dark += 1;
      }
      return dark / total;
    }

    function sharpenCanvas(sourceCanvas) {
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, sourceCanvas.width);
      canvas.height = Math.max(1, sourceCanvas.height);
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(sourceCanvas, 0, 0);
      const image = context.getImageData(0, 0, canvas.width, canvas.height);
      const output = new ImageData(new Uint8ClampedArray(image.data), image.width, image.height);
      const kernel = [0, -1, 0, -1, 5, -1, 0, -1, 0];

      for (let y = 1; y < image.height - 1; y++) {
        for (let x = 1; x < image.width - 1; x++) {
          let value = 0;
          let kernelIndex = 0;
          for (let ky = -1; ky <= 1; ky++) {
            for (let kx = -1; kx <= 1; kx++) {
              const offset = ((y + ky) * image.width + (x + kx)) * 4;
              value += image.data[offset] * kernel[kernelIndex];
              kernelIndex += 1;
            }
          }
          const outputOffset = (y * image.width + x) * 4;
          const clamped = Math.max(0, Math.min(255, value));
          output.data[outputOffset] = clamped;
          output.data[outputOffset + 1] = clamped;
          output.data[outputOffset + 2] = clamped;
          output.data[outputOffset + 3] = 255;
        }
      }

      context.putImageData(output, 0, 0);
      return canvas;
    }

    function adaptiveThresholdCanvas(sourceCanvas, windowSize, offsetValue) {
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, sourceCanvas.width);
      canvas.height = Math.max(1, sourceCanvas.height);
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(sourceCanvas, 0, 0);
      const image = context.getImageData(0, 0, canvas.width, canvas.height);
      const output = new ImageData(new Uint8ClampedArray(image.data), image.width, image.height);
      const width = image.width;
      const height = image.height;
      const radius = Math.max(1, Math.floor(windowSize / 2));
      const integral = new Float64Array((width + 1) * (height + 1));

      for (let y = 1; y <= height; y++) {
        let rowSum = 0;
        for (let x = 1; x <= width; x++) {
          rowSum += image.data[((y - 1) * width + (x - 1)) * 4];
          integral[y * (width + 1) + x] = integral[(y - 1) * (width + 1) + x] + rowSum;
        }
      }

      for (let y = 0; y < height; y++) {
        const yMin = Math.max(0, y - radius);
        const yMax = Math.min(height - 1, y + radius);
        for (let x = 0; x < width; x++) {
          const xMin = Math.max(0, x - radius);
          const xMax = Math.min(width - 1, x + radius);
          const area = (xMax - xMin + 1) * (yMax - yMin + 1);
          const sum = integral[(yMax + 1) * (width + 1) + (xMax + 1)]
            - integral[yMin * (width + 1) + (xMax + 1)]
            - integral[(yMax + 1) * (width + 1) + xMin]
            + integral[yMin * (width + 1) + xMin];
          const pixelOffset = (y * width + x) * 4;
          const localMean = sum / Math.max(1, area);
          const value = image.data[pixelOffset] < localMean - offsetValue ? 0 : 255;
          output.data[pixelOffset] = value;
          output.data[pixelOffset + 1] = value;
          output.data[pixelOffset + 2] = value;
          output.data[pixelOffset + 3] = 255;
        }
      }

      context.putImageData(output, 0, 0);
      return canvas;
    }



    function resizeCanvasToMaxWidth(sourceCanvas, maxWidth) {
      if (sourceCanvas.width <= maxWidth) return sourceCanvas;
      const scale = maxWidth / sourceCanvas.width;
      const canvas = document.createElement("canvas");
      canvas.width = maxWidth;
      canvas.height = Math.max(1, Math.round(sourceCanvas.height * scale));
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = "high";
      context.drawImage(sourceCanvas, 0, 0, canvas.width, canvas.height);
      console.info("ocr canvas resized", { originalWidth: sourceCanvas.width, originalHeight: sourceCanvas.height, width: canvas.width, height: canvas.height });
      return canvas;
    }

    function canvasToContrastedImageData(sourceCanvas, contrast) {
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, sourceCanvas.width);
      canvas.height = Math.max(1, sourceCanvas.height);
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(sourceCanvas, 0, 0);
      const image = context.getImageData(0, 0, canvas.width, canvas.height);

      for (let index = 0; index < image.data.length; index += 4) {
        const red = image.data[index];
        const green = image.data[index + 1];
        const blue = image.data[index + 2];
        const gray = red * 0.299 + green * 0.587 + blue * 0.114;
        const contrasted = Math.max(0, Math.min(255, (gray - 128) * contrast + 128));
        image.data[index] = contrasted;
        image.data[index + 1] = contrasted;
        image.data[index + 2] = contrasted;
        image.data[index + 3] = 255;
      }
      return image;
    }

    function imageDataToBinaryCanvas(image, threshold) {
      const canvas = document.createElement("canvas");
      canvas.width = image.width;
      canvas.height = image.height;
      const context = canvas.getContext("2d", { willReadFrequently: true });
      const binaryImage = new ImageData(new Uint8ClampedArray(image.data), image.width, image.height);

      for (let index = 0; index < binaryImage.data.length; index += 4) {
        const value = binaryImage.data[index] < threshold ? 0 : 255;
        binaryImage.data[index] = value;
        binaryImage.data[index + 1] = value;
        binaryImage.data[index + 2] = value;
        binaryImage.data[index + 3] = 255;
      }
      context.putImageData(binaryImage, 0, 0);
      return canvas;
    }

    function calculateOtsuThreshold(data) {
      const histogram = new Array(256).fill(0);
      const total = data.length / 4;
      for (let index = 0; index < data.length; index += 4) {
        const gray = Math.round(data[index] * 0.299 + data[index + 1] * 0.587 + data[index + 2] * 0.114);
        histogram[gray] += 1;
      }

      let sum = 0;
      for (let index = 0; index < 256; index++) sum += index * histogram[index];

      let sumBackground = 0;
      let weightBackground = 0;
      let maximumVariance = 0;
      let threshold = 180;

      for (let index = 0; index < 256; index++) {
        weightBackground += histogram[index];
        if (weightBackground === 0) continue;
        const weightForeground = total - weightBackground;
        if (weightForeground === 0) break;

        sumBackground += index * histogram[index];
        const meanBackground = sumBackground / weightBackground;
        const meanForeground = (sum - sumBackground) / weightForeground;
        const variance = weightBackground * weightForeground * Math.pow(meanBackground - meanForeground, 2);
        if (variance > maximumVariance) {
          maximumVariance = variance;
          threshold = index;
        }
      }

      return Math.max(120, Math.min(220, threshold));
    }

    function trimCanvasMargins(sourceCanvas) {
      const context = sourceCanvas.getContext("2d", { willReadFrequently: true });
      const image = context.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
      const margin = 8;
      let top = sourceCanvas.height;
      let right = 0;
      let bottom = 0;
      let left = sourceCanvas.width;

      for (let y = 0; y < sourceCanvas.height; y++) {
        for (let x = 0; x < sourceCanvas.width; x++) {
          const offset = (y * sourceCanvas.width + x) * 4;
          if (image.data[offset] < 245) {
            if (x < left) left = x;
            if (x > right) right = x;
            if (y < top) top = y;
            if (y > bottom) bottom = y;
          }
        }
      }

      if (left > right || top > bottom) return sourceCanvas;

      left = Math.max(0, left - margin);
      top = Math.max(0, top - margin);
      right = Math.min(sourceCanvas.width - 1, right + margin);
      bottom = Math.min(sourceCanvas.height - 1, bottom + margin);

      const width = Math.max(1, right - left + 1);
      const height = Math.max(1, bottom - top + 1);
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      canvas.getContext("2d", { willReadFrequently: true }).drawImage(sourceCanvas, left, top, width, height, 0, 0, width, height);
      return canvas;
    }

    function scaleCanvas(sourceCanvas, scale) {
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(sourceCanvas.width * scale));
      canvas.height = Math.max(1, Math.round(sourceCanvas.height * scale));
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.imageSmoothingEnabled = false;
      context.drawImage(sourceCanvas, 0, 0, canvas.width, canvas.height);
      return canvas;
    }

    function extractTextFromWorkbook(content, fileName) {
      if (!isSheetJsReady()) {
        throw new Error("Excel/CSV読み込みライブラリを読み込めませんでした。");
      }

      pdfStatus.textContent = "Excel/CSVから内容を読み込み中です。";
      const isCsv = String(fileName || "").toLowerCase().endsWith(".csv");
      const workbook = isCsv
        ? XLSX.read(decodeTextBuffer(content), { type: "string", raw: false, dense: false, WTF: false })
        : XLSX.read(content, { type: "array", raw: false, cellDates: false, dense: false, WTF: false });
      return workbook.SheetNames.map(sheetName => {
        const sheet = workbook.Sheets[sheetName];
        const rowsInSheet = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: "" });
        const lines = rowsInSheet
          .map(row => row.map(cell => String(cell ?? "").trim()).filter(Boolean).join("\t"))
          .filter(Boolean);
        return "【" + (sheetName || fileName || "シート") + "】\n" + lines.join("\n");
      }).join("\n\n").trim();
    }

    async function extractTextFromWord(content) {
      if (!isMammothReady()) {
        throw new Error("Word読み込みライブラリを読み込めませんでした。");
      }

      pdfStatus.textContent = "Wordからテキストを読み込み中です。";
      const result = await mammoth.extractRawText({ arrayBuffer: content });
      return String(result && result.value ? result.value : "").trim();
    }

    async function readPlainText(file) {
      const buffer = await file.arrayBuffer();
      return decodeTextBuffer(buffer);
    }

    function decodeTextBuffer(buffer) {
      const encodings = ["utf-8", "shift_jis", "euc-jp"];
      for (const encoding of encodings) {
        try {
          const decoded = new TextDecoder(encoding, { fatal: false }).decode(buffer);
          if (decoded && !isMostlyBrokenText(decoded)) return decoded.trim();
        } catch (error) {
          console.warn("text decode failed", encoding, error);
        }
      }
      return new TextDecoder("utf-8", { fatal: false }).decode(buffer).trim();
    }

    function isMostlyBrokenText(value) {
      const text = String(value || "").replace(/\s/g, "");
      if (!text) return false;
      const broken = countMatches(text, /�/g);
      return broken > 0 && broken / text.length > 0.02;
    }

    function getPageTextLines(items) {
      const lineMap = new Map();
      items.forEach(item => {
        const text = String(item.str || "").trim();
        if (!text) return;
        const y = item.transform && Number.isFinite(item.transform[5]) ? Math.round(item.transform[5]) : 0;
        const x = item.transform && Number.isFinite(item.transform[4]) ? item.transform[4] : 0;
        if (!lineMap.has(y)) lineMap.set(y, []);
        lineMap.get(y).push({ x, text });
      });
      return Array.from(lineMap.entries())
        .sort((a, b) => b[0] - a[0])
        .map(([, lineItems]) => lineItems.sort((a, b) => a.x - b.x).map(item => item.text).join(" ").replace(/\s+/g, " ").trim())
        .filter(Boolean)
        .join("\n");
    }

    function updateImportProgress(percent, message) {
      const safePercent = Math.max(0, Math.min(100, Number(percent) || 0));
      importProgress.classList.add("is-active");
      importProgressBar.style.width = safePercent + "%";
      importProgressPercent.textContent = safePercent + "%";
      if (message) pdfStatus.textContent = message;
    }

    function markFileImportFailed(message, options = {}) {
      updateImportProgress(100, "読み込み失敗");
      if (!options.keepText) pdfText.value = "【読み取り失敗】" + message;
      rows = [];
      logOcrStep("失敗理由", message);
      notice.textContent = message;
      pdfStatus.textContent = message;
      renderManualTable();
      renderOrderPreview();
      updateExcelButtonState();
    }

    function logOcrStep(label, value) {
      const message = "[" + new Date().toLocaleString("ja-JP") + "] " + label + "\n" + String(value || "").trim();
      ocrLog.value = ocrLog.value ? ocrLog.value + "\n\n" + message : message;
      ocrLog.scrollTop = ocrLog.scrollHeight;
      console.info("ocr log", { label, value });
    }

    function buildOrderFromMenuCsv() {
      const text = menuCsvText.value || "";
      const result = parseMenuCsv(text);
      rows = result.rows;
      ensureEditableRows();
      renderManualTable();
      renderOrderPreview();
      updateOrderTsv();
      csvStatus.textContent = result.rows.length
        ? "発注書を作りました（" + result.rows.length + "件）。" + (result.skipped ? " 除外/要確認: " + result.skipped + "行。" : "")
        : "発注書にできる食材がありませんでした。CSVの見出しと3歳未満児の分量を確認してください。";
      notice.textContent = result.rows.length ? "献立CSVから発注書データを作成しました。" : "献立CSVから抽出できませんでした。";
    }

    async function copyOrderTsv() {
      updateOrderTsv();
      if (!orderTsv.value) {
        csvStatus.textContent = "コピーする内容がありません。先に発注書を作ってください。";
        return;
      }
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(orderTsv.value);
        } else {
          orderTsv.select();
          document.execCommand("copy");
        }
        csvStatus.textContent = "Excel貼り付け用テキストをコピーしました。";
      } catch (error) {
        orderTsv.select();
        csvStatus.textContent = "コピーできませんでした。テキスト欄を選択してコピーしてください。";
      }
    }

    function updateOrderTsv() {
      orderTsv.value = buildTsv(buildExportDocument(getExportRows()));
    }

    function buildTsv(documentRows) {
      return documentRows.map(row => row.map(cell => String(cell ?? "").replace(/\r?\n/g, " ")).join("\t")).join("\n");
    }

    function parseMenuCsv(text) {
      const lines = String(text || "").split(/\r?\n/).filter(line => line.trim());
      if (!lines.length || isMostlyBrokenText(text)) return { rows: [], skipped: lines.length };
      const table = parseDelimitedRows(lines);
      const headerIndex = findMenuHeaderIndex(table);
      const columns = headerIndex >= 0 ? detectMenuColumns(table[headerIndex]) : null;
      let skipped = 0;
      let sourceRows = [];

      let currentWeekday = "";
      if (columns && columns.name >= 0 && columns.quantity >= 0) {
        for (let index = headerIndex + 1; index < table.length; index++) {
          const row = table[index];
          const lineText = row.join(" ");
          if (!lineText.trim()) continue;
          if (isGarbledText(lineText) || isSentenceNoise(lineText)) { skipped++; continue; }
          const detectedWeekday = detectWeekday(row[columns.day] || lineText);
          if (detectedWeekday) currentWeekday = detectedWeekday;
          const name = cleanIngredientName(row[columns.name]);
          const quantity = normalizeQuantity(row[columns.quantity]);
          const unit = normalizeUnit(row[columns.unit] || guessUnitNearQuantity(row, columns.quantity));
          const weekday = detectedWeekday || currentWeekday;
          if (addMenuSourceRow(sourceRows, name, quantity, unit, weekday)) continue;
          skipped++;
        }
      } else {
        sourceRows = extractUnderThreeSourceRows(text);
        skipped = sourceRows.length ? 0 : lines.length;
      }

      return { rows: mapMenuRowsToOrderRows(sourceRows), skipped };
    }

    function parseDelimitedRows(lines) {
      const delimiter = detectDelimiter(lines);
      return lines.map(line => parseDelimitedLine(line, delimiter).map(cell => cell.replace(/^=+/, "").trim()));
    }

    function detectDelimiter(lines) {
      const sample = lines.slice(0, 10).join("\n");
      const counts = [{ mark: "\t", count: countMatches(sample, /\t/g) }, { mark: ",", count: countMatches(sample, /,/g) }, { mark: "，", count: countMatches(sample, /，/g) }, { mark: ";", count: countMatches(sample, /;/g) }];
      counts.sort((a, b) => b.count - a.count);
      return counts[0].count ? counts[0].mark : ",";
    }

    function parseDelimitedLine(line, delimiter) {
      const cells = [];
      let current = "";
      let quoted = false;
      for (let index = 0; index < line.length; index++) {
        const char = line[index];
        const next = line[index + 1];
        if (char === '"') {
          if (quoted && next === '"') { current += '"'; index++; }
          else quoted = !quoted;
        } else if (char === delimiter && !quoted) {
          cells.push(current);
          current = "";
        } else {
          current += char;
        }
      }
      cells.push(current);
      return cells;
    }

    function findMenuHeaderIndex(table) {
      for (let index = 0; index < Math.min(table.length, 20); index++) {
        if (table[index].length < 2) continue;
        const columns = detectMenuColumns(table[index]);
        if (columns.name >= 0 && columns.quantity >= 0) return index;
      }
      return -1;
    }

    function detectMenuColumns(header) {
      const normalized = header.map(cell => String(cell || "").replace(/\s/g, ""));
      let day = normalized.findIndex(cell => /曜日|使用日|日付|献立日/.test(cell));
      let name = normalized.findIndex(cell => /食材|食品|材料|品名|食料|料理名/.test(cell));
      if (name < 0) name = 0;
      let quantity = normalized.findIndex(cell => /(3歳未満|３歳未満|未満児|乳児|未満).*?(分量|使用量|数量|量|g|ｇ|グラム)/.test(cell));
      if (quantity < 0) quantity = normalized.findIndex(cell => /(分量|使用量|数量|量).*(3歳未満|３歳未満|未満児|乳児|未満)/.test(cell));
      if (quantity < 0) quantity = normalized.findIndex(cell => /(3歳未満|３歳未満|未満児|乳児)/.test(cell) && !/人数|対象|区分|年齢/.test(cell));
      let unit = normalized.findIndex((cell, index) => index > name && /単位/.test(cell));
      if (unit < 0 && quantity >= 0 && /単位/.test(normalized[quantity + 1] || "")) unit = quantity + 1;
      if (unit < 0 && quantity >= 0 && isKnownUnit(header[quantity + 1])) unit = quantity + 1;
      return { day, name, quantity, unit };
    }

    function guessUnitNearQuantity(row, quantityIndex) {
      const candidates = [row[quantityIndex + 1], row[quantityIndex - 1], row[row.length - 1]];
      return candidates.find(value => isKnownUnit(value)) || "g";
    }

    function addMenuSourceRow(target, name, quantity, unit, weekday) {
      const cleanName = cleanIngredientName(name);
      const cleanUnit = normalizeUnit(unit || "g");
      const numericQuantity = numberValue(quantity);
      if (!cleanName || !numericQuantity || !cleanUnit || !peopleForWeekday(weekday) || isSuspiciousIngredientName(cleanName) || isExcludedIngredient(cleanName)) return false;
      target.push({ name: cleanName, quantity: round(numericQuantity), unit: cleanUnit, weekday, source: "献立CSV" });
      return true;
    }

    function isExcludedIngredient(name) {
      return excludedIngredientPattern.test(String(name || "").replace(/\s/g, ""));
    }

    function mapMenuRowsToOrderRows(sourceRows, sourceLabel = "献立CSV") {
      const fixedKeys = new Set();
      const aggregate = new Map();

      sourceRows.forEach(row => {
        if (isExcludedIngredient(row.name)) return;
        const people = peopleForWeekday(row.weekday);
        if (!people) return;
        const fixed = findFixedRule(row.name);
        if (fixed && (fixed.key === "milk" || fixed.key === "yogurt")) {
          fixedKeys.add(fixed.key);
          return;
        }
        const converted = convertMenuQuantity(row.quantity, row.unit);
        const weightedQuantity = converted.quantity * people;
        if (!weightedQuantity || weightedQuantity <= 0) return;

        const rounding = findRoundingRule(row.name);
        if (rounding) {
          const purchaseQuantity = convertToPurchaseUnit(weightedQuantity, converted.unit, rounding);
          addAggregateQuantity(aggregate, rounding.label, purchaseQuantity, rounding.unit, rounding.step);
          return;
        }

        addAggregateQuantity(aggregate, normalizeIngredientForGrouping(row.name), weightedQuantity, converted.unit);
      });

      const fixedRows = fixedOrderRules.filter(rule => fixedKeys.has(rule.key)).map(rule => ({
        name: rule.label,
        quantity: rule.quantity,
        unit: rule.unit,
        note: rule.note,
        source: sourceLabel
      }));
      const aggregatedRows = Array.from(aggregate.values()).map(row => finalizeMenuQuantity(row, sourceLabel)).filter(row => row.name && row.quantity);
      return fixedRows.concat(aggregatedRows).sort((a, b) => String(a.name).localeCompare(String(b.name), "ja"));
    }

    function addAggregateQuantity(aggregate, name, quantity, unit, step = null) {
      const key = name + "|" + unit;
      if (!aggregate.has(key)) aggregate.set(key, { name, quantity: 0, unit, step });
      const row = aggregate.get(key);
      row.quantity += quantity;
      if (step) row.step = step;
    }

    function findFixedRule(name) {
      return fixedOrderRules.find(rule => rule.tests.some(pattern => pattern.test(name)));
    }

    function findRoundingRule(name) {
      return roundingOrderRules.find(rule => rule.tests.some(pattern => pattern.test(name)));
    }

    function convertToPurchaseUnit(quantity, unit, rule) {
      if (unit === rule.unit) return quantity;
      const base = rule.base && rule.base[unit];
      if (base && base > 0) return quantity / base;
      return quantity;
    }

    function peopleForWeekday(weekday) {
      return weekdayPeople[weekday] || 0;
    }

    function detectWeekday(value) {
      const text = normalizeOcrLine(value);
      const match = text.match(/月曜日|火曜日|水曜日|木曜日|金曜日|[月火水木金](?:曜)?/);
      return match ? match[0].charAt(0) : "";
    }

    function normalizeIngredientForGrouping(name) {
      return cleanIngredientName(name)
        .replace(/[（(].*?[）)]/g, "")
        .replace(/^(冷凍|国産|生|カット|千切り|皮むき)/, "")
        .trim();
    }

    function convertMenuQuantity(quantity, unit) {
      const amount = numberValue(quantity);
      const normalizedUnit = normalizeUnit(unit || "g");
      if (normalizedUnit === "kg") return { quantity: amount * 1000, unit: "g" };
      if (normalizedUnit === "L" || normalizedUnit === "l" || normalizedUnit === "リットル") return { quantity: amount * 1000, unit: "ml" };
      if (normalizedUnit === "グラム") return { quantity: amount, unit: "g" };
      if (normalizedUnit === "cc") return { quantity: amount, unit: "ml" };
      return { quantity: amount, unit: normalizedUnit };
    }

    function finalizeMenuQuantity(row, sourceLabel) {
      let quantity = round(row.quantity);
      let unit = row.unit;
      let note = sourceLabel === "OCR" ? "3歳未満児×人数集計" : "3歳未満児×人数集計";
      if (row.step) {
        quantity = round(Math.ceil(quantity / row.step) * row.step);
        note = "端数切り上げ";
      } else if (unit === "缶") {
        quantity = Math.ceil(quantity);
        note = "缶単位切り上げ";
      }
      if (unit === "g" && quantity >= 1000) { quantity = round(quantity / 1000); unit = "kg"; }
      if (unit === "ml" && quantity >= 1000) { quantity = round(quantity / 1000); unit = "L"; }
      if (!quantity || quantity <= 0) return { name: "", quantity: "", unit: "", note: "", source: "" };
      return { name: row.name, quantity, unit, note, source: sourceLabel };
    }

    function createBlankRow() {
      return { name: "", quantity: "", unit: "" };
    }

    function parseIngredients(text) {
      const sourceRows = extractUnderThreeSourceRows(text);
      return mapMenuRowsToOrderRows(sourceRows, "OCR");
    }

    function applyParsedRows(parsedRows, options = {}) {
      const append = options.append !== false;
      const statusPrefix = options.statusPrefix || "読み込み完了";
      const importedRows = (Array.isArray(parsedRows) ? parsedRows : []).filter(isValidOrderRow);
      const currentRows = rows.filter(row => String(row.name || "").trim() || String(row.quantity || "").trim() || String(row.unit || "").trim());
      rows = append ? currentRows.concat(importedRows) : importedRows;

      notice.textContent = importedRows.length
        ? "抽出できた行だけを発注書データに反映しました。"
        : "読み取り失敗：材料名・数量・単位を抽出できませんでした。Excelは作成しません。";
      pdfStatus.textContent = importedRows.length
        ? statusPrefix + "。抽出結果を表示しました（" + importedRows.length + "件）。"
        : statusPrefix + "。抽出0件です。読み取り失敗です。";
      if (!importedRows.length) logOcrStep("失敗理由", "材料名・数量・単位を抽出できませんでした。");
      renderManualTable();
      renderOrderPreview();
      updateExcelButtonState();
    }

    function ensureEditableRows() {
      updateExcelButtonState();
    }

    function isValidOrderRow(row) {
      const name = String(row && row.name ? row.name : "").trim();
      const quantity = String(row && row.quantity !== undefined ? row.quantity : "").trim();
      const unit = String(row && row.unit ? row.unit : "").trim();
      if (!name || !quantity || !unit || isExcludedIngredient(name) || isSuspiciousIngredientName(name)) return false;
      if (/^0+(?:[.,．]0+)?$/.test(quantity)) return false;
      return /^([0-9０-９]+(?:[.,．][0-9０-９]+)?|[0-9０-９]+\/[0-9０-９]+)$/.test(quantity);
    }

    function extractRowsFromPdfText(text) {
      return extractUnderThreeSourceRows(text);
    }

    function extractUnderThreeSourceRows(text) {
      const lines = splitOcrRowsForIngredients(text);
      const extracted = [];
      const seen = new Set();
      collectUnderThreeRows(lines).forEach(row => addUniqueSourceRow(extracted, seen, row));
      return extracted;
    }

    function splitOcrRowsForIngredients(text) {
      return String(text || "")
        .replace(/OCR全文/g, "\n")
        .replace(/【[^】]+】/g, "\n")
        .replace(/[|｜]/g, "\n")
        .split(/\r?\n|(?<=\d)\s{2,}|\s{2,}(?=[月火水木金]?[ぁ-んァ-ヶ一-龠々])/i)
        .map(line => normalizeOcrLine(line))
        .filter(Boolean);
    }

    function parseMarkerNumericRow(line, preferredNumericIndex = -1, preferredNumericValue = "") {
      const normalized = normalizeOcrLine(line).replace(/^[0-9０-９]+[.)）．、\s]+/, "");
      if (!normalized || isIgnoredPdfLine(normalized) || isSentenceNoise(normalized)) return null;
      const unitPattern = unitNames().map(unit => escapeRegExp(unit)).join("|");
      const tokenPattern = new RegExp("([0-9０-９]+(?:[.,．][0-9０-９]+)?)(?:\\s*(" + unitPattern + "))?", "gi");
      const matches = Array.from(normalized.matchAll(tokenPattern));
      if (matches.length < 2) return null;
      const firstIndex = matches[0].index || 0;
      const name = cleanIngredientName(normalized.slice(0, firstIndex));
      if (!name) return null;
      let rowUnit = "";
      const numericValues = [];
      matches.forEach((match, position) => {
        const value = normalizeQuantity(match[1]);
        const unit = normalizeUnit(match[2] || "");
        if (unit && !rowUnit) rowUnit = unit;
        const numeric = numberValue(value);
        if (numeric > 0) numericValues.push({ position, value, unit: unit || rowUnit || "g" });
      });
      if (!numericValues.length) return null;
      const preferredValue = preferredNumericValue ? normalizeQuantity(preferredNumericValue) : "";
      if (preferredValue) {
        const preferred = numericValues.find(item => item.value === preferredValue);
        if (preferred) return { name, quantity: preferred.value, unit: preferred.unit || rowUnit || "g" };
      }
      if (preferredNumericIndex >= 0) {
        const firstNumberEnd = (matches[0].index || 0) + matches[0][0].length;
        const beforeFirstNumber = normalized.slice(0, firstNumberEnd);
        const numericPosition = /(?:kg|㎏|キロ|g|グラム|ml|cc|L|リットル|個|本|袋|パック|玉|束|枚|缶|箱|尾|切|片|丁|株|房|杯|膳|食|人前)$/i.test(beforeFirstNumber) ? preferredNumericIndex - 1 : preferredNumericIndex;
        const preferred = numericValues.find(item => item.position === numericPosition);
        if (preferred) return { name, quantity: preferred.value, unit: preferred.unit || rowUnit || "g" };
      }
      for (const item of numericValues) {
        const previous = matches[item.position - 1];
        const previousHasUnit = previous && Boolean(previous[2]);
        const previousIsZero = previous && numberValue(normalizeQuantity(previous[1])) === 0;
        if (previousHasUnit && previousIsZero) return { name, quantity: item.value, unit: item.unit || rowUnit || "g" };
        if (!matches[item.position][2]) return { name, quantity: item.value, unit: item.unit || rowUnit || "g" };
      }
      const first = numericValues[0];
      return { name, quantity: first.value, unit: first.unit || rowUnit || "g" };
    }

    function addUniqueSourceRow(target, seen, row) {
      const cleanName = cleanIngredientName(row.name);
      const cleanUnit = normalizeUnit(row.unit || "g");
      const quantity = normalizeQuantity(row.quantity);
      const numericQuantity = numberValue(quantity);
      const weekday = row.weekday || detectWeekday(row.sourceLine || "");
      if (!cleanName || !cleanUnit || !numericQuantity || numericQuantity <= 0 || !peopleForWeekday(weekday) || isExcludedIngredient(cleanName) || isSuspiciousIngredientName(cleanName)) return;
      const key = [weekday, normalizeIngredientForGrouping(cleanName), quantity, cleanUnit].join("|");
      if (seen.has(key)) return;
      seen.add(key);
      target.push({ name: cleanName, quantity: round(numericQuantity), unit: cleanUnit, weekday, source: row.source || "3歳未満児" });
    }

    function collectUnderThreeRows(lines) {
      const rows = [];
      const table = lines.map(line => line.split(/\t|,|，/).map(cell => cell.trim()).filter(Boolean));
      const headerIndex = findMenuHeaderIndex(table);
      const columns = headerIndex >= 0 ? detectMenuColumns(table[headerIndex]) : null;
      let currentWeekday = "";
      if (columns && columns.name >= 0 && columns.quantity >= 0) {
        for (let index = headerIndex + 1; index < table.length; index++) {
          const cells = table[index];
          const rowText = cells.join(" ");
          if (!cells.length || isIgnoredPdfLine(rowText) || isSentenceNoise(rowText)) continue;
          const detectedWeekday = detectWeekday(cells[columns.day] || rowText);
          if (detectedWeekday) currentWeekday = detectedWeekday;
          const markerRow = parseMarkerNumericRow(cells.join("\t"), columns.quantity, cells[columns.quantity] || "");
          rows.push({
            name: cells[columns.name] || (markerRow && markerRow.name) || "",
            quantity: markerRow ? markerRow.quantity : cells[columns.quantity],
            unit: markerRow ? markerRow.unit : cells[columns.unit] || guessUnitNearQuantity(cells, columns.quantity),
            weekday: detectedWeekday || currentWeekday,
            sourceLine: cells.join(" "),
            source: "3歳未満児"
          });
        }
      }

      const markerPattern = /(3歳未満児?|３歳未満児?|未満児|乳児)/;
      const unitPattern = unitNames().map(unit => escapeRegExp(unit)).join("|");
      const inlinePattern = new RegExp("^(.{1,80}?)" + markerPattern.source + ".*?([0-9０-９]+(?:[.,．][0-9０-９]+)?)\\s*(" + unitPattern + ")", "i");
      lines.forEach(line => {
        const normalized = normalizeOcrLine(line);
        const detectedWeekday = detectWeekday(normalized);
        if (detectedWeekday) currentWeekday = detectedWeekday;
        const markerRow = parseMarkerNumericRow(normalized);
        if (markerRow) {
          rows.push({
            ...markerRow,
            weekday: detectedWeekday || currentWeekday,
            sourceLine: normalized,
            source: "3歳未満児"
          });
          return;
        }
        const match = normalized.match(inlinePattern);
        if (match) rows.push({
          name: stripNonIngredientPrefix(match[1]),
          quantity: match[2],
          unit: match[3],
          weekday: detectedWeekday || currentWeekday,
          sourceLine: normalized,
          source: "3歳未満児"
        });
      });
      return rows;
    }

    function extractRowsFromLine(line) {
      const escapedUnits = unitNames().map(unit => unit.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|");
      const results = [];
      const normalizedLine = normalizeOcrLine(line).replace(/,/g, " ").replace(/\t/g, " ").replace(/\s+/g, " ").trim();
      if (!normalizedLine || isGarbledText(normalizedLine) || isIgnoredPdfLine(normalizedLine) || isSentenceNoise(normalizedLine)) return results;
      const quantityText = "([0-9０-９]+(?:[.,．][0-9０-９]+)?)";
      const nameFirstPattern = new RegExp("^(.+?)\\s+" + quantityText + "\\s*(" + escapedUnits + ")(?:\\s|$)", "i");
      const joinedNameFirstPattern = new RegExp("^(.{1,40}?)" + quantityText + "\\s*(" + escapedUnits + ")(?:\\s|$)", "i");
      const quantityFirstPattern = new RegExp("^" + quantityText + "\\s*(" + escapedUnits + ")\\s+(.+)$", "i");
      const inlinePattern = new RegExp("([ぁ-んァ-ヶ一-龠々A-Za-zーｰ－・/／()（）\\s]{1,32}?)\\s*" + quantityText + "\\s*(" + escapedUnits + ")", "gi");
      const nameFirstMatch = normalizedLine.match(nameFirstPattern) || normalizedLine.match(joinedNameFirstPattern);
      const quantityFirstMatch = normalizedLine.match(quantityFirstPattern);

      if (nameFirstMatch) {
        addExtractedRow(results, nameFirstMatch[1], nameFirstMatch[2], nameFirstMatch[3], line);
      } else if (quantityFirstMatch) {
        addExtractedRow(results, quantityFirstMatch[3], quantityFirstMatch[1], quantityFirstMatch[2], line);
      }

      for (const match of normalizedLine.matchAll(inlinePattern)) {
        addExtractedRow(results, match[1], match[2], match[3], line);
      }

      const cells = String(line || "").split(/\t|,|，/).map(cell => cell.trim()).filter(Boolean);
      if (cells.length >= 3) {
        for (let index = 0; index < cells.length - 2; index++) {
          const name = cells[index];
          const quantity = cells[index + 1];
          const unit = cells[index + 2];
          if (isQuantity(quantity) && isKnownUnit(unit)) addExtractedRow(results, name, quantity, unit, line);
        }
      }

      return results;
    }

    function addExtractedRow(target, nameValue, quantityValue, unitValue, sourceLine = "") {
      const name = cleanIngredientName(nameValue);
      const quantity = normalizeQuantity(quantityValue);
      const unit = normalizeUnit(unitValue);
      if (!name || !quantity || !unit || isIgnoredPdfLine(name) || isSuspiciousIngredientName(name) || isExcludedIngredient(name)) return;
      if (!isLikelyIngredientRow({ name, quantity, unit }, sourceLine)) return;
      target.push({ name, quantity, unit, source: "OCR" });
    }

    function unitNames() {
      return ["kg", "ｋｇ", "KG", "㎏", "キロ", "g", "ｇ", "G", "グラム", "ｍｌ", "ml", "ML", "cc", "L", "l", "リットル", "個", "本", "袋", "パック", "玉", "束", "枚", "缶", "箱", "尾", "切", "片", "丁", "株", "房", "杯", "膳", "食", "人前"];
    }

    function isQuantity(value) {
      return /^[0-9０-９]+(?:[.,．][0-9０-９]+)?$/.test(String(value || "").trim());
    }

    function isKnownUnit(value) {
      const normalized = normalizeUnit(value).toLowerCase();
      return unitNames().map(unit => normalizeUnit(unit).toLowerCase()).includes(normalized);
    }

    function isIgnoredPdfLine(line) {
      return /OCR全文|発注書|納品書|納品日|使用日|検品者|合計|金額|単価|摘要|チェック|ページ|スクルドエンジェル|たかばり|請求|消費税|小計|担当|取引先|電話|FAX|〒|住所/.test(line);
    }

    function isSentenceNoise(line) {
      return recipeInstructionPattern.test(String(line || "")) || /を塗って|してください|しましょう|します|しました|です|ます|もう|食べる|食べます/.test(String(line || ""));
    }

    function isLikelyIngredientRow(row, sourceLine = "") {
      const name = String(row && row.name ? row.name : "").trim();
      const line = String(sourceLine || name).trim();
      const compactName = name.replace(/\s/g, "");
      const japaneseCount = countJapaneseCharacters(compactName);
      const hasFoodLikeChars = /[ぁ-んァ-ヶ一-龠々]/.test(compactName);
      const hasQuantityAndUnit = isQuantity(row.quantity) && isKnownUnit(row.unit);
      const tooLong = compactName.length > 32 || line.length > 80;
      const looksLikeSentence = /です|ます|ください|お願い|備考|注意|以下|以上|合計|小計|税込|税抜|を塗って|しましょう|食べる|入れる|加える|混ぜる|焼く|煮る|炒める/.test(line);
      const hasTooManyDigits = countMatches(compactName, /[0-9０-９]/g) > Math.max(1, japaneseCount);
      return hasQuantityAndUnit && hasFoodLikeChars && japaneseCount >= 1 && !tooLong && !looksLikeSentence && !hasTooManyDigits && !isGarbledText(line);
    }

    function scoreOcrText(result) {
      const text = String(result.text || "").trim();
      const japaneseCount = countJapaneseCharacters(text);
      const digitCount = countMatches(text, /[0-9０-９]/g);
      const unitCount = countUnitMentions(text);
      const materialRowCount = parseIngredients(text).length;
      const garbled = isGarbledText(text);
      const confidence = Number(result.confidence) || 0;
      const score = garbled ? -100000 : (japaneseCount * 3) + (digitCount * 2) + (unitCount * 8) + (materialRowCount * 45) + confidence;
      return { ...result, text, japaneseCount, digitCount, unitCount, materialRowCount, garbled, score };
    }

    function countUnitMentions(value) {
      const escapedUnits = unitNames().map(unit => unit.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|");
      return countMatches(value, new RegExp("(" + escapedUnits + ")", "gi"));
    }

    function isGarbledText(value) {
      const text = String(value || "");
      const compact = text.replace(/\s/g, "");
      const length = compact.length;
      if (!length) return true;
      const replacementCount = countMatches(compact, /�/g);
      const boxCount = countMatches(compact, /□/g);
      const japaneseCount = countMatches(compact, /[ぁ-んァ-ヶ一-龠々]/g);
      const symbolCount = countMatches(compact, /[^ぁ-んァ-ヶ一-龠々a-zA-Z0-9０-９ーｰ－.,，.．・/／()（）\[\]【】%％kgＫＧｋｇmlＭＬｍｌccＣＣ]/g);
      const japaneseRatio = japaneseCount / length;
      const boxRatio = boxCount / length;
      const symbolRatio = symbolCount / length;

      const mojibakeCount = countMatches(compact, /[�□■◇◆○●◎�]/g);
      const latinCount = countMatches(compact, /[a-zA-Z]/g);
      const digitCount = countMatches(compact, /[0-9０-９]/g);
      const readableCount = japaneseCount + latinCount + digitCount;
      const readableRatio = readableCount / length;

      return replacementCount > 0 || mojibakeCount >= 8 || boxCount >= 15 || (boxCount >= 5 && boxRatio > 0.08) ||
        (length >= 12 && readableRatio < 0.45) || (length >= 20 && japaneseRatio < 0.03) || (length >= 20 && symbolRatio > 0.22);
    }

    function isSuspiciousIngredientName(value) {
      const name = String(value || "").trim();
      const compact = name.replace(/\s/g, "");
      if (!compact) return true;
      const length = compact.length;
      const japaneseCount = countMatches(compact, /[ぁ-んァ-ヶ一-龠々]/g);
      const symbolCount = countMatches(compact, /[^ぁ-んァ-ヶ一-龠々a-zA-Z0-9０-９ーｰ－・/／()（）]/g);
      const digitCount = countMatches(compact, /[0-9０-９]/g);
      return /�/.test(compact) || countMatches(compact, /[□■◇◆]/g) >= 2 ||
        (length >= 4 && japaneseCount === 0) || (length >= 3 && symbolCount / length > 0.28) ||
        (length >= 3 && digitCount > japaneseCount);
    }

    function escapeRegExp(value) {
      return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function countMatches(value, pattern) {
      const matches = String(value || "").match(pattern);
      return matches ? matches.length : 0;
    }

    function countJapaneseCharacters(value) {
      return countMatches(value, /[ぁ-んァ-ヶ一-龠々]/g);
    }

    function cleanIngredientName(value) {
      return stripNonIngredientPrefix(value)
        .replace(/OCR全文/g, " ")
        .replace(/月曜日|火曜日|水曜日|木曜日|金曜日|[月火水木金](?:曜)?/g, " ")
        .replace(/^[0-9０-９]+[.)）．、\s]+/, "")
        .replace(/^[□■◇◆☑✓・*\-－—\s]+/, "")
        .replace(/[：:].*$/, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function stripNonIngredientPrefix(value) {
      return normalizeOcrLine(value)
        .replace(/OCR全文/g, " ")
        .replace(/月曜日|火曜日|水曜日|木曜日|金曜日|[月火水木金](?:曜)?/g, " ")
        .replace(/(?:3歳以上児?|３歳以上児?|以上児|幼児|職員|合計|総量|使用量|数量|分量)\s*[0-9０-９]+(?:[.,．][0-9０-９]+)?\s*(?:kg|㎏|キロ|g|グラム|ml|cc|L|リットル|個|本|袋|パック|玉|束|枚|缶|箱|尾|切|片|丁|株|房|杯|膳|食|人前)?/gi, " ")
        .replace(/[0-9０-９]+(?:[.,．][0-9０-９]+)?\s*(?:kg|㎏|キロ|g|グラム|ml|cc|L|リットル|個|本|袋|パック|玉|束|枚|缶|箱|尾|切|片|丁|株|房|杯|膳|食|人前)(?=.*(?:3歳未満児?|３歳未満児?|未満児|乳児))/gi, " ")
        .replace(/(?:3歳未満児?|３歳未満児?|未満児|乳児).*$/gi, " ")
        .replace(/^[0-9０-９]+[.)）．、\s]+/, "")
        .replace(/^[□■◇◆☑✓・*\-－—\s]+/, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeOcrLine(value) {
      return String(value || "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/[，、]/g, ",")
        .replace(/[．。]/g, ".")
        .replace(/[㎏]/g, "kg")
        .replace(/[ｋＫ]/g, "k")
        .replace(/[ｇＧ]/g, "g")
        .replace(/[ｍＭ]/g, "m")
        .replace(/[ｌＬ]/g, "l")
        .replace(/([0-9])[ \f\v]*(キロ|ＫＧ|KG)/gi, "$1kg")
        .replace(/([0-9])[ \f\v]*(グラム|Ｇ|G)(?=\s|$)/gi, "$1g")
        .replace(/([0-9])[ \f\v]*(ＭＬ|ML)(?=\s|$)/gi, "$1ml")
        .replace(/[|＿_~〜=]+/g, " ")
        .replace(/[<>《》]+/g, " ")
        .replace(/[ \f\v\r\n]+/g, " ")
        .trim();
    }

    function normalizeQuantity(value) {
      return String(value || "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/．/g, ".")
        .replace(/,/g, "")
        .trim();
    }

    function normalizeUnit(value) {
      const unit = normalizeOcrLine(value);
      const lowerUnit = unit.toLowerCase();
      if (["ｋｇ", "kg", "㎏", "キロ"].includes(lowerUnit)) return "kg";
      if (["ｇ", "g", "グラム"].includes(lowerUnit)) return "g";
      if (["ｍｌ", "ml"].includes(lowerUnit)) return "ml";
      return unit;
    }

    function renderManualTable() {
      if (rows.length === 0) {
        manualRows.innerHTML = '<tr><td colspan="4">読み取り失敗：抽出結果がありません</td></tr>';
      } else {
        manualRows.innerHTML = rows.map(row => {
          return "<tr>" +
            '<td data-label="材料名">' + escapeHtml(row.name) + '</td>' +
            '<td data-label="数量">' + escapeHtml(row.quantity) + '</td>' +
            '<td data-label="単位">' + escapeHtml(row.unit) + '</td>' +
            '<td data-label="抽出元">' + escapeHtml(row.source || "OCR") + '</td>' +
          "</tr>";
        }).join("");
      }
      updateExcelButtonState();
    }

    function updateExcelButtonState() {
      if (excelBtn) excelBtn.disabled = getFilledRows().length === 0;
    }

    function getFilledRows() {
      return rows.filter(row => String(row.name || "").trim() && String(row.quantity || "").trim() && String(row.unit || "").trim());
    }

    function focusLastNameInput() {
      const inputs = manualRows.querySelectorAll('input[data-field="name"]');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }

    function deleteRow(index) {
      syncRows();
      rows.splice(index, 1);
      
      renderManualTable();
      renderOrderPreview();
    }

    function syncRows() {
      const nextRows = rows.map(row => ({ ...row }));
      manualRows.querySelectorAll("input[data-index]").forEach(input => {
        const index = Number(input.dataset.index);
        const field = input.dataset.field;
        if (nextRows[index]) nextRows[index][field] = input.value;
      });
      rows = nextRows;
    }

    function getExportRows() {
      return getFilledRows()
        .map(row => {
          const quantity = exportQuantityValue(row.quantity);
          return [
            "□",
            String(row.name || "").trim(),
            quantity,
            String(row.unit || "").trim(),
            String(row.note || row.source || ""),
            quantity,
            String(row.unit || "").trim(),
            "",
            "",
            ""
          ];
        });
    }

    function exportQuantityValue(value) {
      const text = String(value ?? "").trim();
      if (!text) return "";
      return /^-?[0-9０-９]+(?:[.,．][0-9０-９]+)?$/.test(text) ? numberValue(text) : text;
    }

    function renderOrderPreview() {
      const exportRows = getExportRows();
      const detailRows = paddedOrderRows(exportRows, 10);
      const dateLine = formatOrderDateLine(deliveryDate.value, useDate.value);
      const totals = calculateExportTotals(exportRows);

      if (orderTsv) orderTsv.value = buildTsv(buildExportDocument(exportRows));

      orderPreview.innerHTML = '<table class="preview-sheet">' +
        '<tbody>' +
          '<tr class="title-row"><td colspan="10">発　注　書　兼　納　品　書</td></tr>' +
          '<tr class="sub-title-row"><td colspan="10">スクルドエンジェル</td></tr>' +
          '<tr class="sub-title-row"><td colspan="10">たかばり　園</td></tr>' +
          '<tr class="blank"><td colspan="10"></td></tr>' +
          '<tr class="date-row"><td class="date-line" colspan="10">' + escapeHtml(dateLine) + '</td></tr>' +
          '<tr class="blank"><td colspan="10"></td></tr>' +
