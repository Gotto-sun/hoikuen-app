<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>献立表OCR 発注書作成</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: #fff7ed;
      color: #1f2937;
      line-height: 1.6;
    }
    header {
      background: linear-gradient(135deg, #fb923c, #ea580c);
      color: #fff;
      padding: 20px 16px 14px;
    }
    header h1 { margin: 0 0 4px; font-size: 24px; }
    header p { margin: 0; font-size: 14px; opacity: .95; }
    main { width: min(1080px, 100%); margin: 0 auto; padding: 16px; }
    section {
      background: #fff;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(154, 52, 18, .08);
    }
    h2 { margin: 0 0 12px; font-size: 18px; }
    label { display: block; margin: 12px 0 6px; font-weight: 700; }
    .note { margin: 0 0 12px; color: #64748b; font-size: 14px; }
    .buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
    button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }
    button:disabled { opacity: 1; cursor: pointer; }
    .primary { background: #f97316; }
    .blue { background: #2563eb; }
    .green { background: #16a34a; }
    .gray { background: #64748b; }
    .red { background: #dc2626; }
    .orange { background: #ea580c; }
    input[type="file"] { display: none; }
    textarea, input {
      width: 100%;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      background: #fffdf8;
    }
    textarea {
      min-height: 180px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      white-space: pre;
    }
    .status { min-height: 1.6em; margin: 10px 0 0; color: #475569; font-weight: 700; font-size: 14px; }
    .file-status, .summary, .document-fields { display: grid; gap: 10px; margin: 12px 0; }
    .file-status { grid-template-columns: repeat(3, 1fr); font-size: 13px; }
    .summary { grid-template-columns: repeat(3, 1fr); }
    .document-fields { grid-template-columns: 90px 1fr 90px 1fr 90px 1fr; align-items: center; }
    .file-status div, .summary div, .document-fields {
      border: 1px solid #fed7aa;
      border-radius: 12px;
      background: #fffdf8;
      padding: 10px;
    }
    .document-fields label { margin: 0; white-space: nowrap; }
    .summary span { display: block; color: #64748b; font-size: 12px; }
    .summary b { font-size: 22px; }
    #preview {
      display: none;
      width: 100%;
      max-height: 280px;
      object-fit: contain;
      margin-top: 12px;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      background: #fff;
    }
    .empty {
      padding: 20px;
      text-align: center;
      color: #64748b;
      border: 1px dashed #fdba74;
      border-radius: 12px;
      background: #fff7ed;
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; min-width: 900px; border-collapse: collapse; background: #fff; }
    th, td { border: 1px solid #fed7aa; padding: 6px; text-align: left; vertical-align: top; }
    th { background: #ffedd5; color: #7c2d12; white-space: nowrap; }
    td input { min-width: 80px; padding: 8px; }
    td .delete-row { min-height: 36px; border-radius: 10px; padding: 6px 10px; }
    .csv-panel { display: none; margin-top: 12px; padding: 12px; border: 1px solid #fdba74; border-radius: 12px; background: #fffdf8; }
    .csv-panel.is-open { display: block; }
    #csvOutput { min-height: 260px; }
    @media (max-width: 760px) {
      main { padding: 12px; }
      .buttons, .file-status, .summary, .document-fields { grid-template-columns: 1fr; }
      table, thead, tbody, tr, td { display: block; width: 100%; min-width: 0; }
      thead { display: none; }
      tr { border: 1px solid #ffedd5; border-radius: 12px; margin-bottom: 10px; padding: 10px; }
      td { border: 0; padding: 6px 0; }
      td::before { content: attr(data-label); display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 3px; }
    }
    @page { size: A4 portrait; margin: 12mm; }
    @media print {
      html, body { width: 210mm; margin: 0; padding: 0; background: #fff; color: #000; }
      body { font-size: 10.5pt; line-height: 1.25; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      header, main section:first-child, .buttons, .summary, .document-fields, .status, .note, .csv-panel { display: none !important; }
      main { width: 186mm; max-width: 186mm; margin: 0 auto; padding: 0; }
      main, section, .table-wrap { overflow: visible !important; border: 0; box-shadow: none; background: #fff; }
      section { width: 100%; margin: 0; padding: 0; break-inside: avoid; }
      h2 { margin: 0 0 4mm; font-size: 12pt; color: #000; }
      table { width: 100%; min-width: 0; table-layout: fixed; border-collapse: collapse; font-size: 10pt; page-break-inside: avoid; }
      th, td { border: 1.2pt solid #000; padding: 2mm 1.4mm; color: #000; background: #fff; vertical-align: middle; }
      th { font-size: 10pt; font-weight: 700; text-align: center; }
      td input { width: 100%; min-width: 0; border: 0; padding: 0; background: transparent; color: #000; font-size: 10pt; }
      th:nth-child(1), td:nth-child(1) { width: 8mm; }
      th:nth-child(2), td:nth-child(2) { width: 28mm; }
      th:nth-child(3), td:nth-child(3), th:nth-child(6), td:nth-child(6) { width: 17mm; }
      th:nth-child(4), td:nth-child(4), th:nth-child(7), td:nth-child(7) { width: 11mm; }
      th:nth-child(5), td:nth-child(5) { width: 34mm; }
      th:nth-child(8), td:nth-child(8), th:nth-child(9), td:nth-child(9) { width: 15mm; }
      th:nth-child(10), td:nth-child(10) { width: 18mm; }
      th:nth-child(11), td:nth-child(11) { display: none; }
      tr { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <header>
    <h1>献立表OCR 発注書作成</h1>
    <p>CSV・スキャナー画像・スマホカメラ・手入力から、Excel発注書とCSVを作成します。</p>
  </header>

  <main>
    <section>
      <h2>1. 入力</h2>
      <p class="note">CSVは「食品名,数量,単位」を最優先で読み取ります。OCRできなくても手入力で出力できます。</p>
      <div class="buttons">
        <button class="blue" type="button" onclick="menuCsvInput.value=''; menuCsvInput.click();">📄 CSVを選ぶ</button>
        <button class="green" type="button" onclick="childrenCsvInput.value=''; childrenCsvInput.click();">👶 園児数CSV</button>
        <button class="gray" type="button" onclick="ruleCsvInput.value=''; ruleCsvInput.click();">⚙️ ルールCSV</button>
        <button class="blue" type="button" onclick="cameraInput.click();">📷 カメラで撮る</button>
        <button class="gray" type="button" onclick="imageInput.value=''; imageInput.click();">🖼️ 画像を選ぶ</button>
        <button class="gray" type="button" onclick="if(lastImage){ runOcr(lastImage); } else { notice.textContent='先に画像を選んでください。'; }">🔁 もう一度OCR</button>
      </div>

      <input id="menuCsvInput" type="file" accept=".csv,text/csv">
      <input id="childrenCsvInput" type="file" accept=".csv,text/csv">
      <input id="ruleCsvInput" type="file" accept=".csv,text/csv">
      <input id="cameraInput" type="file" accept="image/*" capture="environment">
      <input id="imageInput" type="file" accept="image/*">

      <div class="file-status">
        <div><b>献立</b><br><span id="menuCsvStatus">未選択（手入力可）</span></div>
        <div><b>園児数</b><br><span id="childrenCsvStatus">未選択（1人分）</span></div>
        <div><b>発注ルール</b><br><span id="ruleCsvStatus">標準ルール</span></div>
      </div>

      <img id="preview" alt="選択画像">
      <p id="ocrStatus" class="status"></p>

      <label for="ocrText">CSV / OCR結果 / 手入力</label>
      <textarea id="ocrText" placeholder="食品名,数量,単位&#10;にんじん,15,g&#10;牛乳,100,ml"></textarea>

      <div class="buttons">
        <button class="primary" type="button" onclick="extractAndRender();">発注数を計算する</button>
        <button class="gray" type="button" onclick="insertSample();">サンプルを入れる</button>
        <button class="red" type="button" onclick="clearAll();">消す</button>
      </div>
    </section>

    <section>
      <h2>2. 発注書</h2>
      <div class="summary">
        <div><span>発注食材数</span><b id="itemCount">0</b></div>
        <div><span>合算件数</span><b id="mergedCount">0</b></div>
        <div><span>除外件数</span><b id="excludedCount">0</b></div>
      </div>
      <p id="notice" class="status"></p>

      <div class="document-fields">
        <label for="deliveryDate">納品日</label><input id="deliveryDate" type="date">
        <label for="useDate">使用日</label><input id="useDate" type="date">
        <label for="checkerName">検品者</label><input id="checkerName" type="text" placeholder="検品者名">
      </div>

      <div id="tableArea" class="empty">まだ食材がありません。すべての出力ボタンは使えます。</div>

      <div class="buttons">
        <button class="gray" type="button" onclick="addRow();">＋ 発注行を追加</button>
        <button class="green" type="button" onclick="downloadExcel();">Excel出力</button>
        <button class="blue" type="button" onclick="downloadCsv();">CSVダウンロード</button>
        <button class="orange" type="button" onclick="showCsv();">CSV表示</button>
        <button class="blue" type="button" onclick="copyCsv();">CSVコピー</button>
      </div>

      <div id="csvPanel" class="csv-panel">
        <label for="csvOutput">CSV全文（コピー可能）</label>
        <textarea id="csvOutput" readonly></textarea>
      </div>
    </section>
  </main>

  <script>
    const sampleText = "食品名,数量,単位\nにんじん,15,g\n玉ねぎ,20,g\n鶏もも肉,40,g\n牛乳,100,ml\nりんご,0.5,個";
    const headers = ["チェック", "材料名", "総使用量", "単位", "摘要", "納品数", "単位", "単価", "金額", "産地"];
    const defaultDetailRows = 30;
    const units = ["kg", "g", "ml", "l", "L", "個", "本", "袋", "缶", "丁", "枚", "束", "箱", "パック"];
    const aliases = { "人参": "にんじん", "ニンジン": "にんじん", "玉葱": "玉ねぎ", "たまねぎ": "玉ねぎ", "ジャガイモ": "じゃがいも", "じゃが芋": "じゃがいも", "鶏肉": "鶏もも肉", "豚肉": "豚こま肉", "リンゴ": "りんご", "たまご": "卵" };
    const standardRules = [
      { names: ["米", "ごはん", "だし", "だし汁", "しょうゆ", "醤油", "塩", "砂糖", "酢", "みそ", "味噌", "油", "酒", "みりん"], exclude: true, reason: "標準ルールで除外" },
      { names: ["牛乳"], orderUnit: "本", packageQuantity: 450, packageUnit: "ml", roundStep: 1, note: "450ml換算" },
      { names: ["キャベツ"], orderUnit: "個", packageQuantity: 1200, packageUnit: "g", roundStep: 0.25, note: "1/4個単位" },
      { names: ["白菜"], orderUnit: "個", packageQuantity: 2000, packageUnit: "g", roundStep: 0.125, note: "1/8個単位" },
      { names: ["しめじ", "えのき", "しいたけ", "まいたけ"], orderUnit: "袋", packageQuantity: 100, packageUnit: "g", roundStep: 1, note: "100g袋換算" },
      { names: ["豆腐"], orderUnit: "丁", packageQuantity: 300, packageUnit: "g", roundStep: 1, note: "300g換算" },
      { names: ["にんじん", "玉ねぎ", "じゃがいも", "大根", "きゅうり", "トマト", "ほうれん草", "小松菜", "ブロッコリー", "ピーマン", "かぼちゃ", "なす", "もやし", "ねぎ", "鶏もも肉", "鶏むね肉", "鶏ひき肉", "豚こま肉", "豚ひき肉", "牛肉", "鮭", "さば", "たら"], orderUnit: "kg", packageQuantity: 1000, packageUnit: "g", roundStep: 0.1, note: "kg換算" },
      { names: ["卵", "りんご", "バナナ", "みかん", "オレンジ", "いちご"], orderUnit: "個", packageQuantity: 1, packageUnit: "個", roundStep: 1, note: "個数換算" }
    ];

    let rows = [];
    let lastImage = null;
    let childrenCount = 1;
    let customRules = [];
    let stats = { merged: 0, excluded: 0 };

    menuCsvInput.addEventListener("change", event => loadMenuCsv(event.target.files[0]));
    childrenCsvInput.addEventListener("change", event => loadChildrenCsv(event.target.files[0]));
    ruleCsvInput.addEventListener("change", event => loadRuleCsv(event.target.files[0]));
    cameraInput.addEventListener("change", event => handleImage(event.target.files[0]));
    imageInput.addEventListener("change", event => handleImage(event.target.files[0]));

    async function readTextFile(file) {
      if (!file) return "";
      const buffer = await file.arrayBuffer();
      const utf8 = new TextDecoder("utf-8", { fatal: false }).decode(buffer);
      if (!utf8.includes("�")) return utf8;
      try { return new TextDecoder("shift_jis").decode(buffer); } catch { return utf8; }
    }

    async function loadMenuCsv(file) {
      if (!file) return;
      ocrText.value = await readTextFile(file);
      menuCsvStatus.textContent = file.name;
      notice.textContent = "CSVを読み込みました。";
      extractAndRender();
    }

    async function loadChildrenCsv(file) {
      if (!file) return;
      const text = await readTextFile(file);
      childrenCount = Math.max(1, parseChildrenCount(text));
      childrenCsvStatus.textContent = file.name + "（" + childrenCount + "人）";
      notice.textContent = childrenCount + "人分で計算します。";
      if (ocrText.value.trim()) extractAndRender();
    }

    async function loadRuleCsv(file) {
      if (!file) return;
      customRules = parseRuleCsv(await readTextFile(file));
      ruleCsvStatus.textContent = file.name + "（" + customRules.length + "件）";
      notice.textContent = "発注ルールを読み込みました。";
      if (ocrText.value.trim()) extractAndRender();
    }

    function handleImage(file) {
      if (!file) return;
      lastImage = file;
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      runOcr(file);
    }

    async function runOcr(file) {
      if (!file) return;
      if (!window.Tesseract) {
        ocrStatus.textContent = "OCRを読み込めませんでした。手入力で出力できます。";
        ensureFallbackRow("OCR読込失敗");
        return;
      }
      ocrStatus.textContent = "OCR中です。";
      try {
        const result = await Tesseract.recognize(file, "jpn+eng", {
          logger: message => {
            if (message.status === "recognizing text") ocrStatus.textContent = "OCR中です：" + Math.round(message.progress * 100) + "%";
          }
        });
        ocrText.value = cleanupOcrText(result.data.text || "");
        menuCsvStatus.textContent = "OCR結果";
        ocrStatus.textContent = "OCRが終わりました。";
        extractAndRender(true);
      } catch (error) {
        console.error(error);
        ocrStatus.textContent = "OCRに失敗しました。手入力で必ず出力できます。";
        ensureFallbackRow("OCR失敗");
      }
    }

    function insertSample() {
      ocrText.value = sampleText;
      menuCsvStatus.textContent = "サンプル";
      extractAndRender();
    }

    function extractAndRender(fromOcr) {
      const text = ocrText.value.trim();
      if (!text) {
        rows = [];
        stats = { merged: 0, excluded: 0 };
        renderTable();
        updateSummary();
        notice.textContent = "未入力でもExcel/CSV出力できます。必要なら発注行を追加してください。";
        return;
      }
      const result = extractIngredients(text);
      rows = result.rows;
      stats = result.stats;
      if (rows.length === 0 && fromOcr) ensureFallbackRow("OCR結果から抽出できず", false);
      renderTable();
      updateSummary();
      notice.textContent = rows.length ? "発注数を計算しました。" : "抽出できませんでした。手入力行を追加するか、そのまま空の様式を出力できます。";
    }

    function extractIngredients(text) {
      const parsedCsv = parseCsv(text);
      const csvRows = rowsFromCsv(parsedCsv);
      const sourceRows = csvRows.length ? csvRows : rowsFromText(text);
      const totals = new Map();
      let found = 0;
      let excluded = 0;
      for (const item of sourceRows) {
        const name = normalizeName(item.name);
        const quantity = numberValue(item.quantity) || 1;
        const unit = normalizeUnit(item.unit || "個");
        if (!isValidFoodName(name)) continue;
        const rule = findRule(name);
        if (rule && rule.exclude) { excluded++; continue; }
        found++;
        const key = name + "__" + unit;
        const current = totals.get(key) || { name, quantity: 0, unit, count: 0 };
        current.quantity += quantity * childrenCount;
        current.count += 1;
        totals.set(key, current);
      }
      const output = Array.from(totals.values()).map(toOrderRow).sort((a, b) => a.name.localeCompare(b.name, "ja"));
      return { rows: output, stats: { merged: Math.max(0, found - output.length), excluded } };
    }

    function rowsFromCsv(csvRows) {
      if (!csvRows.length || !csvRows.some(row => row.length > 1)) return [];
      const first = csvRows[0].map(normalizeHeader);
      const hasHeader = first.some(value => ["食品名", "食材名", "材料名", "name"].includes(value));
      const nameIndex = hasHeader ? findIndex(first, ["食品名", "食材名", "材料名", "name"]) : 0;
      const quantityIndex = hasHeader ? findIndex(first, ["数量", "分量", "使用量", "総使用量", "3歳未満児量", "３歳未満児量", "未満児量", "quantity"]) : 1;
      const unitIndex = hasHeader ? findIndex(first, ["単位", "unit"]) : 2;
      const data = hasHeader ? csvRows.slice(1) : csvRows;
      return data.map(row => rowFromCsvColumns(row, nameIndex, quantityIndex, unitIndex)).filter(row => isValidFoodName(row.name));
    }

    function rowFromCsvColumns(row, nameIndex, quantityIndex, unitIndex) {
      let n = nameIndex >= 0 ? nameIndex : 0;
      let q = quantityIndex >= 0 ? quantityIndex : 1;
      let u = unitIndex >= 0 ? unitIndex : 2;
      if (!row[n] || isNonFood(row[n])) n = row.findIndex(cell => cell && !isNonFood(cell));
      if (q < 0 || q === n || !numberValue(row[q])) q = row.findIndex((cell, index) => index !== n && numberValue(cell));
      if (u < 0 || u === n || u === q || !row[u]) u = row.findIndex((cell, index) => index !== n && index !== q && units.includes(normalizeUnit(cell)));
      const fallback = findAmount(row.join(","));
      return { name: normalizeName(row[n] || ""), quantity: numberValue(row[q]) || fallback.quantity || 1, unit: normalizeUnit(row[u] || fallback.unit || "個") };
    }

    function rowsFromText(text) {
      const output = [];
      for (const phrase of textPhrases(text)) {
        if (!phrase || isHeaderWord(phrase)) continue;
        const amount = findAmount(phrase);
        const name = guessName(phrase, amount);
        if (isValidFoodName(name)) output.push({ name, quantity: amount.quantity, unit: amount.unit });
      }
      return output;
    }

    function textPhrases(text) {
      return String(text || "")
        .replace(/\r\n?/g, "\n")
        .replace(/[，、]/g, ",")
        .split(/[\n,]+/)
        .map(value => value.replace(/\s+/g, " ").trim())
        .filter(Boolean);
    }

    function cleanupOcrText(text) {
      return String(text || "")
        .replace(/^\uFEFF/, "")
        .replace(/\r\n?/g, "\n")
        .replace(/[，、]/g, ",")
        .replace(/[|｜]/g, ",")
        .split("\n")
        .map(line => line.replace(/\s*,\s*/g, ",").replace(/[ \t]+/g, " ").trim())
        .filter(Boolean)
        .join("\n")
        .trim();
    }

    function guessName(line, amount) {
      const source = String(line || "");
      const compact = source.replace(/\s/g, "");
      const known = allKnownNames().find(name => compact.includes(name));
      if (known) return normalizeName(known);
      const withoutAmount = source
        .replace(/[0-9０-９]+(?:[.．][0-9０-９]+)?\s*(?:kg|g|ml|l|L|個|本|袋|缶|丁|枚|束|箱|パック)?/gi, "")
        .replace(/[：:]/g, "")
        .trim();
      return normalizeName(withoutAmount);
    }

    function toOrderRow(item) {
      const rule = findRule(item.name) || defaultRule(item.unit);
      const converted = convertQuantity(item.quantity, item.unit, rule);
      const notes = [];
      if (item.count > 1) notes.push(item.count + "件を合算");
      if (rule.note) notes.push(rule.note);
      if (converted.warning) notes.push(converted.warning);
      return { checked: "□", name: item.name, totalQuantity: round(item.quantity), totalUnit: item.unit, note: notes.join(" / "), orderQuantity: converted.quantity, orderUnit: converted.unit, unitPrice: "", amount: "", origin: "" };
    }

    function convertQuantity(quantity, unit, rule) {
      let base = quantity;
      let warning = "";
      const from = normalizeUnit(unit);
      const to = normalizeUnit(rule.packageUnit || from);
      if (from !== to) base = convertUnit(quantity, from, to);
      if (base === null) { base = quantity; warning = "単位要確認"; }
      return { quantity: roundUp(base / (numberValue(rule.packageQuantity) || 1), numberValue(rule.roundStep) || 1), unit: rule.orderUnit || from, warning };
    }

    function convertUnit(value, from, to) {
      if (from === to) return value;
      if (from === "kg" && to === "g") return value * 1000;
      if (from === "g" && to === "kg") return value / 1000;
      if (from === "L" && to === "ml") return value * 1000;
      if (from === "ml" && to === "L") return value / 1000;
      return null;
    }

    function defaultRule(unit) {
      const normalized = normalizeUnit(unit);
      return { orderUnit: normalized, packageQuantity: 1, packageUnit: normalized, roundStep: normalized === "g" || normalized === "ml" ? 100 : 1, note: "要確認" };
    }

    function findRule(name) {
      const normalized = normalizeName(name);
      return customRules.concat(standardRules).find(rule => rule.names.some(ruleName => normalized === normalizeName(ruleName) || normalized.includes(normalizeName(ruleName))));
    }

    function parseChildrenCount(text) {
      const csv = parseCsv(text);
      if (!csv.length) return 1;
      const header = csv[0].map(normalizeHeader);
      const index = header.findIndex(value => /3歳未満|３歳未満|未満児|0歳|1歳|１歳|2歳|２歳/.test(value));
      if (index >= 0) return csv.slice(1).reduce((sum, row) => sum + numberValue(row[index]), 0) || 1;
      return csv.flat().reduce((sum, value) => sum + numberValue(value), 0) || 1;
    }

    function parseRuleCsv(text) {
      const csv = parseCsv(text);
      if (csv.length < 2) return [];
      const header = csv[0].map(normalizeHeader);
      const ni = findIndex(header, ["食品名", "食材名", "材料名", "name"]);
      const oui = findIndex(header, ["発注単位", "納品単位", "orderunit", "単位"]);
      const pqi = findIndex(header, ["入数", "換算量", "基準量", "packagequantity"]);
      const pui = findIndex(header, ["基準単位", "換算単位", "packageunit"]);
      const rsi = findIndex(header, ["丸め単位", "発注刻み", "roundstep"]);
      const exi = findIndex(header, ["除外", "対象外", "exclude"]);
      const noi = findIndex(header, ["摘要", "備考", "note"]);
      return csv.slice(1).map(row => ({
        names: String(row[ni] || "").split(/[、/|｜]/).map(normalizeName).filter(Boolean),
        orderUnit: row[oui] || "",
        packageQuantity: numberValue(row[pqi]) || 1,
        packageUnit: row[pui] || row[oui] || "個",
        roundStep: numberValue(row[rsi]) || 1,
        exclude: /^(1|true|yes|除外|対象外)$/i.test(String(row[exi] || "").trim()),
        reason: row[noi] || "ルールCSVで除外",
        note: row[noi] || "ルールCSV"
      })).filter(rule => rule.names.length);
    }

    function ensureFallbackRow(reason, shouldRender = true) {
      rows = [{ checked: "□", name: "手入力食材", totalQuantity: 1, totalUnit: "個", note: reason + "（修正してください）", orderQuantity: 1, orderUnit: "個", unitPrice: "", amount: "", origin: "" }];
      stats = { merged: 0, excluded: 0 };
      if (shouldRender) { renderTable(); updateSummary(); }
      notice.textContent = reason + "。最低1行を用意しました。";
    }

    function addRow() {
      syncRows();
      rows.push({ checked: "□", name: "", totalQuantity: 1, totalUnit: "個", note: "手入力", orderQuantity: 1, orderUnit: "個", unitPrice: "", amount: "", origin: "" });
      renderTable();
      updateSummary();
    }

    function deleteRow(index) {
      syncRows();
      rows.splice(index, 1);
      renderTable();
      updateSummary();
    }

    function renderTable() {
      if (!rows.length) {
        tableArea.className = "empty";
        tableArea.textContent = "まだ食材がありません。すべての出力ボタンは使えます。";
        return;
      }
      tableArea.className = "table-wrap";
      tableArea.innerHTML = "<table><thead><tr>" + headers.map(h => "<th>" + h + "</th>").join("") + "<th>操作</th></tr></thead><tbody>" + rows.map(rowHtml).join("") + "</tbody></table>";
      tableArea.querySelectorAll("input").forEach(input => input.addEventListener("input", syncRows));
    }

    function rowHtml(row, index) {
      const fields = [["チェック", "checked"], ["材料名", "name"], ["総使用量", "totalQuantity", "number"], ["単位", "totalUnit"], ["摘要", "note"], ["納品数", "orderQuantity", "number"], ["単位", "orderUnit"], ["単価", "unitPrice", "number"], ["金額", "amount", "number"], ["産地", "origin"]];
      return "<tr>" + fields.map(([label, field, type]) => "<td data-label=\"" + escapeHtml(label) + "\"><input " + (type === "number" ? "type=\"number\" step=\"0.001\" " : "") + "data-index=\"" + index + "\" data-field=\"" + field + "\" value=\"" + escapeHtml(row[field] ?? "") + "\"></td>").join("") + "<td data-label=\"操作\"><button class=\"red delete-row\" type=\"button\" onclick=\"deleteRow(" + index + ");\">削除</button></td></tr>";
    }

    function syncRows() {
      if (!tableArea.querySelector("table")) return;
      const next = rows.map(row => ({ ...row }));
      tableArea.querySelectorAll("input[data-index]").forEach(input => {
        const row = next[Number(input.dataset.index)];
        if (!row) return;
        const field = input.dataset.field;
        row[field] = ["totalQuantity", "orderQuantity", "unitPrice", "amount"].includes(field) ? input.value : input.value;
      });
      rows = next;
      updateSummary();
    }

    function updateSummary() {
      itemCount.textContent = rows.filter(row => String(row.name || "").trim()).length;
      mergedCount.textContent = stats.merged;
      excludedCount.textContent = stats.excluded;
      document.querySelectorAll("button").forEach(button => button.disabled = false);
    }

    function getExportRows() {
      syncRows();
      return rows.filter(row => String(row.name || "").trim()).map(row => {
        const orderQuantity = numberValue(row.orderQuantity);
        const unitPrice = numberValue(row.unitPrice);
        const amount = numberValue(row.amount) || (orderQuantity && unitPrice ? round(orderQuantity * unitPrice) : "");
        return [row.checked || "□", row.name || "", numberValue(row.totalQuantity) || "", row.totalUnit || "", row.note || "", orderQuantity || "", row.orderUnit || "", unitPrice || "", amount || "", row.origin || ""];
      });
    }

    function getRowsForOutput() {
      const exportRows = getExportRows();
      return exportRows.length ? exportRows : [["□", "手入力食材", 1, "個", "最低1行出力", 1, "個", "", "", ""]];
    }

    function buildDocument() {
      const exportRows = getRowsForOutput();
      const details = exportRows.slice();
      while (details.length < defaultDetailRows) details.push(Array(headers.length).fill(""));
      const totals = calculateTotals(exportRows);
      const blank = Array(headers.length).fill("");
      const use = parseDateParts(useDate.value);
      return [
        blank, blank, blank, blank,
        ["", "", "発　注　書　兼　納　品　書", "", "", "", "", "", "", ""],
        ["", "", "スクルドエンジェル", "", "", "", "", "", "", ""],
        ["", "", "たかばり　園", "", "", "", "", "", "", ""],
        blank,
        ["納品日", formatJapaneseDate(deliveryDate.value), "", "", "", "使用日", use.month || "", "月", use.day || "", "日"],
        blank,
        headers,
        ...details,
        blank, blank, blank,
        ["", "", "", "", "", "", "合計金額", "", totals.total || "", ""],
        ["", "", "", "", "", "", "消費税 課税合計", "", totals.tax || "", ""],
        ["", "", "検品者", "", "", "", "請求金額", "", totals.billed || "", ""],
        ["", "", checkerName.value || "", "", "", "", "", "", "", ""]
      ];
    }

    function downloadExcel() {
      if (!window.XLSX) { showCsv("Excel作成機能を読み込めませんでした。CSVを使ってください。"); return; }
      const documentRows = buildDocument();
      const worksheet = XLSX.utils.aoa_to_sheet(documentRows);
      setupWorksheet(worksheet, documentRows.length);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "発注書");
      XLSX.writeFile(workbook, fileName("xlsx"));
      notice.textContent = "Excelを出力しました。";
    }

    function setupWorksheet(sheet, rowCount) {
      const layout = getExcelLayout(rowCount);
      sheet["!cols"] = [{ wch: 7 }, { wch: 18 }, { wch: 10 }, { wch: 7 }, { wch: 22 }, { wch: 8 }, { wch: 7 }, { wch: 8 }, { wch: 10 }, { wch: 10 }];
      sheet["!rows"] = Array.from({ length: rowCount }, (_, i) => ({ hpt: i === 4 ? 26 : (i >= layout.tableStart && i <= layout.detailEnd ? 20 : 18) }));
      sheet["!merges"] = [
        { s: { r: 4, c: 2 }, e: { r: 4, c: 7 } },
        { s: { r: 5, c: 2 }, e: { r: 5, c: 7 } },
        { s: { r: 6, c: 2 }, e: { r: 6, c: 7 } },
        { s: { r: 8, c: 1 }, e: { r: 8, c: 4 } },
        { s: { r: layout.totalStart, c: 6 }, e: { r: layout.totalStart, c: 7 } },
        { s: { r: layout.totalStart + 1, c: 6 }, e: { r: layout.totalStart + 1, c: 7 } },
        { s: { r: layout.totalStart + 2, c: 6 }, e: { r: layout.totalStart + 2, c: 7 } },
        { s: { r: layout.checkerStart, c: 2 }, e: { r: layout.checkerStart, c: 3 } },
        { s: { r: layout.checkerStart + 1, c: 2 }, e: { r: layout.checkerStart + 1, c: 3 } }
      ];
      sheet["!margins"] = { left: 0.2, right: 0.2, top: 0.45, bottom: 0.35, header: 0.15, footer: 0.15 };
      sheet["!pageSetup"] = { orientation: "portrait", paperSize: 9, fitToWidth: 1, fitToHeight: 1 };
      sheet["!printOptions"] = { gridLines: false, horizontalCentered: true };
      const ref = XLSX.utils.decode_range(sheet["!ref"]);
      for (let r = ref.s.r; r <= ref.e.r; r++) {
        for (let c = ref.s.c; c <= ref.e.c; c++) {
          const address = XLSX.utils.encode_cell({ r, c });
          if (!sheet[address]) sheet[address] = { t: "s", v: "" };
          sheet[address].s = cellStyle(r, c, layout);
        }
      }
    }

    function getExcelLayout(rowCount) {
      const detailCount = Math.max(defaultDetailRows, rowCount - 19);
      return { tableStart: 10, detailEnd: 10 + detailCount, totalStart: 14 + detailCount, checkerStart: 17 + detailCount };
    }

    function cellStyle(row, col, layout) {
      const thin = { style: "thin", color: { rgb: "000000" } };
      const medium = { style: "medium", color: { rgb: "000000" } };
      const inTable = row >= layout.tableStart && row <= layout.detailEnd;
      const inTotals = row >= layout.totalStart && row <= layout.totalStart + 2 && col >= 6 && col <= 9;
      const inChecker = row >= layout.checkerStart && row <= layout.checkerStart + 1 && col >= 2 && col <= 3;
      const border = inTable || inTotals || inChecker ? { top: thin, bottom: thin, left: thin, right: thin } : undefined;
      if (inTable && row === layout.tableStart) border.top = medium;
      if (inTable && row === layout.detailEnd) border.bottom = medium;
      if (inTable && col === 0) border.left = medium;
      if (inTable && col === 9) border.right = medium;
      return {
        font: { name: "Yu Gothic", sz: row === 4 ? 16 : 9, bold: row === 4 || row === layout.tableStart || inTotals || inChecker },
        alignment: { horizontal: row === 4 || row === layout.tableStart || inTotals || inChecker ? "center" : (col === 1 || col === 4 ? "left" : "center"), vertical: "center", wrapText: true },
        border,
        fill: row === layout.tableStart ? { patternType: "solid", fgColor: { rgb: "FCE4D6" } } : undefined
      };
    }

    function downloadCsv() {
      const csv = buildCsvText();
      downloadBlob(new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" }), fileName("csv"));
      csvOutput.value = csv;
      csvPanel.classList.add("is-open");
      notice.textContent = "CSVをダウンロードしました。";
    }

    function copyCsv() {
      const csv = buildCsvText();
      csvOutput.value = csv;
      csvPanel.classList.add("is-open");
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(csv).then(() => notice.textContent = "CSVをコピーしました。").catch(() => notice.textContent = "CSVを表示しました。手動でコピーしてください。");
      } else {
        csvOutput.focus();
        csvOutput.select();
        notice.textContent = "CSVを表示しました。手動でコピーしてください。";
      }
    }

    function showCsv(message) {
      const csv = buildCsvText();
      csvOutput.value = csv;
      csvPanel.classList.add("is-open");
      csvOutput.focus();
      csvOutput.select();
      notice.textContent = message || "CSVを表示しました。";
    }

    function buildCsvText() { return toCsv([headers, ...getRowsForOutput()]); }
    function toCsv(rowList) { return rowList.map(row => row.map(csvCell).join(",")).join("\r\n"); }
    function csvCell(value) { const text = String(value ?? ""); return /[",\r\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text; }

    function parseCsv(text) {
      const rows = [];
      let row = [], cell = "", quoted = false;
      const source = String(text || "").replace(/^\uFEFF/, "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
      for (let i = 0; i < source.length; i++) {
        const char = source[i], next = source[i + 1];
        if (char === '"') {
          if (quoted && next === '"') { cell += '"'; i++; } else { quoted = !quoted; }
        } else if (char === "," && !quoted) {
          row.push(cell.trim()); cell = "";
        } else if (char === "\n" && !quoted) {
          row.push(cell.trim()); if (row.some(Boolean)) rows.push(row); row = []; cell = "";
        } else {
          cell += char;
        }
      }
      row.push(cell.trim()); if (row.some(Boolean)) rows.push(row);
      return rows;
    }

    function findAmount(text) {
      const normalized = normalizeAmountText(text);
      const match = normalized.match(/([0-9]+(?:\.[0-9]+)?)\s*(kg|g|ml|l|L|個|本|袋|缶|丁|枚|束|箱|パック)/i);
      if (match) return { quantity: Number(match[1]), unit: normalizeUnit(match[2]) };
      const numbers = normalized.match(/[0-9]+(?:\.[0-9]+)?/g);
      return { quantity: numbers ? Number(numbers[numbers.length - 1]) : 1, unit: "個" };
    }

    function calculateTotals(exportRows) {
      const total = exportRows.reduce((sum, row) => sum + numberValue(row[8]), 0);
      const tax = Math.floor(total * 0.1);
      return { total: round(total), tax, billed: round(total + tax) };
    }

    function clearAll() {
      rows = [];
      lastImage = null;
      childrenCount = 1;
      customRules = [];
      stats = { merged: 0, excluded: 0 };
      ocrText.value = "";
      ocrStatus.textContent = "";
      notice.textContent = "入力を消しました。";
      menuCsvStatus.textContent = "未選択（手入力可）";
      childrenCsvStatus.textContent = "未選択（1人分）";
      ruleCsvStatus.textContent = "標準ルール";
      preview.removeAttribute("src");
      preview.style.display = "none";
      csvOutput.value = "";
      csvPanel.classList.remove("is-open");
      deliveryDate.value = "";
      useDate.value = "";
      checkerName.value = "";
      renderTable();
      updateSummary();
    }

    function allKnownNames() { return Array.from(new Set(standardRules.flatMap(rule => rule.names).concat(Object.keys(aliases), Object.values(aliases)))).sort((a, b) => b.length - a.length); }
    function normalizeName(value) {
      const text = String(value || "")
        .replace(/^﻿/, "")
        .replace(/[　	]+/g, " ")
        .replace(/[\[\]【】()（）{}<>＜＞「」『』]/g, "")
        .replace(/[、,，:：;；|｜]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      return aliases[text] || text;
    }
    function normalizeHeader(value) { return String(value || "").trim().replace(/\s/g, "").toLowerCase(); }
    function normalizeUnit(value) { const text = String(value || "").trim().toLowerCase(); if (text === "l") return "L"; return text || "個"; }
    function normalizeAmountText(value) { return String(value || "").replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0)).replace(/．/g, ".").replace(/[Ｇｇ]/g, "g").replace(/[Ｍｍ]/g, "m").replace(/[Ｌｌ]/g, "l"); }
    function numberValue(value) { const match = normalizeAmountText(value).replace(/,/g, "").match(/-?[0-9]+(?:\.[0-9]+)?/); return match ? Number(match[0]) : 0; }
    function findIndex(row, names) { return row.findIndex(value => names.includes(value) || names.some(name => value.includes(name))); }
    function isHeaderWord(value) { return /^(日付|曜日|献立|献立名|昼食|おやつ|午前|午後|材料|食品名|食材名|材料名|数量|分量|使用量|総使用量|単位|備考)$/i.test(String(value || "").trim()); }
    function isNonFood(value) { const text = String(value || "").trim(); return !text || isHeaderWord(text) || /^[0-9０-９]+(?:[./月-][0-9０-９]+)?日?$/.test(text) || Boolean(numberValue(text)); }
    function isValidFoodName(value) {
      const text = normalizeName(value).replace(/\s/g, "");
      if (!text || isHeaderWord(text)) return false;
      if (/^[ぁ-ん]$/.test(text)) return false;
      if (text.length < 2 && !allKnownNames().includes(text)) return false;
      if (/^[\d０-９.,，、\-ー\s]+$/.test(text)) return false;
      if (!/[ぁ-んァ-ン一-龥々A-Za-z]/.test(text)) return false;
      if (/^(kg|g|ml|l|L|個|本|袋|缶|丁|枚|束|箱|パック)$/i.test(text)) return false;
      return true;
    }
    function round(value) { return Math.round(Number(value || 0) * 1000) / 1000; }
    function roundUp(value, step) { return round(Math.ceil((Number(value) - 0.0000001) / Number(step || 1)) * Number(step || 1)); }
    function parseDateParts(value) { if (!value) return { year: "", month: "", day: "", weekday: "" }; const parts = value.split("-").map(Number); const date = new Date(parts[0], parts[1] - 1, parts[2]); return { year: parts[0], month: parts[1], day: parts[2], weekday: ["日", "月", "火", "水", "木", "金", "土"][date.getDay()] }; }
    function formatJapaneseDate(value) { const parts = parseDateParts(value); return parts.year ? "令和" + (parts.year - 2018) + "年" + parts.month + "月" + parts.day + "日（" + parts.weekday + "）" : "令和　年　月　日"; }
    function fileName(extension) { const d = new Date(); const y = d.getFullYear(); const m = String(d.getMonth() + 1).padStart(2, "0"); const day = String(d.getDate()).padStart(2, "0"); return "発注書兼納品書_" + y + m + day + "." + extension; }
    function downloadBlob(blob, name) { const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(url), 1000); }
    function escapeHtml(value) { return String(value).replace(/[&<>'"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[char])); }

    updateSummary();
  </script>
</body>
</html>
