<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>発注書Excel作成</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js" onerror="window.xlsxLoadError = true"></script>
  <script>
    if (!window.XLSX) {
      document.write('<script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
    if (!window.XLSX) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
    if (!window.XLSX) {
      document.write('<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: #fff7ed;
      color: #1f2937;
      line-height: 1.7;
    }

    header {
      padding: 20px 16px 12px;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: #fff;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.95;
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px;
    }

    section {
      background: #fff;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(154, 52, 18, 0.08);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .note {
      margin: 0 0 12px;
      color: #667085;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }

    .green {
      background: #16a34a;
    }

    .gray {
      background: #64748b;
    }

    .red {
      background: #dc2626;
    }

    .status {
      min-height: 1.8em;
      margin: 10px 0 0;
      color: #475569;
      font-weight: 700;
      font-size: 14px;
    }

    .document-fields {
      display: grid;
      grid-template-columns: 90px 1fr 90px 1fr 90px 1fr;
      gap: 8px;
      align-items: center;
      margin: 12px 0;
      padding: 12px;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      background: #fffdf8;
    }

    label {
      display: block;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      background: #fffdf8;
    }

    .table-wrap {
      overflow-x: auto;
      text-align: center;
    }

    table {
      width: 100%;
      min-width: 680px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid #ffedd5;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #ffedd5;
      color: #7c2d12;
      white-space: nowrap;
    }

    .manual-table input {
      min-width: 110px;
    }

    .preview-sheet {
      width: 794px;
      min-width: 794px;
      margin: 0 auto;
      table-layout: fixed;
      border: 2px solid #111827;
      font-size: 12px;
      line-height: 1.25;
    }

    .preview-sheet th,
    .preview-sheet td {
      border: 1px solid #111827;
      padding: 2px 3px;
      text-align: center;
      height: 24px;
      overflow-wrap: anywhere;
    }

    .preview-sheet .ingredient-row th,
    .preview-sheet .ingredient-row td {
      height: 20px;
    }

    .preview-sheet th:nth-child(1),
    .preview-sheet td:nth-child(1) {
      width: 56px;
    }

    .preview-sheet th:nth-child(2),
    .preview-sheet td:nth-child(2) {
      width: 150px;
    }

    .preview-sheet th:nth-child(3),
    .preview-sheet td:nth-child(3) {
      width: 70px;
    }

    .preview-sheet th:nth-child(4),
    .preview-sheet td:nth-child(4) {
      width: 52px;
    }

    .preview-sheet th:nth-child(5),
    .preview-sheet td:nth-child(5) {
      width: 132px;
    }

    .preview-sheet th:nth-child(6),
    .preview-sheet td:nth-child(6) {
      width: 64px;
    }

    .preview-sheet th:nth-child(7),
    .preview-sheet td:nth-child(7) {
      width: 48px;
    }

    .preview-sheet th:nth-child(8),
    .preview-sheet td:nth-child(8),
    .preview-sheet th:nth-child(9),
    .preview-sheet td:nth-child(9),
    .preview-sheet th:nth-child(10),
    .preview-sheet td:nth-child(10) {
      width: 74px;
    }

    .preview-sheet .title-row td,
    .preview-sheet .sub-title-row td {
      border: 0;
      font-weight: 700;
      text-align: center;
    }

    .preview-sheet .title-row td {
      font-size: 18px;
      height: 30px;
    }

    .preview-sheet .left {
      text-align: left;
    }

    .preview-sheet .date-input {
      background: #fce5cd;
    }

    .preview-sheet .blank td {
      border: 0;
      height: 8px;
      padding: 0;
    }

    .preview-sheet .total-label {
      font-weight: 700;
    }

    @media (max-width: 760px) {
      main {
        padding: 12px;
      }

      .document-fields {
        grid-template-columns: 1fr;
      }

      .manual-table,
      .manual-table thead,
      .manual-table tbody,
      .manual-table tr,
      .manual-table td {
        display: block;
        width: 100%;
        min-width: 0;
      }

      .manual-table thead {
        display: none;
      }

      .manual-table tr {
        border: 1px solid #ffedd5;
        border-radius: 12px;
        margin-bottom: 10px;
        padding: 10px;
      }

      .manual-table td {
        border: 0;
        padding: 6px 0;
      }

      .manual-table td::before {
        content: attr(data-label);
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #667085;
        margin-bottom: 3px;
      }
    }

    @media print {
      body {
        background: #fff;
        color: #000;
      }

      header,
      section:first-child,
      .buttons,
      .status,
      .note {
        display: none !important;
      }

      main,
      section {
        max-width: none;
        margin: 0;
        padding: 0;
        border: 0;
        box-shadow: none;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>発注書Excel作成</h1>
    <p>手入力した材料名・数量・単位を、発注書レイアウトに反映してExcel出力します。</p>
  </header>

  <main>
    <section>
      <h2>1. 手入力テーブル</h2>
      <p class="note">材料名・数量・単位を入力してください。Excelボタンは常に押せます。</p>

      <div class="document-fields" aria-label="発注書情報">
        <label for="deliveryDate">納品日</label>
        <input id="deliveryDate" type="date">
        <label for="useDate">使用日</label>
        <input id="useDate" type="date">
        <label for="checkerName">検品者</label>
        <input id="checkerName" type="text" placeholder="検品者名">
      </div>

      <div class="table-wrap">
        <table class="manual-table" aria-label="手入力テーブル">
          <thead>
            <tr>
              <th>材料名</th>
              <th>数量</th>
              <th>単位</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="manualRows"></tbody>
        </table>
      </div>

      <div class="buttons">
        <button class="gray" type="button" id="addBtn">＋ 行を追加</button>
        <button class="green" type="button" id="excelBtn">Excel出力</button>
        <button class="red" type="button" id="clearBtn">入力を消す</button>
      </div>
      <p id="notice" class="status"></p>
    </section>

    <section>
      <h2>2. 発注書レイアウト</h2>
      <p class="note">入力内容は下の発注書レイアウトに自動反映されます。</p>
      <div class="table-wrap" id="orderPreview"></div>
    </section>
  </main>

  <script>
    const manualRows = document.getElementById("manualRows");
    const orderPreview = document.getElementById("orderPreview");
    const addBtn = document.getElementById("addBtn");
    const excelBtn = document.getElementById("excelBtn");
    const clearBtn = document.getElementById("clearBtn");
    const deliveryDate = document.getElementById("deliveryDate");
    const useDate = document.getElementById("useDate");
    const checkerName = document.getElementById("checkerName");
    const notice = document.getElementById("notice");

    const orderSheetHeaders = ["チェック", "材料名", "総使用量", "単位", "摘要", "納品数", "単位", "単価", "金額", "産地"];
    const orderSheetDetailRows = 30;
    let rows = [createBlankRow(), createBlankRow(), createBlankRow(), createBlankRow(), createBlankRow()];

    addBtn.addEventListener("click", () => {
      syncRows();
      rows.push(createBlankRow());
      renderManualTable();
      renderOrderPreview();
      focusLastNameInput();
    });

    excelBtn.addEventListener("click", downloadExcel);

    clearBtn.addEventListener("click", () => {
      rows = [createBlankRow(), createBlankRow(), createBlankRow(), createBlankRow(), createBlankRow()];
      deliveryDate.value = "";
      useDate.value = "";
      checkerName.value = "";
      notice.textContent = "入力を消しました。";
      renderManualTable();
      renderOrderPreview();
    });

    [deliveryDate, useDate, checkerName].forEach(input => {
      input.addEventListener("input", renderOrderPreview);
    });

    renderManualTable();
    renderOrderPreview();

    function createBlankRow() {
      return { name: "", quantity: "", unit: "" };
    }

    function renderManualTable() {
      manualRows.innerHTML = rows.map((row, index) => {
        return "<tr>" +
          '<td data-label="材料名"><input data-index="' + index + '" data-field="name" type="text" value="' + escapeHtml(row.name) + '" placeholder="例：にんじん"></td>' +
          '<td data-label="数量"><input data-index="' + index + '" data-field="quantity" type="number" step="0.001" min="0" value="' + escapeHtml(row.quantity) + '" placeholder="例：2"></td>' +
          '<td data-label="単位"><input data-index="' + index + '" data-field="unit" type="text" value="' + escapeHtml(row.unit) + '" placeholder="例：kg"></td>' +
          '<td data-label="操作"><button class="red" type="button" data-delete="' + index + '">削除</button></td>' +
        "</tr>";
      }).join("");

      manualRows.querySelectorAll("input").forEach(input => input.addEventListener("input", () => {
        syncRows();
        renderOrderPreview();
      }));
      manualRows.querySelectorAll("[data-delete]").forEach(button => button.addEventListener("click", () => deleteRow(Number(button.dataset.delete))));
    }

    function focusLastNameInput() {
      const inputs = manualRows.querySelectorAll('input[data-field="name"]');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }

    function deleteRow(index) {
      syncRows();
      rows.splice(index, 1);
      if (rows.length === 0) rows.push(createBlankRow());
      renderManualTable();
      renderOrderPreview();
    }

    function syncRows() {
      const nextRows = rows.map(row => ({ ...row }));
      manualRows.querySelectorAll("input[data-index]").forEach(input => {
        const index = Number(input.dataset.index);
        const field = input.dataset.field;
        if (nextRows[index]) nextRows[index][field] = input.value;
      });
      rows = nextRows;
    }

    function getExportRows() {
      syncRows();
      return rows
        .filter(row => String(row.name || "").trim() || String(row.quantity || "").trim() || String(row.unit || "").trim())
        .map(row => {
          const quantity = numberValue(row.quantity);
          return [
            "□",
            String(row.name || "").trim(),
            quantity || "",
            String(row.unit || "").trim(),
            "手入力",
            quantity || "",
            String(row.unit || "").trim(),
            "",
            "",
            ""
          ];
        });
    }

    function renderOrderPreview() {
      const exportRows = getExportRows();
      const detailRows = paddedOrderRows(exportRows, 10);
      const use = parseDateParts(useDate.value);
      const totals = calculateExportTotals(exportRows);

      orderPreview.innerHTML = '<table class="preview-sheet">' +
        '<tbody>' +
          '<tr class="title-row"><td colspan="10">発　注　書　兼　納　品　書</td></tr>' +
          '<tr class="sub-title-row"><td colspan="10">スクルドエンジェル</td></tr>' +
          '<tr class="sub-title-row"><td colspan="10">たかばり　園</td></tr>' +
          '<tr class="blank"><td colspan="10"></td></tr>' +
          '<tr><td>納品日</td><td class="date-input" colspan="4">' + escapeHtml(formatJapaneseDate(deliveryDate.value)) + '</td><td>使用日</td><td>' + escapeHtml(use.month || "") + '</td><td>月</td><td>' + escapeHtml(use.day || "") + '</td><td>日</td></tr>' +
          '<tr class="blank"><td colspan="10"></td></tr>' +
          '<tr class="ingredient-row">' + orderSheetHeaders.map(header => '<th>' + escapeHtml(header) + '</th>').join("") + '</tr>' +
          detailRows.map(row => '<tr class="ingredient-row">' + row.map((cell, index) => '<td class="' + (index === 1 || index === 4 ? 'left' : '') + '">' + escapeHtml(cell) + '</td>').join("") + '</tr>').join("") +
          '<tr class="blank"><td colspan="10"></td></tr>' +
          '<tr><td colspan="6"></td><td class="total-label" colspan="2">合計金額</td><td>' + escapeHtml(totals.total || "") + '</td><td></td></tr>' +
          '<tr><td colspan="6"></td><td class="total-label" colspan="2">消費税 課税合計</td><td>' + escapeHtml(totals.tax || "") + '</td><td></td></tr>' +
          '<tr><td colspan="2"></td><td class="total-label" colspan="2">検品者</td><td colspan="2"></td><td class="total-label" colspan="2">請求金額</td><td>' + escapeHtml(totals.billed || "") + '</td><td></td></tr>' +
          '<tr><td colspan="2"></td><td colspan="2">' + escapeHtml(checkerName.value || "") + '</td><td colspan="6"></td></tr>' +
        '</tbody>' +
      '</table>';
    }

    function downloadExcel() {
      const exportRows = getExportRows();
      if (!isXlsxReady()) {
        notice.textContent = "Excel作成ライブラリを読み込めませんでした。ネット接続を確認してから、もう一度押してください。";
        return;
      }

      try {
        const worksheet = XLSX.utils.aoa_to_sheet(buildExportDocument(exportRows));
        setupExcelWorksheet(worksheet, exportRows.length);

        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "発注書");
        XLSX.writeFile(workbook, makeExportFileName("xlsx"), { bookType: "xlsx", type: "binary" });
        notice.textContent = exportRows.length ? "Excelを出力しました。" : "空の発注書Excelを出力しました。";
      } catch (error) {
        notice.textContent = "Excelの作成に失敗しました。もう一度押してください。";
        console.error("Excel作成エラー", error);
      }
    }

    function buildExportDocument(exportRows) {
      const totals = calculateExportTotals(exportRows);
      const detailRows = paddedOrderRows(exportRows, getOrderSheetDetailRowCount(exportRows.length));
      const blank = Array(orderSheetHeaders.length).fill("");
      const use = parseDateParts(useDate.value);

      return [
        ["", "", "発　注　書　兼　納　品　書", "", "", "", "", "", "", ""],
        ["", "", "スクルドエンジェル", "", "", "", "", "", "", ""],
        ["", "", "たかばり　園", "", "", "", "", "", "", ""],
        blank,
        ["納品日", formatJapaneseDate(deliveryDate.value), "", "", "", "使用日", use.month || "", "月", use.day || "", "日"],
        blank,
        orderSheetHeaders,
        ...detailRows,
        blank,
        blank,
        ["", "", "", "", "", "", "", "", "", ""],
        ["", "", "", "", "", "", "合計金額", "", totals.total || "", ""],
        ["", "", "", "", "", "", "消費税 課税合計", "", totals.tax || "", ""],
        ["", "", "検品者", "", "", "", "請求金額", "", totals.billed || "", ""],
        ["", "", checkerName.value || "", "", "", "", "", "", "", ""]
      ];
    }

    function paddedOrderRows(exportRows, detailRowCount) {
      const padded = exportRows.slice();
      while (padded.length < detailRowCount) padded.push(Array(orderSheetHeaders.length).fill(""));
      return padded;
    }

    function calculateExportTotals(exportRows) {
      const total = exportRows.reduce((sum, row) => sum + numberValue(row[8]), 0);
      const tax = Math.floor(total * 0.1);
      return { total: round(total), tax, billed: round(total + tax) };
    }

    function getOrderSheetDetailRowCount(dataLength) {
      return Math.max(orderSheetDetailRows, dataLength);
    }

    function getOrderSheetLayout(dataLength) {
      const detailRowCount = getOrderSheetDetailRowCount(dataLength);
      return {
        detailRowCount,
        totalRows: detailRowCount + 14,
        detailStart: 7,
        detailEnd: detailRowCount + 6,
        totalStart: detailRowCount + 10,
        totalEnd: detailRowCount + 12,
        checkerStart: detailRowCount + 12,
        checkerEnd: detailRowCount + 13
      };
    }

    function setupExcelWorksheet(worksheet, dataLength) {
      const layout = getOrderSheetLayout(dataLength);
      worksheet["!cols"] = [
        { wch: 5.8 }, { wch: 17.5 }, { wch: 8 }, { wch: 5.5 }, { wch: 15.5 },
        { wch: 7 }, { wch: 5 }, { wch: 7 }, { wch: 8.5 }, { wch: 8.5 }
      ];
      worksheet["!rows"] = Array.from({ length: layout.totalRows }, (_, row) => ({ hpt: orderSheetRowHeight(row, layout) }));
      worksheet["!merges"] = [
        { s: { r: 0, c: 2 }, e: { r: 0, c: 7 } },
        { s: { r: 1, c: 2 }, e: { r: 1, c: 7 } },
        { s: { r: 2, c: 2 }, e: { r: 2, c: 7 } },
        { s: { r: 4, c: 1 }, e: { r: 4, c: 4 } },
        { s: { r: layout.totalStart, c: 6 }, e: { r: layout.totalStart, c: 7 } },
        { s: { r: layout.totalStart + 1, c: 6 }, e: { r: layout.totalStart + 1, c: 7 } },
        { s: { r: layout.totalStart + 2, c: 6 }, e: { r: layout.totalStart + 2, c: 7 } },
        { s: { r: layout.checkerStart, c: 2 }, e: { r: layout.checkerStart, c: 3 } },
        { s: { r: layout.checkerEnd, c: 2 }, e: { r: layout.checkerEnd, c: 3 } }
      ];
      worksheet["!margins"] = { left: 0.12, right: 0.12, top: 0, bottom: 0.25, header: 0, footer: 0.1 };
      worksheet["!pageSetup"] = { orientation: "landscape", paperSize: 9, fitToWidth: 1, fitToHeight: 1 };
      worksheet["!printOptions"] = { gridLines: false, horizontalCentered: true };
      worksheet["!ref"] = "A1:J" + layout.totalRows;

      const range = XLSX.utils.decode_range(worksheet["!ref"]);
      for (let row = range.s.r; row <= range.e.r; row++) {
        for (let col = range.s.c; col <= range.e.c; col++) {
          const address = XLSX.utils.encode_cell({ r: row, c: col });
          if (!worksheet[address]) worksheet[address] = { t: "s", v: "" };
          worksheet[address].s = excelCellStyle(row, col, layout);
        }
      }
    }

    function orderSheetRowHeight(row, layout) {
      if (row === 0) return 22;
      if (row === 1 || row === 2) return 15;
      if (row === 4) return 18;
      if (row === 6) return 20;
      if (row >= layout.detailStart && row <= layout.detailEnd) return 20;
      if (row >= layout.totalStart) return 17;
      return 7;
    }

    function excelCellStyle(row, col, layout) {
      const thinBorder = { style: "thin", color: { rgb: "000000" } };
      const mediumBorder = { style: "medium", color: { rgb: "000000" } };
      const isTitle = row === 0;
      const isSubTitle = row === 1 || row === 2;
      const isDateInput = row === 4 && col >= 1 && col <= 4;
      const isDateLabel = row === 4 && (col === 0 || col === 5 || col === 7 || col === 9);
      const isHeader = row === 6;
      const isCheckerBox = row >= layout.checkerStart && row <= layout.checkerEnd && col >= 2 && col <= 3;
      const isTotalBox = row >= layout.totalStart && row <= layout.totalEnd && col >= 6 && col <= 9;

      return {
        font: {
          name: "Yu Gothic",
          sz: isTitle ? 15 : (isSubTitle ? 9 : 8),
          bold: isTitle || isSubTitle || isHeader || isDateLabel || isCheckerBox || (isTotalBox && col <= 7)
        },
        alignment: {
          horizontal: isTitle || isSubTitle || isDateLabel || isHeader || isCheckerBox || isTotalBox ? "center" : (col === 1 || col === 4 ? "left" : "center"),
          vertical: "center",
          wrapText: true
        },
        border: borderForOrderSheetCell(row, col, layout, thinBorder, mediumBorder),
        fill: isDateInput ? { patternType: "solid", fgColor: { rgb: "F4CCCC" } } : undefined
      };
    }

    function borderForOrderSheetCell(row, col, layout, thinBorder, mediumBorder) {
      const isTable = row >= 6 && row <= layout.detailEnd;
      const isCheckerBox = row >= layout.checkerStart && row <= layout.checkerEnd && col >= 2 && col <= 3;
      const isTotalBox = row >= layout.totalStart && row <= layout.totalEnd && col >= 6 && col <= 9;
      const hasBorder = isTable || isCheckerBox || isTotalBox;
      if (!hasBorder) return undefined;

      const border = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
      if (isTable) {
        if (row === 6) border.top = mediumBorder;
        if (row === layout.detailEnd) border.bottom = mediumBorder;
        if (col === 0) border.left = mediumBorder;
        if (col === 9) border.right = mediumBorder;
      }
      if (isCheckerBox || isTotalBox) {
        const firstRow = isCheckerBox ? layout.checkerStart : layout.totalStart;
        const lastRow = isCheckerBox ? layout.checkerEnd : layout.totalEnd;
        const firstCol = isCheckerBox ? 2 : 6;
        const lastCol = isCheckerBox ? 3 : 9;
        if (row === firstRow) border.top = mediumBorder;
        if (row === lastRow) border.bottom = mediumBorder;
        if (col === firstCol) border.left = mediumBorder;
        if (col === lastCol) border.right = mediumBorder;
      }
      return border;
    }

    function isXlsxReady() {
      return Boolean(window.XLSX && XLSX.utils && typeof XLSX.utils.aoa_to_sheet === "function" && typeof XLSX.utils.book_new === "function" && typeof XLSX.utils.book_append_sheet === "function" && typeof XLSX.writeFile === "function");
    }

    function makeExportFileName(extension) {
      return "発注書兼納品書_" + formatDate(new Date()) + "." + extension;
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return year + month + day;
    }

    function formatJapaneseDate(value) {
      if (!value) return "";
      const date = new Date(value + "T00:00:00");
      if (Number.isNaN(date.getTime())) return value;
      return date.getFullYear() + "年" + (date.getMonth() + 1) + "月" + date.getDate() + "日";
    }

    function parseDateParts(value) {
      if (!value) return { month: "", day: "" };
      const date = new Date(value + "T00:00:00");
      if (Number.isNaN(date.getTime())) return { month: "", day: "" };
      return { month: date.getMonth() + 1, day: date.getDate() };
    }

    function numberValue(value) {
      const normalized = String(value ?? "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/．/g, ".")
        .replace(/,/g, "");
      const match = normalized.match(/-?[0-9]+(?:\.[0-9]+)?/);
      return match ? Number(match[0]) : 0;
    }

    function round(value) {
      return Math.round(value * 1000) / 1000;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
    }
  </script>
</body>
