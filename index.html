<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>発注書兼納品書 Excel出力</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script>
    if (!window.XLSX) {
      document.write('<script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"><\/script>');
    }
  </script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f3f4f6;
      color: #111827;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1200px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .panel {
      margin-bottom: 18px;
      padding: 18px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    h1, h2 { margin: 0 0 12px; }
    h1 { font-size: 24px; text-align: center; letter-spacing: 0.12em; }
    h2 { font-size: 17px; }

    .form-grid {
      display: grid;
      grid-template-columns: 120px 1fr 120px 1fr 120px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    label { font-weight: 700; }

    input {
      width: 100%;
      min-height: 38px;
      padding: 6px 8px;
      border: 1px solid #9ca3af;
      border-radius: 8px;
      font: inherit;
      background: #fff;
    }

    .table-wrap { overflow-x: auto; }

    table { border-collapse: collapse; width: 100%; }

    .input-table { min-width: 1120px; }
    .input-table th, .input-table td {
      border: 1px solid #d1d5db;
      padding: 4px;
      font-size: 13px;
      vertical-align: middle;
    }
    .input-table th { background: #e5e7eb; text-align: center; white-space: nowrap; }
    .input-table input { min-height: 32px; border-radius: 4px; }
    .input-table input[type="checkbox"] { min-height: 18px; width: 18px; display: block; margin: 0 auto; }
    .input-table .name-col { min-width: 220px; }
    .input-table .note-col { min-width: 180px; }
    .input-table .num { text-align: right; }
    .input-table .center { text-align: center; }

    .buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    button {
      min-height: 42px;
      padding: 8px 18px;
      border: 0;
      border-radius: 999px;
      background: #2563eb;
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .clear { background: #6b7280; }
    .status { min-height: 24px; margin: 10px 0 0; font-weight: 700; color: #1f2937; }

    .sheet {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 10mm;
      background: #fff;
      border: 1px solid #9ca3af;
      font-size: 10px;
    }

    .sheet-title {
      margin: 0 0 8px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .sheet-info {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
      align-items: end;
      font-size: 12px;
      font-weight: 700;
    }

    .sheet-info .line {
      display: inline-block;
      min-width: 110px;
      padding: 0 6px 2px;
      border-bottom: 1px solid #111827;
      font-weight: 400;
      text-align: center;
    }

    .order-sheet { table-layout: fixed; width: 100%; }
    .order-sheet th, .order-sheet td {
      height: 21px;
      border: 1px solid #111827;
      padding: 1px 4px;
      vertical-align: middle;
      overflow: hidden;
    }
    .order-sheet th { background: #e5e7eb; text-align: center; font-weight: 800; }
    .order-sheet td { text-align: center; }
    .order-sheet .left { text-align: left; }
    .order-sheet .num { text-align: right; }

    .w-check { width: 9%; }
    .w-name { width: 24%; }
    .w-total { width: 10%; }
    .w-unit1 { width: 7%; }
    .w-note { width: 14%; }
    .w-delivery { width: 9%; }
    .w-unit2 { width: 7%; }
    .w-price { width: 8%; }
    .w-amount { width: 9%; }
    .w-origin { width: 9%; }

    .bottom-area {
      display: grid;
      grid-template-columns: 1fr 78mm;
      gap: 8px;
      margin-top: 8px;
      align-items: start;
    }

    .checker-box, .totals-table { width: 100%; }
    .checker-box td, .totals-table td {
      height: 24px;
      border: 1px solid #111827;
      padding: 2px 6px;
      font-size: 11px;
    }
    .checker-box .label, .totals-table .label { background: #e5e7eb; font-weight: 800; text-align: center; }
    .totals-table .money { text-align: right; }

    @media (max-width: 900px) {
      main { padding: 10px; }
      .form-grid { grid-template-columns: 1fr; }
      .sheet { width: 100%; min-height: auto; padding: 8px; }
      .bottom-area { grid-template-columns: 1fr; }
    }

    @page { size: A4 portrait; margin: 10mm; }
    @media print {
      body { background: #fff; }
      main { width: auto; padding: 0; }
      .panel:first-child { display: none; }
      .panel { margin: 0; padding: 0; border: 0; box-shadow: none; }
      h2 { display: none; }
      .sheet { width: 190mm; min-height: 277mm; padding: 0; border: 0; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>発注書兼納品書</h1>
      <div class="form-grid">
        <label for="deliveryDate">納品日</label>
        <input id="deliveryDate" type="date">
        <label for="useDate">使用日</label>
        <input id="useDate" type="date">
        <label for="checkerName">検品者</label>
        <input id="checkerName" type="text" autocomplete="off">
      </div>

      <div class="table-wrap">
        <table class="input-table" aria-label="入力表">
          <thead>
            <tr>
              <th>チェック</th>
              <th class="name-col">材料名</th>
              <th>総使用量</th>
              <th>単位</th>
              <th class="note-col">摘要</th>
              <th>納品数</th>
              <th>単位</th>
              <th>単価</th>
              <th>金額</th>
              <th>産地</th>
            </tr>
          </thead>
          <tbody id="inputRows"></tbody>
        </table>
      </div>

      <div class="buttons">
        <button type="button" id="excelBtn">Excel（.xlsx）で出力</button>
        <button type="button" id="clearBtn" class="clear">入力を消す</button>
      </div>
      <p id="status" class="status" role="status"></p>
    </section>

    <section class="panel">
      <h2>印刷プレビュー</h2>
      <div class="sheet" id="printSheet"></div>
    </section>
  </main>

  <script>
    const DETAIL_ROW_COUNT = 30;
    const TAX_RATE = 0.1;
    const SCHOOL_NAME = "スクルドエンジェルたかばり";
    const headers = ["チェック", "材料名", "総使用量", "単位", "摘要", "納品数", "単位", "単価", "金額", "産地"];
    const fields = ["checked", "name", "totalQty", "totalUnit", "note", "deliveryQty", "deliveryUnit", "unitPrice", "amount", "origin"];
    const numericFields = new Set(["totalQty", "deliveryQty", "unitPrice", "amount"]);

    const inputRows = document.getElementById("inputRows");
    const printSheet = document.getElementById("printSheet");
    const deliveryDate = document.getElementById("deliveryDate");
    const useDate = document.getElementById("useDate");
    const checkerName = document.getElementById("checkerName");
    const excelBtn = document.getElementById("excelBtn");
    const clearBtn = document.getElementById("clearBtn");
    const status = document.getElementById("status");

    let rows = Array.from({ length: DETAIL_ROW_COUNT }, createBlankRow);

    renderInputTable();
    renderSheet();

    [deliveryDate, useDate, checkerName].forEach(element => element.addEventListener("input", renderSheet));
    excelBtn.addEventListener("click", downloadExcel);
    clearBtn.addEventListener("click", () => {
      rows = Array.from({ length: DETAIL_ROW_COUNT }, createBlankRow);
      deliveryDate.value = "";
      useDate.value = "";
      checkerName.value = "";
      renderInputTable();
      renderSheet();
      status.textContent = "入力を消しました。";
    });

    function createBlankRow() {
      return { checked: false, name: "", totalQty: "", totalUnit: "", note: "", deliveryQty: "", deliveryUnit: "", unitPrice: "", amount: "", origin: "" };
    }

    function renderInputTable() {
      inputRows.innerHTML = rows.map((row, rowIndex) => {
        return "<tr>" + fields.map(field => {
          if (field === "checked") {
            return '<td><input type="checkbox" data-row="' + rowIndex + '" data-field="checked"' + (row.checked ? " checked" : "") + '></td>';
          }
          const className = numericFields.has(field) ? "num" : (field.includes("Unit") || field === "origin" ? "center" : "");
          const type = numericFields.has(field) ? "text" : "text";
          return '<td><input class="' + className + '" type="' + type + '" data-row="' + rowIndex + '" data-field="' + field + '" value="' + escapeHtml(row[field]) + '"></td>';
        }).join("") + "</tr>";
      }).join("");

      inputRows.querySelectorAll("input").forEach(input => input.addEventListener("input", () => {
        syncRows();
        renderSheet();
      }));
      inputRows.querySelectorAll('input[type="checkbox"]').forEach(input => input.addEventListener("change", () => {
        syncRows();
        renderSheet();
      }));
    }

    function syncRows() {
      inputRows.querySelectorAll("input[data-row]").forEach(input => {
        const rowIndex = Number(input.dataset.row);
        const field = input.dataset.field;
        rows[rowIndex][field] = input.type === "checkbox" ? input.checked : input.value;
      });
      rows.forEach(row => {
        if (!String(row.amount).trim()) {
          const deliveryQty = toNumber(row.deliveryQty);
          const unitPrice = toNumber(row.unitPrice);
          row.calculatedAmount = deliveryQty && unitPrice ? Math.floor(deliveryQty * unitPrice) : "";
        } else {
          row.calculatedAmount = toNumber(row.amount);
        }
      });
    }

    function renderSheet() {
      syncRowsIfReady();
      const totals = calculateTotals();
      printSheet.innerHTML =
        '<div class="sheet-title">発注書兼納品書</div>' +
        '<div class="sheet-info">' +
          '<div>園名：<span class="line">' + escapeHtml(SCHOOL_NAME) + '</span></div>' +
          '<div>納品日：<span class="line">' + escapeHtml(formatDateJa(deliveryDate.value)) + '</span></div>' +
          '<div>使用日：<span class="line">' + escapeHtml(formatDateJa(useDate.value)) + '</span></div>' +
        '</div>' +
        '<table class="order-sheet" aria-label="発注書兼納品書">' +
          '<colgroup>' +
            '<col class="w-check"><col class="w-name"><col class="w-total"><col class="w-unit1"><col class="w-note">' +
            '<col class="w-delivery"><col class="w-unit2"><col class="w-price"><col class="w-amount"><col class="w-origin">' +
          '</colgroup>' +
          '<thead><tr>' + headers.map(header => '<th>' + escapeHtml(header) + '</th>').join("") + '</tr></thead>' +
          '<tbody>' + rows.map(row => rowHtml(row)).join("") + '</tbody>' +
        '</table>' +
        '<div class="bottom-area">' +
          '<table class="checker-box"><tr><td class="label">検品者</td><td>' + escapeHtml(checkerName.value) + '</td></tr></table>' +
          '<table class="totals-table">' +
            '<tr><td class="label">合計金額</td><td class="money">' + formatYen(totals.subtotal) + '</td></tr>' +
            '<tr><td class="label">消費税（端数切捨）</td><td class="money">' + formatYen(totals.tax) + '</td></tr>' +
            '<tr><td class="label">請求金額</td><td class="money">' + formatYen(totals.total) + '</td></tr>' +
          '</table>' +
        '</div>';
    }

    function rowHtml(row) {
      const amount = getRowAmount(row);
      const cells = [
        row.checked ? "✓" : "□",
        row.name,
        row.totalQty,
        row.totalUnit,
        row.note,
        row.deliveryQty,
        row.deliveryUnit,
        row.unitPrice,
        amount ? formatPlainNumber(amount) : "",
        row.origin
      ];
      return "<tr>" + cells.map((cell, index) => {
        const className = index === 1 || index === 4 ? "left" : ([2, 5, 7, 8].includes(index) ? "num" : "");
        return '<td class="' + className + '">' + escapeHtml(cell) + '</td>';
      }).join("") + "</tr>";
    }

    function syncRowsIfReady() {
      if (inputRows.children.length) syncRows();
    }

    function calculateTotals() {
      const subtotal = rows.reduce((sum, row) => sum + getRowAmount(row), 0);
      const tax = Math.floor(subtotal * TAX_RATE);
      return { subtotal, tax, total: subtotal + tax };
    }

    function getRowAmount(row) {
      if (String(row.amount || "").trim()) return toNumber(row.amount);
      const deliveryQty = toNumber(row.deliveryQty);
      const unitPrice = toNumber(row.unitPrice);
      return deliveryQty && unitPrice ? Math.floor(deliveryQty * unitPrice) : 0;
    }

    function downloadExcel() {
      syncRows();
      if (!window.XLSX || !XLSX.utils || typeof XLSX.writeFile !== "function") {
        status.textContent = "Excel出力に必要な読み込みができませんでした。ネット接続後に再度お試しください。";
        return;
      }

      const worksheet = XLSX.utils.aoa_to_sheet(buildSheetData());
      setupWorksheet(worksheet);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "発注書兼納品書");
      XLSX.writeFile(workbook, "発注書兼納品書_" + fileDate() + ".xlsx");
      status.textContent = "Excel（.xlsx）を出力しました。";
    }

    function buildSheetData() {
      const totals = calculateTotals();
      const blank = Array(headers.length).fill("");
      return [
        ["発注書兼納品書", "", "", "", "", "", "", "", "", ""],
        ["園名", SCHOOL_NAME, "", "", "納品日", formatDateJa(deliveryDate.value), "", "使用日", formatDateJa(useDate.value), ""],
        blank,
        headers,
        ...rows.map(row => [
          row.checked ? "✓" : "□",
          row.name,
          valueOrNumber(row.totalQty),
          row.totalUnit,
          row.note,
          valueOrNumber(row.deliveryQty),
          row.deliveryUnit,
          valueOrNumber(row.unitPrice),
          getRowAmount(row) || "",
          row.origin
        ]),
        blank,
        ["", "", "", "", "", "", "合計金額", "", totals.subtotal || "", ""],
        ["", "", "", "", "", "", "消費税（端数切捨）", "", totals.tax || "", ""],
        ["検品者", checkerName.value, "", "", "", "", "請求金額", "", totals.total || "", ""]
      ];
    }

    function setupWorksheet(worksheet) {
      const totalRowCount = 4 + DETAIL_ROW_COUNT + 4;
      worksheet["!ref"] = "A1:J" + totalRowCount;
      worksheet["!cols"] = [
        { wch: 8 }, { wch: 24 }, { wch: 10 }, { wch: 7 }, { wch: 16 },
        { wch: 9 }, { wch: 7 }, { wch: 9 }, { wch: 10 }, { wch: 10 }
      ];
      worksheet["!rows"] = Array.from({ length: totalRowCount }, (_, index) => ({ hpt: index >= 3 && index <= 33 ? 21 : 20 }));
      worksheet["!merges"] = [
        { s: { r: 0, c: 0 }, e: { r: 0, c: 9 } },
        { s: { r: 1, c: 1 }, e: { r: 1, c: 3 } },
        { s: { r: 1, c: 5 }, e: { r: 1, c: 6 } },
        { s: { r: 1, c: 8 }, e: { r: 1, c: 9 } },
        { s: { r: 35, c: 6 }, e: { r: 35, c: 7 } },
        { s: { r: 36, c: 6 }, e: { r: 36, c: 7 } },
        { s: { r: 37, c: 6 }, e: { r: 37, c: 7 } },
        { s: { r: 37, c: 1 }, e: { r: 37, c: 3 } }
      ];
      worksheet["!margins"] = { left: 0.39, right: 0.39, top: 0.39, bottom: 0.39, header: 0.12, footer: 0.12 };
      worksheet["!pageSetup"] = { orientation: "portrait", paperSize: 9, fitToWidth: 1, fitToHeight: 1 };
      worksheet["!printOptions"] = { gridLines: false, horizontalCentered: true };

      const range = XLSX.utils.decode_range(worksheet["!ref"]);
      for (let r = range.s.r; r <= range.e.r; r++) {
        for (let c = range.s.c; c <= range.e.c; c++) {
          const address = XLSX.utils.encode_cell({ r, c });
          if (!worksheet[address]) worksheet[address] = { t: "s", v: "" };
          worksheet[address].s = cellStyle(r, c);
        }
      }
    }

    function cellStyle(row, col) {
      const thin = { style: "thin", color: { rgb: "000000" } };
      const isTitle = row === 0;
      const isInfo = row === 1;
      const isHeader = row === 3;
      const isDetail = row >= 3 && row <= 33;
      const isBottom = row >= 35 && row <= 37;
      const isNumeric = [2, 5, 7, 8].includes(col);
      const isLeft = [1, 4].includes(col);
      return {
        font: { name: "Yu Gothic", sz: isTitle ? 18 : 10, bold: isTitle || isInfo || isHeader || (isBottom && (col === 0 || col === 6 || col === 7)) },
        alignment: {
          horizontal: isTitle || isInfo || isHeader || (isBottom && col !== 8) ? "center" : (isNumeric ? "right" : (isLeft ? "left" : "center")),
          vertical: "center",
          wrapText: true
        },
        border: (isDetail || isBottom) ? { top: thin, bottom: thin, left: thin, right: thin } : undefined,
        fill: isHeader || (isBottom && (col === 0 || col === 6 || col === 7)) ? { patternType: "solid", fgColor: { rgb: "E5E7EB" } } : undefined
      };
    }

    function valueOrNumber(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      const number = toNumber(text);
      return Number.isFinite(number) && String(number) === text.replace(/,/g, "") ? number : text;
    }

    function toNumber(value) {
      const normalized = String(value ?? "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/．/g, ".")
        .replace(/,/g, "");
      const number = Number(normalized);
      return Number.isFinite(number) ? number : 0;
    }

    function formatDateJa(value) {
      if (!value) return "";
      const date = new Date(value + "T00:00:00");
      if (Number.isNaN(date.getTime())) return value;
      return date.getFullYear() + "年" + (date.getMonth() + 1) + "月" + date.getDate() + "日";
    }

    function formatYen(value) {
      return value ? "¥" + Math.floor(value).toLocaleString("ja-JP") : "";
    }

    function formatPlainNumber(value) {
      return Number(value).toLocaleString("ja-JP", { maximumFractionDigits: 3 });
    }

    function fileDate() {
      const date = new Date();
      return date.getFullYear() + String(date.getMonth() + 1).padStart(2, "0") + String(date.getDate()).padStart(2, "0");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
    }
  </script>
</body>
</html>
