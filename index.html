<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>発注書Excel作成</title>

  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js" onerror="window.pdfLoadError = true"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js" onerror="window.xlsxLoadError = true"></script>
  <script>
    if (!window.pdfjsLib) {
      document.write('<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js" onerror="window.pdfLoadError = true"><\/script>');
    }
    if (!window.XLSX) {
      document.write('<script src="https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
    if (!window.XLSX) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
    if (!window.XLSX) {
      document.write('<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.xlsxLoadError = true"><\/script>');
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: #fff7ed;
      color: #1f2937;
      line-height: 1.7;
    }

    header {
      padding: 20px 16px 12px;
      background: linear-gradient(135deg, #fb923c, #f97316);
      color: #fff;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.95;
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 16px;
    }

    section {
      background: #fff;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(154, 52, 18, 0.08);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .note {
      margin: 0 0 12px;
      color: #667085;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }

    .green {
      background: #16a34a;
    }

    .gray {
      background: #64748b;
    }

    .red {
      background: #dc2626;
    }

    .status {
      min-height: 1.8em;
      margin: 10px 0 0;
      color: #475569;
      font-weight: 700;
      font-size: 14px;
    }

    .import-progress {
      display: none;
      gap: 8px;
      align-items: center;
      margin: 10px 0 0;
    }

    .import-progress.is-active {
      display: flex;
    }

    .progress-track {
      flex: 1;
      height: 14px;
      overflow: hidden;
      border: 1px solid #fdba74;
      border-radius: 999px;
      background: #ffedd5;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #fb923c, #16a34a);
      transition: width 0.2s ease;
    }

    .progress-percent {
      min-width: 48px;
      color: #7c2d12;
      font-weight: 700;
      text-align: right;
    }

    .document-fields {
      display: grid;
      grid-template-columns: 90px 1fr 90px 1fr 90px 1fr;
      gap: 8px;
      align-items: center;
      margin: 12px 0;
      padding: 12px;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      background: #fffdf8;
    }

    label {
      display: block;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #fdba74;
      border-radius: 12px;
      padding: 10px;
      font: inherit;
      background: #fffdf8;
    }

    .pdf-box {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #ffedd5;
    }

    .pdf-textarea {
      min-height: 220px;
      resize: vertical;
      white-space: pre-wrap;
    }

    .table-wrap {
      overflow-x: auto;
      text-align: center;
    }

    table {
      width: 100%;
      min-width: 680px;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid #ffedd5;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #ffedd5;
      color: #7c2d12;
      white-space: nowrap;
    }

    .manual-table input {
      min-width: 110px;
    }

    .preview-sheet {
      width: 794px;
      min-width: 794px;
      margin: 0 auto 0 18px;
      table-layout: fixed;
      border: 2px solid #111827;
      font-size: 12px;
      line-height: 1.25;
    }

    .preview-sheet th,
    .preview-sheet td {
      border: 1px solid #111827;
      padding: 2px 3px;
      text-align: center;
      height: 24px;
      overflow-wrap: anywhere;
    }

    .preview-sheet .ingredient-row th,
    .preview-sheet .ingredient-row td {
      height: 20px;
    }

    .preview-sheet th:nth-child(1),
    .preview-sheet td:nth-child(1) {
      width: 56px;
    }

    .preview-sheet th:nth-child(2),
    .preview-sheet td:nth-child(2) {
      width: 150px;
    }

    .preview-sheet th:nth-child(3),
    .preview-sheet td:nth-child(3) {
      width: 70px;
    }

    .preview-sheet th:nth-child(4),
    .preview-sheet td:nth-child(4) {
      width: 52px;
    }

    .preview-sheet th:nth-child(5),
    .preview-sheet td:nth-child(5) {
      width: 102px;
    }

    .preview-sheet th:nth-child(6),
    .preview-sheet td:nth-child(6) {
      width: 64px;
    }

    .preview-sheet th:nth-child(7),
    .preview-sheet td:nth-child(7) {
      width: 48px;
    }

    .preview-sheet th:nth-child(8),
    .preview-sheet td:nth-child(8),
    .preview-sheet th:nth-child(9),
    .preview-sheet td:nth-child(9),
    .preview-sheet th:nth-child(10),
    .preview-sheet td:nth-child(10) {
      width: 74px;
    }

    .preview-sheet .title-row td,
    .preview-sheet .sub-title-row td {
      border: 0;
      font-weight: 700;
      text-align: center;
    }

    .preview-sheet .title-row td {
      font-size: 18px;
      height: 30px;
    }

    .preview-sheet .left {
      text-align: left;
    }

    .preview-sheet .date-row td {
      background: #fde2e8;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .preview-sheet .date-line {
      text-align: left;
      white-space: nowrap;
      overflow-wrap: normal;
      word-break: keep-all;
    }

    .preview-sheet .blank td {
      border: 0;
      height: 8px;
      padding: 0;
    }

    .preview-sheet .total-label {
      font-weight: 700;
    }

    .preview-sheet .total-amount {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      padding-right: 6px;
    }

    .preview-sheet .summary-row td {
      vertical-align: middle;
    }

    .preview-sheet .checker-label-row td {
      height: 7.714px;
      padding-top: 0;
      padding-bottom: 0;
      line-height: 1;
    }

    .preview-sheet .total-row td {
      height: 18px;
      padding-top: 0;
      padding-bottom: 0;
    }

    .preview-sheet .no-border {
      border: 0;
    }

    @media (max-width: 760px) {
      main {
        padding: 12px;
      }

      .document-fields {
        grid-template-columns: 1fr;
      }

      .manual-table,
      .manual-table thead,
      .manual-table tbody,
      .manual-table tr,
      .manual-table td {
        display: block;
        width: 100%;
        min-width: 0;
      }

      .manual-table thead {
        display: none;
      }

      .manual-table tr {
        border: 1px solid #ffedd5;
        border-radius: 12px;
        margin-bottom: 10px;
        padding: 10px;
      }

      .manual-table td {
        border: 0;
        padding: 6px 0;
      }

      .manual-table td::before {
        content: attr(data-label);
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #667085;
        margin-bottom: 3px;
      }
    }

    @media print {
      body {
        background: #fff;
        color: #000;
      }

      header,
      section:first-child,
      .buttons,
      .status,
      .note {
        display: none !important;
      }

      @page {
        size: A4 portrait;
        margin: 0.8cm 1cm 0.8cm 1.5cm;
      }

      main,
      section {
        max-width: none;
        margin: 0;
        padding: 0;
        border: 0;
        box-shadow: none;
      }

      .table-wrap {
        overflow: visible;
      }

      .preview-sheet {
        width: 100%;
        min-width: 0;
        margin-left: 0;
        margin-right: 0;
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>発注書Excel作成</h1>
    <p>取り込んだファイルや手入力の材料名・数量・単位を、発注書レイアウトに反映してExcel出力します。</p>
  </header>

  <main>
    <section>
      <h2>1. ファイル読み込み（任意）</h2>
      <div class="pdf-box">
        <p class="note">ファイルを選ぶと、すぐに読み込みを開始し、抽出結果を下の確認テーブルと発注書へ自動反映します。</p>
        <input id="pdfFile" type="file" accept="application/pdf,.pdf,.xlsx,.xls,.csv,.txt,text/plain,text/csv" aria-label="読み込みファイル">
        <div id="importProgress" class="import-progress" aria-label="読み込み率" aria-live="polite">
          <div class="progress-track"><div id="importProgressBar" class="progress-bar"></div></div>
          <span id="importProgressPercent" class="progress-percent">0%</span>
        </div>
        <textarea id="pdfText" class="pdf-textarea" placeholder="ファイルから読み込んだテキストがここに表示されます。抽出0件の場合は、ここに内容を貼り付けても確認テーブルへ反映できます。"></textarea>
        <p id="pdfStatus" class="status"></p>
      </div>

      <h2>2. 確認・手入力テーブル</h2>
      <p class="note">材料名・数量・単位を確認してください。ファイル読み込みに失敗しても、手入力とExcel出力は常に使えます。</p>

      <div class="document-fields" aria-label="発注書情報">
        <label for="deliveryDate">納品日</label>
        <input id="deliveryDate" type="date">
        <label for="useDate">使用日</label>
        <input id="useDate" type="date">
        <label for="checkerName">検品者</label>
        <input id="checkerName" type="text" placeholder="検品者名">
      </div>

      <div class="table-wrap">
        <table class="manual-table" aria-label="確認・手入力テーブル">
          <thead>
            <tr>
              <th>材料名</th>
              <th>数量</th>
              <th>単位</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="manualRows"></tbody>
        </table>
      </div>

      <div class="buttons">
        <button class="gray" type="button" id="addBtn">＋ 行を追加</button>
        <button class="green" type="button" id="excelBtn">Excel出力</button>
        <button class="red" type="button" id="clearBtn">入力を消す</button>
      </div>
      <p id="notice" class="status"></p>
    </section>

    <section>
      <h2>3. 発注書レイアウト</h2>
      <p class="note">入力内容は下の発注書レイアウトに自動反映されます。</p>
      <div class="table-wrap" id="orderPreview"></div>
    </section>
  </main>

  <script>
    const manualRows = document.getElementById("manualRows");
    const orderPreview = document.getElementById("orderPreview");
    const addBtn = document.getElementById("addBtn");
    const excelBtn = document.getElementById("excelBtn");
    const clearBtn = document.getElementById("clearBtn");
    const pdfFile = document.getElementById("pdfFile");
    const pdfText = document.getElementById("pdfText");
    const pdfStatus = document.getElementById("pdfStatus");
    const importProgress = document.getElementById("importProgress");
    const importProgressBar = document.getElementById("importProgressBar");
    const importProgressPercent = document.getElementById("importProgressPercent");
    const deliveryDate = document.getElementById("deliveryDate");
    const useDate = document.getElementById("useDate");
    const checkerName = document.getElementById("checkerName");
    const notice = document.getElementById("notice");

    const orderSheetHeaders = ["チェック", "材料名", "総使用量", "単位", "摘要", "納品数", "単位", "単価", "金額", "産地"];
    const orderSheetDetailRows = 30;
    let rows = [createBlankRow(), createBlankRow(), createBlankRow(), createBlankRow(), createBlankRow()];

    addBtn.addEventListener("click", () => {
      syncRows();
      rows.push(createBlankRow());
      renderManualTable();
      renderOrderPreview();
      focusLastNameInput();
    });

    excelBtn.addEventListener("click", downloadExcel);
    pdfFile.addEventListener("change", async event => {
      const file = event.target.files && event.target.files[0];
      await handleFileSelect(file);
    });

    pdfText.addEventListener("input", () => {
      const parsedRows = parseIngredients(pdfText.value);
      applyParsedRows(parsedRows, { append: false, statusPrefix: "貼り付け欄" });
    });

    clearBtn.addEventListener("click", () => {
      rows = [createBlankRow(), createBlankRow(), createBlankRow(), createBlankRow(), createBlankRow()];
      deliveryDate.value = "";
      useDate.value = "";
      checkerName.value = "";
      notice.textContent = "入力を消しました。";
      renderManualTable();
      renderOrderPreview();
    });

    [deliveryDate, useDate, checkerName].forEach(input => {
      input.addEventListener("input", renderOrderPreview);
    });

    renderManualTable();
    renderOrderPreview();


    async function handleFileSelect(file) {
      pdfText.value = "";
      notice.textContent = "";
      updateImportProgress(0, "処理を開始しました。");
      pdfFile.disabled = true;

      try {
        updateImportProgress(25, "ファイルを読み込み中です。");
        const text = await readFileText(file);
        updateImportProgress(50, "文字化けを確認中です。");

        if (isGarbledText(text)) {
          markFileImportFailed("文字化けのため読み込めませんでした。内容を貼り付けてください");
          return;
        }

        pdfText.value = text;
        updateImportProgress(75, "材料を抽出中です。");
        const parsedRows = parseIngredients(text);
        updateImportProgress(100, "読み込み完了");
        applyParsedRows(parsedRows, { append: true, statusPrefix: "読み込み完了" });
      } catch (error) {
        console.error("file import error", error);
        markFileImportFailed("文字化けのため読み込めませんでした。内容を貼り付けてください");
      } finally {
        pdfFile.disabled = false;
        pdfFile.value = "";
      }
    }

    async function readFileText(file) {
      if (!file) {
        pdfStatus.textContent = "ファイルが選ばれていません。";
        return "";
      }

      pdfStatus.textContent = "ファイルを読み込み中です。";
      if (isPdfFile(file)) return extractTextFromPdf(await file.arrayBuffer());
      if (isExcelFile(file)) return extractTextFromWorkbook(await file.arrayBuffer());
      return file.text();
    }

    async function extractTextFromPdf(content) {
      if (!isPdfReady()) {
        pdfStatus.textContent = "PDF読み込みライブラリを読み込めませんでした。貼り付け欄か手入力を使ってください。";
        return "";
      }

      pdfStatus.textContent = "PDFからテキストを抽出中です。しばらくお待ちください。";
      const pdf = await pdfjsLib.getDocument({ data: content }).promise;
      const pages = [];
      for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
        const page = await pdf.getPage(pageNumber);
        const pageContent = await page.getTextContent();
        const pageText = getPageTextLines(pageContent.items);
        pages.push("【" + pageNumber + "ページ】\n" + (pageText || "（抽出できるテキストがありません）"));
      }
      return pages.join("\n\n");
    }

    function extractTextFromWorkbook(content) {
      if (!isXlsxReady() || typeof XLSX.read !== "function" || !XLSX.utils.sheet_to_json) {
        pdfStatus.textContent = "Excel読み込みライブラリを読み込めませんでした。貼り付け欄か手入力を使ってください。";
        return "";
      }

      pdfStatus.textContent = "Excelから内容を読み込み中です。";
      const workbook = XLSX.read(content, { type: "array" });
      return workbook.SheetNames.map(sheetName => {
        const sheet = workbook.Sheets[sheetName];
        const rowsInSheet = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: false, defval: "" });
        const lines = rowsInSheet
          .map(row => row.map(cell => String(cell || "").trim()).filter(Boolean).join("\t"))
          .filter(Boolean);
        return "【" + sheetName + "】\n" + lines.join("\n");
      }).join("\n\n");
    }

    function getPageTextLines(items) {
      const lineMap = new Map();
      items.forEach(item => {
        const text = String(item.str || "").trim();
        if (!text) return;
        const y = item.transform && Number.isFinite(item.transform[5]) ? Math.round(item.transform[5]) : 0;
        const x = item.transform && Number.isFinite(item.transform[4]) ? item.transform[4] : 0;
        if (!lineMap.has(y)) lineMap.set(y, []);
        lineMap.get(y).push({ x, text });
      });
      return Array.from(lineMap.entries())
        .sort((a, b) => b[0] - a[0])
        .map(([, lineItems]) => lineItems.sort((a, b) => a.x - b.x).map(item => item.text).join(" ").replace(/\s+/g, " ").trim())
        .filter(Boolean)
        .join("\n");
    }

    function updateImportProgress(percent, message) {
      const safePercent = Math.max(0, Math.min(100, Number(percent) || 0));
      importProgress.classList.add("is-active");
      importProgressBar.style.width = safePercent + "%";
      importProgressPercent.textContent = safePercent + "%";
      if (message) pdfStatus.textContent = message;
    }

    function markFileImportFailed(message) {
      updateImportProgress(100, "読み込み失敗");
      pdfText.value = "";
      pdfText.placeholder = "内容をここに貼り付けてください。";
      pdfText.focus();
      notice.textContent = message;
      pdfStatus.textContent = message;
      syncRows();
      ensureEditableRows();
      renderManualTable();
      renderOrderPreview();
    }

    function createBlankRow() {
      return { name: "", quantity: "", unit: "" };
    }

    function parseIngredients(text) {
      return extractRowsFromPdfText(text);
    }

    function applyParsedRows(parsedRows, options = {}) {
      const append = options.append !== false;
      const statusPrefix = options.statusPrefix || "読み込み完了";
      const importedRows = Array.isArray(parsedRows) ? parsedRows : [];
      syncRows();
      const currentRows = rows.filter(row => String(row.name || "").trim() || String(row.quantity || "").trim() || String(row.unit || "").trim());
      rows = append ? currentRows.concat(importedRows) : importedRows;
      ensureEditableRows();

      notice.textContent = importedRows.length
        ? "抽出できた行を発注書データに追加しました。必要なら修正してください。"
        : "抽出できませんでした。貼り付け欄か手入力を使ってください。";
      pdfStatus.textContent = importedRows.length
        ? statusPrefix + "。抽出結果を確認テーブルへ表示しました（" + importedRows.length + "件）。"
        : statusPrefix + "。抽出0件です。貼り付け欄を表示しています。";
      renderManualTable();
      renderOrderPreview();
    }

    function ensureEditableRows() {
      if (rows.length === 0) rows = [createBlankRow()];
    }

    function extractRowsFromPdfText(text) {
      const lines = String(text || "")
        .replace(/【[^】]+】/g, "\n")
        .split(/\r?\n/)
        .map(line => line.replace(/　/g, " ").replace(/\s+/g, " ").trim())
        .filter(Boolean);
      const extracted = [];
      const seen = new Set();

      lines.forEach(line => {
        if (isIgnoredPdfLine(line)) return;
        extractRowsFromLine(line).forEach(row => {
          const key = [row.name, row.quantity, row.unit].join("|");
          if (seen.has(key)) return;
          seen.add(key);
          extracted.push(row);
        });
      });

      return extracted;
    }

    function extractRowsFromLine(line) {
      const escapedUnits = unitNames().map(unit => unit.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|");
      const results = [];
      const normalizedLine = String(line || "").replace(/,/g, " ").replace(/\t/g, " ").replace(/\s+/g, " ").trim();
      const nameFirstPattern = new RegExp("^(.+?)\\s+([0-9０-９]+(?:[.,．][0-9０-９]+)?)\\s*(" + escapedUnits + ")(?:\\s|$)", "i");
      const quantityFirstPattern = new RegExp("^([0-9０-９]+(?:[.,．][0-9０-９]+)?)\\s*(" + escapedUnits + ")\\s+(.+)$", "i");
      const nameFirstMatch = normalizedLine.match(nameFirstPattern);
      const quantityFirstMatch = normalizedLine.match(quantityFirstPattern);

      if (nameFirstMatch) {
        addExtractedRow(results, nameFirstMatch[1], nameFirstMatch[2], nameFirstMatch[3]);
      } else if (quantityFirstMatch) {
        addExtractedRow(results, quantityFirstMatch[3], quantityFirstMatch[1], quantityFirstMatch[2]);
      }

      const cells = String(line || "").split(/\t|,|，/).map(cell => cell.trim()).filter(Boolean);
      if (cells.length >= 3) {
        for (let index = 0; index < cells.length - 2; index++) {
          const name = cells[index];
          const quantity = cells[index + 1];
          const unit = cells[index + 2];
          if (isQuantity(quantity) && isKnownUnit(unit)) addExtractedRow(results, name, quantity, unit);
        }
      }

      return results;
    }

    function addExtractedRow(target, nameValue, quantityValue, unitValue) {
      const name = cleanIngredientName(nameValue);
      const quantity = normalizeQuantity(quantityValue);
      const unit = normalizeUnit(unitValue);
      if (!name || !quantity || !unit || isIgnoredPdfLine(name) || isSuspiciousIngredientName(name)) return;
      target.push({ name, quantity, unit });
    }

    function unitNames() {
      return ["kg", "ｋｇ", "KG", "g", "ｇ", "G", "グラム", "㎏", "ｍｌ", "ml", "ML", "cc", "L", "l", "リットル", "個", "本", "袋", "パック", "玉", "束", "枚", "缶", "箱", "尾", "切", "片", "丁", "株", "房", "杯", "膳", "食", "人前"];
    }

    function isQuantity(value) {
      return /^[0-9０-９]+(?:[.,．][0-9０-９]+)?$/.test(String(value || "").trim());
    }

    function isKnownUnit(value) {
      const normalized = normalizeUnit(value).toLowerCase();
      return unitNames().map(unit => normalizeUnit(unit).toLowerCase()).includes(normalized);
    }

    function isIgnoredPdfLine(line) {
      return /発注書|納品書|納品日|使用日|検品者|合計|金額|単価|摘要|チェック|ページ|スクルドエンジェル|たかばり/.test(line);
    }

    function isGarbledText(value) {
      const text = String(value || "");
      const compact = text.replace(/\s/g, "");
      const length = compact.length;
      if (!length) return true;
      const replacementCount = countMatches(compact, /�/g);
      const boxCount = countMatches(compact, /□/g);
      const japaneseCount = countMatches(compact, /[ぁ-んァ-ヶ一-龠々]/g);
      const symbolCount = countMatches(compact, /[^ぁ-んァ-ヶ一-龠々a-zA-Z0-9０-９ーｰ－.,，.．・/／()（）\[\]【】%％kgＫＧｋｇmlＭＬｍｌccＣＣ]/g);
      const japaneseRatio = japaneseCount / length;
      const boxRatio = boxCount / length;
      const symbolRatio = symbolCount / length;

      return replacementCount > 0 || boxCount >= 15 || (boxCount >= 5 && boxRatio > 0.08) ||
        (length >= 20 && japaneseRatio < 0.03) || (length >= 20 && symbolRatio > 0.25);
    }

    function isSuspiciousIngredientName(value) {
      const name = String(value || "").trim();
      const compact = name.replace(/\s/g, "");
      if (!compact) return true;
      const length = compact.length;
      const japaneseCount = countMatches(compact, /[ぁ-んァ-ヶ一-龠々]/g);
      const symbolCount = countMatches(compact, /[^ぁ-んァ-ヶ一-龠々a-zA-Z0-9０-９ーｰ－・/／()（）]/g);
      return /�/.test(compact) || countMatches(compact, /□/g) >= 3 ||
        (length >= 4 && japaneseCount === 0) || (length >= 3 && symbolCount / length > 0.35);
    }

    function countMatches(value, pattern) {
      const matches = String(value || "").match(pattern);
      return matches ? matches.length : 0;
    }

    function cleanIngredientName(value) {
      return String(value || "")
        .replace(/^[□■☑✓・*\-－—\s]+/, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeQuantity(value) {
      return String(value || "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/．/g, ".")
        .replace(/,/g, "")
        .trim();
    }

    function normalizeUnit(value) {
      const unit = String(value || "").trim();
      const lowerUnit = unit.toLowerCase();
      if (["ｋｇ", "kg", "㎏"].includes(lowerUnit)) return "kg";
      if (["ｇ", "g"].includes(lowerUnit)) return "g";
      if (["ｍｌ", "ml"].includes(lowerUnit)) return "ml";
      return unit;
    }

    function renderManualTable() {
      if (rows.length === 0) {
        manualRows.innerHTML = '<tr><td colspan="4">抽出できませんでした</td></tr>';
      } else {
        manualRows.innerHTML = rows.map((row, index) => {
          return "<tr>" +
            '<td data-label="材料名"><input data-index="' + index + '" data-field="name" type="text" value="' + escapeHtml(row.name) + '" placeholder="例：にんじん"></td>' +
            '<td data-label="数量"><input data-index="' + index + '" data-field="quantity" type="number" step="0.001" min="0" value="' + escapeHtml(row.quantity) + '" placeholder="例：2"></td>' +
            '<td data-label="単位"><input data-index="' + index + '" data-field="unit" type="text" value="' + escapeHtml(row.unit) + '" placeholder="例：kg"></td>' +
            '<td data-label="操作"><button class="red" type="button" data-delete="' + index + '">削除</button></td>' +
          "</tr>";
        }).join("");
      }

      manualRows.querySelectorAll("input").forEach(input => input.addEventListener("input", () => {
        syncRows();
        renderOrderPreview();
      }));
      manualRows.querySelectorAll("[data-delete]").forEach(button => button.addEventListener("click", () => deleteRow(Number(button.dataset.delete))));
    }

    function focusLastNameInput() {
      const inputs = manualRows.querySelectorAll('input[data-field="name"]');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }

    function deleteRow(index) {
      syncRows();
      rows.splice(index, 1);
      if (rows.length === 0) rows.push(createBlankRow());
      renderManualTable();
      renderOrderPreview();
    }

    function syncRows() {
      const nextRows = rows.map(row => ({ ...row }));
      manualRows.querySelectorAll("input[data-index]").forEach(input => {
        const index = Number(input.dataset.index);
        const field = input.dataset.field;
        if (nextRows[index]) nextRows[index][field] = input.value;
      });
      rows = nextRows;
    }

    function getExportRows() {
      syncRows();
      return rows
        .filter(row => String(row.name || "").trim() || String(row.quantity || "").trim() || String(row.unit || "").trim())
        .map(row => {
          const quantity = numberValue(row.quantity);
          return [
            "□",
            String(row.name || "").trim(),
            quantity || "",
            String(row.unit || "").trim(),
            "手入力",
            quantity || "",
            String(row.unit || "").trim(),
            "",
            "",
            ""
          ];
        });
    }

    function renderOrderPreview() {
      const exportRows = getExportRows();
      const detailRows = paddedOrderRows(exportRows, 10);
      const dateLine = formatOrderDateLine(deliveryDate.value, useDate.value);
      const totals = calculateExportTotals(exportRows);

      orderPreview.innerHTML = '<table class="preview-sheet">' +
        '<tbody>' +
          '<tr class="title-row"><td colspan="10">発　注　書　兼　納　品　書</td></tr>' +
          '<tr class="sub-title-row"><td colspan="10">スクルドエンジェル</td></tr>' +
          '<tr class="sub-title-row"><td colspan="10">たかばり　園</td></tr>' +
          '<tr class="blank"><td colspan="10"></td></tr>' +
          '<tr class="date-row"><td class="date-line" colspan="10">' + escapeHtml(dateLine) + '</td></tr>' +
          '<tr class="blank"><td colspan="10"></td></tr>' +
          '<tr class="ingredient-row">' + orderSheetHeaders.map(header => '<th>' + escapeHtml(header) + '</th>').join("") + '</tr>' +
          detailRows.map(row => '<tr class="ingredient-row">' + row.map((cell, index) => '<td class="' + (index === 1 || index === 4 ? 'left' : '') + '">' + escapeHtml(cell) + '</td>').join("") + '</tr>').join("") +
          '<tr class="summary-row checker-label-row"><td colspan="2"></td><td class="total-label" colspan="2">検品者</td><td colspan="6"></td></tr>' +
          '<tr class="summary-row total-row"><td colspan="2"></td><td colspan="2">' + escapeHtml(checkerName.value || "") + '</td><td colspan="2"></td><td class="total-label" colspan="2">合計金額</td><td class="total-amount">' + escapeHtml(totals.total || "") + '</td><td class="no-border"></td></tr>' +
          '<tr class="summary-row total-row"><td colspan="6"></td><td class="total-label" colspan="2">消費税 課税合計</td><td class="total-amount">' + escapeHtml(totals.tax || "") + '</td><td class="no-border"></td></tr>' +
          '<tr class="summary-row total-row"><td colspan="6"></td><td class="total-label" colspan="2">請求金額</td><td class="total-amount">' + escapeHtml(totals.billed || "") + '</td><td class="no-border"></td></tr>' +
          '<tr class="blank"><td colspan="10"></td></tr>' +
        '</tbody>' +
      '</table>';
    }

    function downloadExcel() {
      const exportRows = getExportRows();
      if (!isXlsxReady()) {
        notice.textContent = "Excel作成ライブラリを読み込めませんでした。ネット接続を確認してから、もう一度押してください。";
        return;
      }

      try {
        const worksheet = XLSX.utils.aoa_to_sheet(buildExportDocument(exportRows));
        setupExcelWorksheet(worksheet, exportRows.length);

        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "発注書");
        XLSX.writeFile(workbook, makeExportFileName("xlsx"), { bookType: "xlsx", type: "binary" });
        notice.textContent = exportRows.length ? "Excelを出力しました。" : "空の発注書Excelを出力しました。";
      } catch (error) {
        notice.textContent = "Excelの作成に失敗しました。もう一度押してください。";
        console.error("Excel作成エラー", error);
      }
    }

    function buildExportDocument(exportRows) {
      const totals = calculateExportTotals(exportRows);
      const detailRows = paddedOrderRows(exportRows, getOrderSheetDetailRowCount(exportRows.length));
      const blank = Array(orderSheetHeaders.length).fill("");
      const dateLine = formatOrderDateLine(deliveryDate.value, useDate.value);

      return [
        ["", "", "発　注　書　兼　納　品　書", "", "", "", "", "", "", ""],
        ["", "", "スクルドエンジェル", "", "", "", "", "", "", ""],
        ["", "", "たかばり　園", "", "", "", "", "", "", ""],
        blank,
        [dateLine, "", "", "", "", "", "", "", "", ""],
        blank,
        orderSheetHeaders,
        ...detailRows,
        blank,
        blank,
        ["", "", "検品者", "", "", "", "", "", "", ""],
        ["", "", checkerName.value || "", "", "", "", "合計金額", "", totals.total || "", ""],
        ["", "", "", "", "", "", "消費税 課税合計", "", totals.tax || "", ""],
        ["", "", "", "", "", "", "請求金額", "", totals.billed || "", ""],
        blank
      ];
    }

    function paddedOrderRows(exportRows, detailRowCount) {
      const padded = exportRows.slice();
      while (padded.length < detailRowCount) padded.push(Array(orderSheetHeaders.length).fill(""));
      return padded;
    }

    function calculateExportTotals(exportRows) {
      const total = exportRows.reduce((sum, row) => sum + numberValue(row[8]), 0);
      const tax = Math.floor(total * 0.1);
      return { total: round(total), tax, billed: round(total + tax) };
    }

    function getOrderSheetDetailRowCount(dataLength) {
      return Math.max(orderSheetDetailRows, dataLength);
    }

    function getOrderSheetLayout(dataLength) {
      const detailRowCount = getOrderSheetDetailRowCount(dataLength);
      return {
        detailRowCount,
        totalRows: detailRowCount + 14,
        detailStart: 7,
        detailEnd: detailRowCount + 6,
        totalStart: detailRowCount + 10,
        totalEnd: detailRowCount + 12,
        checkerStart: detailRowCount + 9,
        checkerEnd: detailRowCount + 10
      };
    }

    function setupExcelWorksheet(worksheet, dataLength) {
      const layout = getOrderSheetLayout(dataLength);
      worksheet["!cols"] = [
        { wch: 5.8 }, { wch: 17.5 }, { wch: 8 }, { wch: 5.5 }, { wch: 12 },
        { wch: 7 }, { wch: 5 }, { wch: 7 }, { wch: 8.5 }, { wch: 8.5 }
      ];
      worksheet["!rows"] = Array.from({ length: layout.totalRows }, (_, row) => ({ hpt: orderSheetRowHeight(row, layout) }));
      worksheet["!merges"] = [
        { s: { r: 0, c: 2 }, e: { r: 0, c: 7 } },
        { s: { r: 1, c: 2 }, e: { r: 1, c: 7 } },
        { s: { r: 2, c: 2 }, e: { r: 2, c: 7 } },
        { s: { r: 4, c: 0 }, e: { r: 4, c: 9 } },
        { s: { r: layout.totalStart, c: 6 }, e: { r: layout.totalStart, c: 7 } },
        { s: { r: layout.totalStart + 1, c: 6 }, e: { r: layout.totalStart + 1, c: 7 } },
        { s: { r: layout.totalStart + 2, c: 6 }, e: { r: layout.totalStart + 2, c: 7 } },
        { s: { r: layout.checkerStart, c: 2 }, e: { r: layout.checkerStart, c: 3 } },
        { s: { r: layout.checkerEnd, c: 2 }, e: { r: layout.checkerEnd, c: 3 } }
      ];
      worksheet["!margins"] = {
        left: cmToInch(1.5),
        right: cmToInch(1),
        top: cmToInch(0.8),
        bottom: cmToInch(0.8),
        header: 0,
        footer: 0
      };
      worksheet["!pageSetup"] = {
        paperSize: 9,
        orientation: "portrait",
        fitToPage: true,
        fitToWidth: 1,
        fitToHeight: 1
      };
      worksheet["!printOptions"] = { gridLines: false, horizontalCentered: false, verticalCentered: true };
      worksheet["!ref"] = "A1:J" + layout.totalRows;

      const range = XLSX.utils.decode_range(worksheet["!ref"]);
      for (let row = range.s.r; row <= range.e.r; row++) {
        for (let col = range.s.c; col <= range.e.c; col++) {
          const address = XLSX.utils.encode_cell({ r: row, c: col });
          if (!worksheet[address]) worksheet[address] = { t: "s", v: "" };
          worksheet[address].s = excelCellStyle(row, col, layout);
        }
      }
    }

    function orderSheetRowHeight(row, layout) {
      if (row === 0) return 22;
      if (row === 1 || row === 2) return 15;
      if (row === 4) return 18;
      if (row === 6) return 20;
      if (row >= layout.detailStart && row <= layout.detailEnd) return 20;
      if (row === layout.checkerStart) return 54 / 7;
      if (row >= layout.totalStart && row <= layout.totalEnd) return 18;
      if (row > layout.totalEnd) return 7;
      return 7;
    }

    function excelCellStyle(row, col, layout) {
      const thinBorder = { style: "thin", color: { rgb: "000000" } };
      const mediumBorder = { style: "medium", color: { rgb: "000000" } };
      const isTitle = row === 0;
      const isSubTitle = row === 1 || row === 2;
      const isDateLine = row === 4;
      const isHeader = row === 6;
      const isCheckerBox = row >= layout.checkerStart && row <= layout.checkerEnd && col >= 2 && col <= 3;
      const isTotalBox = row >= layout.totalStart && row <= layout.totalEnd && col >= 6 && col <= 8;
      const isTotalAmountCell = row >= layout.totalStart && row <= layout.totalEnd && col === 8;

      return {
        font: {
          name: "Yu Gothic",
          sz: isTitle ? 15 : (isSubTitle ? 9 : 8),
          bold: isTitle || isSubTitle || isHeader || isCheckerBox || (isTotalBox && col <= 7)
        },
        alignment: {
          horizontal: isTotalAmountCell ? "right" : (isDateLine ? "left" : (isTitle || isSubTitle || isHeader || isCheckerBox || isTotalBox ? "center" : (col === 1 || col === 4 ? "left" : "center"))),
          vertical: "center",
          wrapText: !isDateLine
        },
        numFmt: isTotalAmountCell ? "#,##0.###" : undefined,
        border: borderForOrderSheetCell(row, col, layout, thinBorder, mediumBorder),
        fill: isDateLine ? { patternType: "solid", fgColor: { rgb: "FDE2E8" } } : undefined
      };
    }

    function borderForOrderSheetCell(row, col, layout, thinBorder, mediumBorder) {
      const isTable = row >= 6 && row <= layout.detailEnd;
      const isCheckerBox = row >= layout.checkerStart && row <= layout.checkerEnd && col >= 2 && col <= 3;
      const isTotalBox = row >= layout.totalStart && row <= layout.totalEnd && col >= 6 && col <= 8;
      const hasBorder = isTable || isCheckerBox || isTotalBox;
      if (!hasBorder) return undefined;

      const border = { top: thinBorder, bottom: thinBorder, left: thinBorder, right: thinBorder };
      if (isTable) {
        if (row === 6) border.top = mediumBorder;
        if (row === layout.detailEnd) border.bottom = mediumBorder;
        if (col === 0) border.left = mediumBorder;
        if (col === 9) border.right = mediumBorder;
      }
      if (isCheckerBox || isTotalBox) {
        const firstRow = isCheckerBox ? layout.checkerStart : layout.totalStart;
        const lastRow = isCheckerBox ? layout.checkerEnd : layout.totalEnd;
        const firstCol = isCheckerBox ? 2 : 6;
        const lastCol = isCheckerBox ? 3 : 8;
        if (row === firstRow) border.top = mediumBorder;
        if (row === lastRow) border.bottom = mediumBorder;
        if (col === firstCol) border.left = mediumBorder;
        if (col === lastCol) border.right = mediumBorder;
      }
      return border;
    }

    function cmToInch(cm) {
      return cm / 2.54;
    }

    function isXlsxReady() {
      return Boolean(window.XLSX && XLSX.utils && typeof XLSX.utils.aoa_to_sheet === "function" && typeof XLSX.utils.book_new === "function" && typeof XLSX.utils.book_append_sheet === "function" && typeof XLSX.writeFile === "function");
    }

    function isPdfReady() {
      if (!window.pdfjsLib || typeof pdfjsLib.getDocument !== "function") return false;
      if (pdfjsLib.GlobalWorkerOptions && !pdfjsLib.GlobalWorkerOptions.workerSrc) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
      }
      return true;
    }

    function isPdfFile(file) {
      const fileName = String(file && file.name ? file.name : "").toLowerCase();
      return file.type === "application/pdf" || fileName.endsWith(".pdf");
    }

    function isExcelFile(file) {
      const fileName = String(file && file.name ? file.name : "").toLowerCase();
      return fileName.endsWith(".xlsx") || fileName.endsWith(".xls") || /spreadsheet|excel/.test(String(file.type || ""));
    }

    function makeExportFileName(extension) {
      return "発注書兼納品書_" + formatDate(new Date()) + "." + extension;
    }

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return year + month + day;
    }

    function formatOrderDateLine(deliveryValue, useValue) {
      const delivery = parseDateParts(deliveryValue);
      const use = parseDateParts(useValue);
      return "【納品日】令和" + dateField(delivery.reiwaYear, 2) + "年" + dateField(delivery.month, 2) + "月" + dateField(delivery.day, 2) + "日(" + dateField(delivery.weekday, 2) + ")　使用日" + dateField(use.month, 2) + "月" + dateField(use.day, 2) + "日";
    }

    function dateField(value, width) {
      return value ? String(value).padStart(width, "　") : "　".repeat(width);
    }

    function parseDateParts(value) {
      if (!value) return { reiwaYear: "", month: "", day: "", weekday: "" };
      const date = new Date(value + "T00:00:00");
      if (Number.isNaN(date.getTime())) return { reiwaYear: "", month: "", day: "", weekday: "" };
      return {
        reiwaYear: date.getFullYear() - 2018,
        month: date.getMonth() + 1,
        day: date.getDate(),
        weekday: ["日", "月", "火", "水", "木", "金", "土"][date.getDay()]
      };
    }

    function numberValue(value) {
      const normalized = String(value ?? "")
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/．/g, ".")
        .replace(/,/g, "");
      const match = normalized.match(/-?[0-9]+(?:\.[0-9]+)?/);
      return match ? Number(match[0]) : 0;
    }

    function round(value) {
      return Math.round(value * 1000) / 1000;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"]/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[char]));
    }
  </script>
