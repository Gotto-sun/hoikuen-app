<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#7cc7b2" />
    <title>ほいくえんアプリ</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6fbf8;
        color: #263238;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 480px);
        padding: 32px 24px;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgb(38 50 56 / 12%);
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: #e3f4ee;
        color: #16765f;
        font-weight: 700;
        font-size: 14px;
      }

      h1 {
        margin: 20px 0 12px;
        font-size: clamp(30px, 10vw, 44px);
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #546e7a;
        line-height: 1.8;
        font-size: 16px;
      }

      .card {
        margin-top: 24px;
        padding: 18px;
        border-radius: 20px;
        background: #fff8df;
        color: #6d5200;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">📱 スマホ対応</span>
      <h1>ほいくえんアプリ</h1>
      <p>
        GitHub Pagesで公開する準備ができています。<br />
        スマホのブラウザでURLを開いて使えます。
      </p>
      <div class="card">このページを好きな内容に書きかえてください。</div>
    </main>
  </body>
</html>
